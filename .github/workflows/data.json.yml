name: Actualizar JSON Galerias

on:
  push:
    paths:
      - 'web/Dinamico/**'
      - 'web/otros/Archivos/Imagenes/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar data.json
        run: |
          python3 << 'EOF'
          import os,json
          from pathlib import Path

          IMG_EXT={'.webp','.jpg','.jpeg','.png','.gif','.avif','.bmp'}

          def bg(base):
            out={}
            base=Path(base)
            cats=[e for e in base.iterdir() if e.is_dir()]
            for cat in sorted(cats):
              res={}
              ents=sorted(cat.iterdir(),key=lambda e:e.name)
              root_imgs=sorted(
                str(e).replace(os.sep,'/')
                for e in ents
                if e.is_file() and e.suffix.lower() in IMG_EXT
              )
              if root_imgs:
                res['General']=root_imgs
              for sub in sorted(e for e in ents if e.is_dir()):
                imgs=sorted(
                  str(f).replace(os.sep,'/')
                  for f in sub.iterdir()
                  if f.is_file() and f.suffix.lower() in IMG_EXT
                )
                if imgs:
                  res[sub.name]=imgs
              out[cat.name]=res
            return out

          def wj(p,d):
            with open(p,'w',encoding='utf-8') as f:
              json.dump(d,f,separators=(',',':'),ensure_ascii=False)

          D1='web/Dinamico'
          D2='web/otros/Archivos/Imagenes'

          if Path(D1).exists():
            wj(f'{D1}/data.json',{'galleries':bg(D1)})
            print(f'OK {D1}/data.json')

          if Path(D2).exists():
            wj(f'{D2}/data.json',{'galleries':bg(D2)})
            print(f'OK {D2}/data.json')
          EOF

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/Dinamico/data.json web/otros/Archivos/Imagenes/data.json
          git diff --cached --quiet && echo "sin cambios" && exit 0
          git commit -m "auto: data.json [skip ci]"
          git push
