name: MirrorYDeploy

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  mirror:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: |
          git remote add codeberg https://laWiskaPY:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/laWiskaPY/kore.js.git
          git push codeberg --mirror
          git push codeberg HEAD:pages --force

  deploy:
    runs-on: ubuntu-slim
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment