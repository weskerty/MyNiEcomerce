name: WebPageGen

on:
  push:
    paths:
      - web/Dinamico/data.json

jobs:
  WebPageGen:
    name: WebPageGen - build on change
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: A1
        run: |
          git fetch origin main
          F1=$(git diff --name-only origin/main HEAD || true)
          echo "CH=$F1" >> $GITHUB_OUTPUT

      - id: B1
        env:
          P1: "web/Dinamico/data.json"
        run: |
          echo "${{ steps.A1.outputs.CH }}" | tr ' ' '\n' > f1.txt
          I=0
          for P in $(echo "$P1" | tr ';' ' '); do
            grep -qx "$P" f1.txt && I=1
          done
          echo "I=$I" >> $GITHUB_ENV

      - if: env.I == '1'
        run: |
          echo "build"
          # npm ci
          # npm run build
          # deploy
