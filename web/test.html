<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Notify</title>

</head>
<body>
<h3>Test Notify</h3>

<label>Title<input id="ti" value="Titulo"></label>
<label>Body<input id="bo" value="Descripcion"></label>
<label>Icon URL <small>(fllbck)</small><input id="ic" placeholder="https://..."></label>
<label>Image/Banner URL <small>(fllbck)</small><input id="im" placeholder="https://..."></label>
<label>URL al click<input id="ur" placeholder="default: origin"></label>
<label>Tag<input id="tg" value="test-notify"></label>

<hr>
<div class="row">
  <button onclick="notifyNow()">Notificar ahora</button>
  <button onclick="saveOPFS()">Guardar OPFS</button>
</div>
<div class="row">
  <button onclick="simPush()">SW push</button>
  <button onclick="clearOPFS()">Limpiar OPFS</button>
</div>

<div id="log"></div>

<script>
const $=id=>document.getElementById(id).value.trim();
const log=m=>document.getElementById('log').textContent=m;

async function ensurePerm(){
  if(Notification.permission==='granted')return true;
  return(await Notification.requestPermission())==='granted';
}

async function notifyNow(){
  if(!await ensurePerm())return log('Permiso denegado');
  const reg=await navigator.serviceWorker.ready;
  const opts={body:$('bo'),tag:$('tg')||'test',data:{url:$('ur')||location.origin}};
  if($('ic'))opts.icon=$('ic');
  if($('im'))opts.image=$('im');
  await reg.showNotification($('ti')||'Test',opts);
  log('Notificacion enviada directa');
}

async function saveOPFS(){
  const data={title:$('ti'),body:$('bo'),tag:$('tg')||'test',url:$('ur')||location.origin};
  if($('ic'))data.icon=$('ic');
  if($('im'))data.image=$('im');
  const script=`notify(${JSON.stringify(data)});`;
  try{
    const root=await navigator.storage.getDirectory();
    const dir=await root.getDirectoryHandle('notify',{create:true});
    const fh=await dir.getFileHandle('test.js',{create:true});
    const w=await fh.createWritable();
    await w.write(script);
    await w.close();
    log('Guardado: notify/test.js');
  }catch(e){log('Error OPFS: '+e.message);}
}

async function simPush(){
  const reg=await navigator.serviceWorker.ready;
  if(!reg.active)return log('SW no activo');
  reg.active.postMessage('RUN_OPFS');
  log('RUN_OPFS enviado al SW');
}

async function clearOPFS(){
  try{
    const root=await navigator.storage.getDirectory();
    const dir=await root.getDirectoryHandle('notify');
    for await(const[name]of dir.entries())await dir.removeEntry(name);
    log('OPFS limpiado');
  }catch{log('Sin directorio notify');}
}
</script>
</body>
</html>
