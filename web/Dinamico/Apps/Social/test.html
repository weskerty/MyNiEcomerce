<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"></head>
<body>
<style data-content>
:root{--a:#c8ff00;--r:#ff2d4e;--d:#ffffff18;--t:#e8e8e8;--m:'Courier New',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
#SC_W{width:100%;min-height:100vh;font-family:var(--m);color:var(--t);background:transparent;display:flex;flex-direction:column;}
.SC_s{display:none;flex-direction:column;flex:1;}.SC_s.on{display:flex;}
#SC_lb{padding:20px 16px;gap:10px;max-width:460px;width:100%;margin:0 auto;}
#SC_lb h1{font-size:2rem;letter-spacing:6px;color:var(--a);text-shadow:0 0 20px #c8ff0033;text-align:center;}
.SC_lbl{font-size:.6rem;color:#ffffff44;letter-spacing:2px;text-transform:uppercase;}
.SC_dv{height:1px;background:var(--d);}
.SC_ip{width:100%;padding:8px 12px;background:transparent;border:1px solid #ffffff33;color:var(--t);font-family:var(--m);font-size:.82rem;outline:none;transition:border-color .2s;}
.SC_ip:focus{border-color:var(--a);}
.SC_rw{display:flex;gap:8px;}.SC_rw .SC_ip{flex:1;}
.SC_bt{padding:7px 13px;background:transparent;border:1px solid var(--a);color:var(--a);font-family:var(--m);font-size:.74rem;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .15s,color .15s;white-space:nowrap;}
.SC_bt:hover{background:var(--a);color:#060608;}
.SC_bt.r{border-color:var(--r);color:var(--r);}.SC_bt.r:hover{background:var(--r);color:#fff;}
.SC_bt.d{border-color:#ffffff33;color:#ffffff55;}.SC_bt.d:hover{background:#ffffff11;color:#fff;}
.SC_bt.sm{padding:5px 8px;font-size:.7rem;}
#SC_st{font-size:.6rem;letter-spacing:1px;color:#ffffff33;text-align:right;}
#SC_st.ok{color:var(--a);}#SC_st.er{color:var(--r);}
#SC_rl{display:flex;flex-direction:column;gap:6px;min-height:44px;}
.SC_ri{border:1px solid #ffffff1a;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,background .15s;}
.SC_ri:hover{border-color:var(--a);background:#c8ff0006;}
.SC_rn{font-size:.85rem;color:var(--a);}.SC_rm{font-size:.6rem;color:#ffffff44;}
.SC_nt{font-size:.7rem;color:#ffffff33;text-align:center;padding:8px;}
.SC_mo{position:fixed;inset:0;background:#000000aa;display:none;align-items:center;justify-content:center;z-index:100;}
.SC_mo.on{display:flex;}
.SC_mb{width:min(290px,90vw);border:1px solid var(--d);background:#0b0b14;padding:20px 16px;display:flex;flex-direction:column;gap:9px;}
.SC_mb h2{font-size:.88rem;letter-spacing:2px;color:var(--a);text-align:center;}
#SC_ch{flex:1;display:none;flex-direction:column;}#SC_ch.on{display:flex;}
#SC_hd{padding:8px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--d);flex-shrink:0;}
#SC_nm{font-size:.86rem;letter-spacing:2px;color:var(--a);flex:1;}
#SC_pc{font-size:.6rem;color:#ffffff44;}
#SC_vg{display:none;flex-wrap:wrap;gap:5px;padding:6px 10px;border-bottom:1px solid var(--d);max-height:175px;overflow-y:auto;}
#SC_vg.on{display:flex;}
.SC_ve{position:relative;border-radius:4px;overflow:hidden;background:#000;border:1px solid var(--d);flex:1;min-width:88px;max-width:155px;}
.SC_ve video{width:100%;display:block;max-height:108px;object-fit:cover;}
.SC_vl{position:absolute;bottom:3px;left:4px;font-size:.57rem;background:rgba(0,0,0,.65);padding:1px 4px;border-radius:3px;}
#SC_mg{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
.SC_ms{display:flex;gap:7px;align-items:flex-end;}.SC_ms.me{flex-direction:row-reverse;}
.SC_av{width:21px;height:21px;border-radius:50%;border:1px solid var(--d);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:900;flex-shrink:0;color:var(--a);}
.SC_bu{max-width:72%;padding:6px 10px;border:1px solid var(--d);font-size:.8rem;line-height:1.4;word-break:break-word;}
.SC_ms.me .SC_bu{border-color:#ffffff22;background:#ffffff0a;}
.SC_sn{font-size:.57rem;color:#ffffff44;margin-bottom:2px;}
.SC_sy{font-size:.62rem;color:#ffffff2a;text-align:center;padding:2px 0;letter-spacing:1px;}
#SC_ib{display:flex;gap:8px;padding:8px 11px;border-top:1px solid var(--d);flex-shrink:0;}
#SC_ib .SC_ip{flex:1;}
#SC_pp{position:fixed;top:0;right:-210px;width:195px;height:100%;border-left:1px solid var(--d);background:#0b0b14f0;z-index:50;transition:right .2s;display:flex;flex-direction:column;padding:11px;gap:6px;overflow-y:auto;}
#SC_pp.on{right:0;}
#SC_pp h3{font-size:.62rem;color:#ffffff44;letter-spacing:2px;padding-bottom:5px;border-bottom:1px solid var(--d);}
.SC_pr{display:flex;align-items:center;gap:6px;padding:4px 2px;}
.SC_pn{font-size:.74rem;flex:1;}
.SC_pm{background:transparent;border:1px solid #ffffff22;color:#fff;font-size:.6rem;padding:2px 5px;cursor:pointer;}
.SC_pm.mu{border-color:var(--r);color:var(--r);}
</style>

<div id="SC_W">
  <div id="SC_moC" class="SC_mo">
    <div class="SC_mb">
      <h2>NUEVA SALA</h2>
      <input id="SC_iRN" class="SC_ip" placeholder="Nombre de sala..." maxlength="32">
      <input id="SC_iRP" class="SC_ip" type="password" placeholder="Contrasena (opcional)" maxlength="48">
      <button id="SC_bRC" class="SC_bt">Crear</button>
      <button id="SC_bRX" class="SC_bt d">Cancelar</button>
    </div>
  </div>
  <div id="SC_moP" class="SC_mo">
    <div class="SC_mb">
      <h2>SALA PRIVADA</h2>
      <div id="SC_mPN" class="SC_nt"></div>
      <input id="SC_iJP" class="SC_ip" type="password" placeholder="Contrasena">
      <button id="SC_bJJ" class="SC_bt">Unirse</button>
      <button id="SC_bJX" class="SC_bt d">Cancelar</button>
    </div>
  </div>

  <div id="SC_lb" class="SC_s on">
    <h1>CHAT</h1>
    <div style="font-size:.6rem;color:#ffffff33;letter-spacing:2px;text-align:center;">P2P · PEERJS · SIN SERVIDOR</div>
    <div class="SC_dv"></div>
    <div class="SC_rw">
      <input id="SC_iFI" class="SC_ip" placeholder="Filtrar salas...">
      <button id="SC_bNB" class="SC_bt">+ Nueva</button>
    </div>
    <div class="SC_lbl">Salas activas</div>
    <div id="SC_rl"><div class="SC_nt">Buscando salas...</div></div>
    <div id="SC_st"></div>
  </div>

  <div id="SC_ch" class="SC_s">
    <div id="SC_hd">
      <div style="flex:1"><div id="SC_nm">—</div><div id="SC_pc"></div></div>
      <button id="SC_bMC" class="SC_bt d sm">🎤</button>
      <button id="SC_bVC" class="SC_bt d sm">📷</button>
      <button id="SC_bPC" class="SC_bt d sm">👥</button>
      <button id="SC_bLV" class="SC_bt r sm">Salir</button>
    </div>
    <div id="SC_vg"></div>
    <div id="SC_mg"></div>
    <div id="SC_ib">
      <input id="SC_iMI" class="SC_ip" placeholder="Mensaje...">
      <button id="SC_bSB" class="SC_bt sm">➤</button>
    </div>
  </div>
  <div id="SC_pp"><h3>PARTICIPANTES</h3><div id="SC_pl"></div></div>
</div>

<script>
(function(){

const API    = '/api/chat';
const PEER_HOST = location.hostname;
const PEER_PORT = 443;
const PEER_PATH = '/api/chat/peerjs';
const NICK   = 'U' + Math.random().toString(36).slice(2,6).toUpperCase();
const POLL_MS = 5000;
const PING_MS = 8000;

const $=id=>document.getElementById(id);
const EL={
  lb:$('SC_lb'),ch:$('SC_ch'),
  iFI:$('SC_iFI'),bNB:$('SC_bNB'),rl:$('SC_rl'),st:$('SC_st'),
  moC:$('SC_moC'),iRN:$('SC_iRN'),iRP:$('SC_iRP'),bRC:$('SC_bRC'),bRX:$('SC_bRX'),
  moP:$('SC_moP'),mPN:$('SC_mPN'),iJP:$('SC_iJP'),bJJ:$('SC_bJJ'),bJX:$('SC_bJX'),
  nm:$('SC_nm'),pc:$('SC_pc'),
  bMC:$('SC_bMC'),bVC:$('SC_bVC'),bPC:$('SC_bPC'),bLV:$('SC_bLV'),
  vg:$('SC_vg'),mg:$('SC_mg'),iMI:$('SC_iMI'),bSB:$('SC_bSB'),
  pp:$('SC_pp'),pl:$('SC_pl'),
};

function setST(t,c){EL.st.textContent=t;EL.st.className=c||'';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLB(){EL.lb.classList.add('on');EL.ch.classList.remove('on');}
function showCH(){EL.lb.classList.remove('on');EL.ch.classList.add('on');}

let peer=null,myPid=null;
let curRoom=null,curPw='';
let conns={},calls={},pAu={},pVi={},pMu={},pNick={};
let aS=null,vS=null,muted=false,vidOn=false;
let pollIv=null,pingIv=null,pendJ=null;

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  if(!r.ok)throw new Error(r.status);
  return r.json();
}

async function loadRooms(){
  try{
    const list=await api('GET','/rooms');
    renderRooms(list);
    setST('');
  }catch(e){setST('Error red','er');}
}

function renderRooms(list){
  const fv=EL.iFI.value.trim().toLowerCase();
  const arr=(list||[]).filter(r=>!fv||r.name.toLowerCase().includes(fv));
  if(!arr.length){EL.rl.innerHTML='<div class="SC_nt">Sin salas — crea una</div>';return;}
  EL.rl.innerHTML='';
  arr.sort((a,b)=>b.ts-a.ts).forEach(r=>{
    const d=document.createElement('div');d.className='SC_ri';
    d.innerHTML=`<span class="SC_rn">${esc(r.name)}</span><span class="SC_rm">${r.hasPw?'🔒':''} ${r.count} peer${r.count!==1?'s':''}</span>`;
    d.onclick=()=>clickRoom(r);
    EL.rl.appendChild(d);
  });
}

setST('Cargando...');
loadRooms();
setInterval(loadRooms, POLL_MS);
EL.iFI.oninput=loadRooms;

EL.bNB.onclick=()=>{EL.moC.classList.add('on');EL.iRN.focus();};
EL.bRX.onclick=()=>EL.moC.classList.remove('on');
EL.bRC.onclick=createRoom;
EL.iRN.onkeydown=e=>{if(e.key==='Enter')createRoom();};

async function createRoom(){
  const name=EL.iRN.value.trim();if(!name)return;
  const pw=EL.iRP.value;
  try{
    const{id}=await api('POST','/rooms',{name,pw});
    EL.iRN.value='';EL.iRP.value='';
    EL.moC.classList.remove('on');
    await enterRoom(id,name,pw);
  }catch(e){setST('Error crear sala','er');}
}

function clickRoom(r){
  if(r.hasPw){
    pendJ=r;EL.mPN.textContent=r.name;
    EL.iJP.value='';EL.moP.classList.add('on');EL.iJP.focus();
  }else enterRoom(r.id,r.name,'');
}
EL.bJX.onclick=()=>{EL.moP.classList.remove('on');pendJ=null;};
EL.bJJ.onclick=()=>{
  if(!pendJ)return;
  const r=pendJ;pendJ=null;
  const pw=EL.iJP.value;EL.iJP.value='';EL.moP.classList.remove('on');
  enterRoom(r.id,r.name,pw);
};
EL.iJP.onkeydown=e=>{if(e.key==='Enter')EL.bJJ.onclick();};

async function initPeer(){
  return new Promise((resolve,reject)=>{
    if(peer&&!peer.destroyed&&peer.id){resolve(peer);return;}
    peer=new Peer();
    peer.on('open',id=>{myPid=id;resolve(peer);});
    peer.on('error',e=>{reject(e);});
    peer.on('connection',conn=>onConn(conn));
    peer.on('call',call=>{
      if(!aS&&!vS)return;
      const s=vS||aS;
      call.answer(s);
      handleCall(call);
    });
  });
}

function onConn(conn){
  conn.on('open',()=>{
    conns[conn.peer]=conn;
    pNick[conn.peer]=conn.metadata?.nick||conn.peer.slice(0,6);
    conn.send({type:'nick',nick:NICK});
    renderPeers();
  });
  conn.on('data',d=>onData(d,conn.peer));
  conn.on('close',()=>{disconnectPeer(conn.peer);});
  conn.on('error',()=>{disconnectPeer(conn.peer);});
}

function onData(d,pid){
  if(!d||!d.type)return;
  if(d.type==='msg')addMsg(pNick[pid]||pid,d.text,false);
  if(d.type==='nick'){pNick[pid]=d.nick;renderPeers();}
}

function handleCall(call){
  call.on('stream',stream=>{
    const pid=call.peer;
    calls[pid]=call;
    if(stream.getVideoTracks().length)addVE(pid,stream);
    else{
      let a=pAu[pid];
      if(!a){a=document.createElement('audio');a.autoplay=1;a.playsInline=1;document.body.appendChild(a);pAu[pid]=a;}
      a.srcObject=stream;if(pMu[pid])a.muted=true;
    }
  });
  call.on('close',()=>{rmVE(call.peer);});
}

function disconnectPeer(pid){
  addSys((pNick[pid]||pid)+' salio');
  delete conns[pid];delete pNick[pid];
  if(pAu[pid]){pAu[pid].pause();pAu[pid].srcObject=null;pAu[pid].remove();delete pAu[pid];}
  rmVE(pid);renderPeers();
}

async function enterRoom(id,name,pw){
  showCH();
  EL.mg.innerHTML='';EL.vg.innerHTML='';EL.vg.classList.remove('on');
  conns={};calls={};pAu={};pVi={};pMu={};pNick={};
  renderPeers();
  EL.nm.textContent=name.toUpperCase();
  EL.pc.textContent=pw?'🔒 privada':'🌐 publica';
  addSys('Conectando...');

  try{
    await initPeer();
  }catch(e){addSys('Error PeerJS: '+e.message);showLB();return;}

  let data;
  try{
    data=await api('POST',`/rooms/${id}/join`,{pw,pid:myPid,nick:NICK});
  }catch(e){
    addSys(e.message==='403'?'Contrasena incorrecta':'Error al unirse');
    showLB();return;
  }

  curRoom=id;curPw=pw;
  addSys('Conectado como '+NICK);

  const voiceP=startAudio();
  await voiceP;

  const others=(data.peers||[]).filter(p=>p.pid!==myPid);
  for(const p of others){
    const conn=peer.connect(p.pid,{metadata:{nick:NICK}});
    onConn(conn);
    if(aS){const call=peer.call(p.pid,aS);handleCall(call);}
  }

  pingIv=setInterval(async()=>{
    if(!curRoom)return;
    try{
      const d=await api('POST',`/rooms/${curRoom}/ping`,{pid:myPid});
      const active=(d.peers||[]).map(p=>p.pid);
      Object.keys(conns).forEach(pid=>{if(!active.includes(pid))disconnectPeer(pid);});
      peerCount(d.peers||[]);
    }catch(e){}
  },PING_MS);
}

function peerCount(peers){
  EL.pc.textContent=(curPw?'🔒 ':'🌐 ')+peers.length+' peer'+(peers.length!==1?'s':'');
}

async function startAudio(){
  try{
    aS=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    EL.bMC.textContent='🎤';muted=false;
  }catch(e){addSys('Sin microfono');EL.bMC.textContent='🚫';}
}

EL.bMC.onclick=()=>{
  if(!aS)return;muted=!muted;
  aS.getAudioTracks().forEach(t=>t.enabled=!muted);
  EL.bMC.textContent=muted?'🔇':'🎤';
};

EL.bVC.onclick=async()=>{
  if(!vidOn){
    try{
      vS=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      mkVE('me',NICK+' (tu)',vS,true);
      Object.keys(conns).forEach(pid=>{const c=peer.call(pid,vS);handleCall(c);});
      EL.vg.classList.add('on');vidOn=true;EL.bVC.textContent='📷✓';
    }catch(e){addSys('Sin camara');}
  }else{
    if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
    rmVE('me');vidOn=false;EL.bVC.textContent='📷';
    if(!Object.keys(pVi).length)EL.vg.classList.remove('on');
  }
};

function mkVE(id,label,stream,sm){
  if($('SC_VE_'+id))return $('SC_VE_'+id);
  const ve=document.createElement('div');ve.className='SC_ve';ve.id='SC_VE_'+id;
  const vid=document.createElement('video');vid.autoplay=1;vid.playsInline=1;if(sm)vid.muted=1;
  vid.srcObject=stream;
  const lbl=document.createElement('div');lbl.className='SC_vl';lbl.id='SC_VL_'+id;lbl.textContent=label;
  ve.appendChild(vid);ve.appendChild(lbl);EL.vg.appendChild(ve);
  return ve;
}
function addVE(id,s){
  const ve=mkVE(id,pNick[id]||id,s,false);
  pVi[id]=ve;ve.querySelector('video').srcObject=s;EL.vg.classList.add('on');
}
function rmVE(id){
  const v=$('SC_VE_'+id);if(v)v.remove();delete pVi[id];
  if(!Object.keys(pVi).length&&!vidOn)EL.vg.classList.remove('on');
}

EL.bPC.onclick=()=>EL.pp.classList.toggle('on');
function renderPeers(){
  const pids=Object.keys(conns);
  EL.pl.innerHTML=`<div class="SC_pr"><div class="SC_pn">${NICK} (tu)</div></div>`;
  pids.forEach(pid=>{
    const d=document.createElement('div');d.className='SC_pr';const mu=pMu[pid];
    d.innerHTML=`<div class="SC_pn">${esc(pNick[pid]||pid.slice(0,8))}</div><button class="SC_pm${mu?' mu':''}" data-p="${pid}">${mu?'🔇':'🔊'}</button>`;
    EL.pl.appendChild(d);
  });
  EL.pl.querySelectorAll('.SC_pm').forEach(b=>{
    b.onclick=()=>{
      const p=b.dataset.p;pMu[p]=!pMu[p];
      if(pAu[p])pAu[p].muted=pMu[p];
      b.classList.toggle('mu',pMu[p]);b.textContent=pMu[p]?'🔇':'🔊';
    };
  });
}

EL.bLV.onclick=leaveRoom;
async function leaveRoom(){
  clearInterval(pingIv);pingIv=null;
  if(curRoom&&myPid){
    api('DELETE',`/rooms/${curRoom}/leave`,{pid:myPid}).catch(()=>{});
  }
  Object.values(conns).forEach(c=>{try{c.close();}catch(e){}});
  Object.values(calls).forEach(c=>{try{c.close();}catch(e){}});
  if(aS){aS.getTracks().forEach(t=>t.stop());aS=null;}
  if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
  Object.values(pAu).forEach(a=>{a.pause();a.srcObject=null;a.remove();});
  if(peer){try{peer.destroy();}catch(e){}peer=null;myPid=null;}
  conns={};calls={};pAu={};pVi={};pMu={};pNick={};
  curRoom=null;curPw='';
  EL.vg.innerHTML='';EL.vg.classList.remove('on');
  EL.pp.classList.remove('on');
  EL.bMC.textContent='🎤';EL.bVC.textContent='📷';
  muted=false;vidOn=false;
  showLB();
}

EL.bSB.onclick=sendMsg;
EL.iMI.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
function sendMsg(){
  const v=EL.iMI.value.trim();if(!v||!Object.keys(conns).length)return;
  Object.values(conns).forEach(c=>{try{c.send({type:'msg',text:v});}catch(e){}});
  addMsg(NICK,v,true);EL.iMI.value='';
}
function addMsg(nm,txt,me){
  const d=document.createElement('div');d.className='SC_ms'+(me?' me':'');
  d.innerHTML=`<div class="SC_av">${esc(nm).slice(0,2)}</div><div>${!me?'<div class="SC_sn">'+esc(nm)+'</div>':''}<div class="SC_bu">${esc(txt)}</div></div>`;
  EL.mg.appendChild(d);EL.mg.scrollTop=EL.mg.scrollHeight;
}
function addSys(t){
  const d=document.createElement('div');d.className='SC_sy';d.textContent=t;
  EL.mg.appendChild(d);EL.mg.scrollTop=EL.mg.scrollHeight;
}

const cont=$('content');
if(cont)cont.addEventListener('contentUnload',()=>{
  leaveRoom();
  clearInterval(pollIv);
},{once:true});

})();
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</body>
</html>
