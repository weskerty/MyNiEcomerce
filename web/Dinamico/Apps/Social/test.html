<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"></head>
<body>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style data-content>
:root{--a:#c8ff00;--r:#ff2d4e;--d:#ffffff18;--t:#e8e8e8;}
*{box-sizing:border-box;margin:0;padding:0;}
#CW{width:100%;min-height:100vh;color:var(--t);background:transparent;display:flex;flex-direction:column;}
.CS{display:none;flex-direction:column;flex:1;}
.CS.on{display:flex;}
#CLB{padding:20px 16px;gap:10px;max-width:460px;width:100%;margin:0 auto;display:flex;flex-direction:column;}
#CLB h1{font-size:2rem;letter-spacing:6px;color:var(--a);text-shadow:0 0 20px #c8ff0033;text-align:center;}
.Clbl{font-size:.6rem;color:#ffffff44;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.Cdv{height:1px;background:var(--d);}
.Cip{width:100%;padding:8px 12px;background:transparent;border:1px solid #ffffff33;color:var(--t);font-size:.82rem;outline:none;transition:border-color .2s;}
.Cip:focus{border-color:var(--a);}
.Crw{display:flex;gap:8px;align-items:center;}
.Crw .Cip{flex:1;}
.Cbt{padding:7px 13px;background:transparent;border:1px solid var(--a);color:var(--a);font-size:.74rem;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .15s,color .15s;white-space:nowrap;}
.Cbt:hover{background:var(--a);color:#060608;}
.Cbt.r{border-color:var(--r);color:var(--r);}
.Cbt.r:hover{background:var(--r);color:#fff;}
.Cbt.d{border-color:#ffffff33;color:#ffffff55;}
.Cbt.d:hover{background:#ffffff11;color:#fff;}
.Cbt.sm{padding:5px 8px;font-size:.7rem;}
.Cbt.on{background:var(--a);color:#060608;}
#CST{font-size:.6rem;letter-spacing:1px;color:#ffffff33;text-align:right;}
#CST.ok{color:var(--a);}
#CST.er{color:var(--r);}
#CRL{display:flex;flex-direction:column;gap:6px;min-height:44px;}
.CRI{border:1px solid #ffffff1a;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,background .15s;}
.CRI:hover{border-color:var(--a);background:#c8ff0006;}
.CRN{font-size:.85rem;color:var(--a);}
.CRM{font-size:.6rem;color:#ffffff44;}
.CNT{font-size:.7rem;color:#ffffff33;text-align:center;padding:8px;}
.CMO{position:fixed;inset:0;background:#000000aa;display:none;align-items:center;justify-content:center;z-index:100;}
.CMO.on{display:flex;}
.CMB{width:min(300px,90vw);border:1px solid var(--d);background:#0b0b14;padding:20px 16px;display:flex;flex-direction:column;gap:9px;}
.CMB h2{font-size:.88rem;letter-spacing:2px;color:var(--a);text-align:center;}
#CCH{flex:1;flex-direction:column;min-width:0;}
#CHD{padding:8px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--d);flex-shrink:0;}
#CNM{font-size:.86rem;letter-spacing:2px;color:var(--a);flex:1;}
#CPC{font-size:.6rem;color:#ffffff44;}
#CVG{display:none;padding:8px;border-bottom:1px solid var(--d);background:#0a0a12;}
#CVG.on{display:block;}
#CVG h4{font-size:.6rem;letter-spacing:2px;color:#ffffff44;text-transform:uppercase;margin-bottom:6px;}
#CVL{display:flex;flex-wrap:wrap;gap:6px;}
.CVP{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.CVP video{width:100px;height:75px;object-fit:cover;border:1px solid var(--d);border-radius:4px;background:#000;display:block;}
.CVP video.off{display:none;}
.CVP .CVPn{font-size:.58rem;color:#ffffff66;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.CVP .CVPav{width:100px;height:75px;border-radius:4px;border:1px solid var(--d);object-fit:cover;display:none;}
.CVP.novid .CVPav{display:block;}
.CVP.novid video{display:none;}
.CVPbtn{font-size:.58rem;padding:2px 6px;border:1px solid #ffffff33;color:#ffffff66;background:transparent;cursor:pointer;border-radius:3px;}
.CVPbtn:hover{border-color:var(--a);color:var(--a);}
#CMG{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;min-width:0;}
.CMS{display:flex;gap:8px;align-items:flex-end;max-width:85%;}
.CMS.me{flex-direction:row-reverse;align-self:flex-end;}
.CAV{width:28px;height:28px;border-radius:50%;border:1px solid var(--d);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:900;flex-shrink:0;color:#060608;overflow:hidden;}
.CAV img{width:100%;height:100%;object-fit:cover;}
.CBU{padding:8px 12px;border-radius:18px;font-size:.82rem;line-height:1.4;max-width:100%;word-break:break-word;position:relative;}
.CMS.me .CBU{border-bottom-right-radius:4px;}
.CMS:not(.me) .CBU{border-bottom-left-radius:4px;}
.CSN{font-size:.6rem;margin-bottom:3px;opacity:.7;}
.CSY{font-size:.62rem;color:#ffffff33;text-align:center;padding:3px 0;}
.CIB{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--d);flex-shrink:0;align-items:center;}
.CIB .Cip{flex:1;}
#CPP{display:none;position:absolute;right:0;top:40px;width:180px;background:#0b0b14;border:1px solid var(--d);padding:10px;z-index:50;}
#CPP.on{display:block;}
#CPP h3{font-size:.65rem;letter-spacing:2px;color:var(--a);margin-bottom:8px;}
.CPR{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #ffffff0a;}
.CPN{font-size:.75rem;flex:1;}
.CPM{font-size:.7rem;background:transparent;border:none;cursor:pointer;color:#ffffff55;}
.CPM:hover{color:var(--a);}
#CHP{position:relative;}
.CFT{font-size:.72rem;padding:5px 10px;border-radius:10px;margin-top:2px;display:inline-block;}
.CFT a{color:inherit;text-decoration:underline;}
.CFP{font-size:.58rem;color:#ffffff66;margin-top:3px;}
#CSU{padding:20px 16px;gap:12px;max-width:400px;width:100%;margin:auto;display:flex;flex-direction:column;}
#CSU h2{font-size:1.2rem;letter-spacing:4px;color:var(--a);text-align:center;}
#CAVprev{width:72px;height:72px;border-radius:50%;border:2px solid var(--a);object-fit:cover;display:block;margin:0 auto;background:#ffffff11;}
#CAVprev.empty::after{content:'?';display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.5rem;color:#ffffff33;}
#CAVcanvas{display:none;}
</style>

<div id="CW">
  <div id="CSU" class="CS on">
    <h2>CHAT</h2>
    <div style="text-align:center">
      <img id="CAVprev" src="" alt="">
      <canvas id="CAVcanvas" width="50" height="50"></canvas>
      <div style="margin-top:8px">
        <label class="Cbt sm" style="cursor:pointer">Foto <input type="file" id="CAVinp" accept="image/*" style="display:none"></label>
      </div>
    </div>
    <div>
      <div class="Clbl">Tu nombre</div>
      <input id="CNKinp" class="Cip" placeholder="Nombre..." maxlength="24">
    </div>
    <button id="CBenter" class="Cbt">Entrar</button>
  </div>

  <div id="CLB" class="CS">
    <h1>CHAT</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <img id="CAvMe" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--d);object-fit:cover" src="" alt="">
      <span id="CNkMe" style="font-size:.8rem;color:var(--a);flex:1"></span>
      <button id="CBchg" class="Cbt sm d">Cambiar</button>
    </div>
    <div class="Cdv"></div>
    <div class="Crw">
      <input id="CiFI" class="Cip" placeholder="Buscar sala...">
      <button id="CBnb" class="Cbt">+ Nueva</button>
    </div>
    <div class="Clbl">Salas activas</div>
    <div id="CRL"><div class="CNT">Buscando...</div></div>
    <div id="CST"></div>
  </div>

  <div id="CCH" class="CS">
    <div id="CHD">
      <div id="CHP" style="flex:1">
        <div id="CNM">—</div>
        <div id="CPC"></div>
        <div id="CPP">
          <h3>PARTICIPANTES</h3>
          <div id="CPL"></div>
        </div>
      </div>
      <button id="CBmc" class="Cbt d sm">🎤</button>
      <button id="CBvc" class="Cbt d sm">📷</button>
      <button id="CBpc" class="Cbt d sm">👥</button>
      <button id="CBlv" class="Cbt r sm">Salir</button>
    </div>
    <div id="CVG">
      <h4>Video — click para ocultar/ver</h4>
      <div id="CVL"></div>
    </div>
    <div id="CMG"></div>
    <div class="CIB">
      <input id="CiMI" class="Cip" placeholder="Mensaje...">
      <label class="Cbt sm d" style="cursor:pointer" title="Archivo">📎<input type="file" id="CiFl" style="display:none"></label>
      <button id="CBsb" class="Cbt sm">➤</button>
    </div>
  </div>

  <div class="CMO" id="CMOc">
    <div class="CMB">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <img id="CMOav" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--d);object-fit:cover;background:#ffffff11" src="" alt="">
        <span id="CMOnk" style="font-size:.82rem;color:var(--a)"></span>
      </div>
      <div class="Cdv"></div>
      <div class="Clbl">Nombre sala</div>
      <input id="CiRN" class="Cip" placeholder="Nombre sala...">
      <div class="Clbl">Contrasena (opcional)</div>
      <input id="CiRP" class="Cip" type="password" placeholder="...">
      <div class="Crw">
        <button id="CBrc" class="Cbt" style="flex:1">Crear</button>
        <button id="CBrx" class="Cbt d">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="CMO" id="CMOp">
    <div class="CMB">
      <h2 id="CMpn"></h2>
      <div class="Clbl">Contrasena</div>
      <input id="CiJP" class="Cip" type="password">
      <div class="Crw">
        <button id="CBjj" class="Cbt" style="flex:1">Unirse</button>
        <button id="CBjx" class="Cbt d">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
const API='/api/chat';
const POLL=5000,PING=10000,DOM_MAX=50,HIST_MAX=200,CHUNK=16384;

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const PASTELS=['#ffd6d6','#ffd9b3','#fffacd','#d4f1d4','#d6eaff','#e8d5f5','#ffd6f0','#d5f0f0'];
const uColor={};
let colorIdx=0;
function getUC(pid){
  if(!uColor[pid])uColor[pid]=PASTELS[(colorIdx++)%PASTELS.length];
  return uColor[pid];
}

let myNick='',myAvB64='',peer=null,myPid=null,curRoom=null,curPw='';
let conns={},pAu={},pVi={},pMu={},pNick={},pAv={},pVidOn={};
let aS=null,vS=null,muted=false,vidOn=false,pingIv=null,pendJ=null;
let msgHist=[],domCount=0;
let fileChunks={},filesMeta={};

function loadProfile(){
  myNick=localStorage.getItem('cn_nick')||'';
  myAvB64=localStorage.getItem('cn_av')||'';
}
function saveProfile(){
  localStorage.setItem('cn_nick',myNick);
  localStorage.setItem('cn_av',myAvB64);
}

loadProfile();

const avPrev=$('CAVprev');
const avCanvas=$('CAVcanvas');
if(myAvB64)avPrev.src=myAvB64;
if(myNick)$('CNKinp').value=myNick;

$('CAVinp').onchange=function(){
  const f=this.files[0];if(!f)return;
  const img=new Image();
  const url=URL.createObjectURL(f);
  img.onload=()=>{
    const ctx=avCanvas.getContext('2d');
    ctx.drawImage(img,0,0,50,50);
    myAvB64=avCanvas.toDataURL('image/jpeg',0.4);
    avPrev.src=myAvB64;
    URL.revokeObjectURL(url);
  };
  img.src=url;
};

$('CBenter').onclick=()=>{
  const n=$('CNKinp').value.trim();
  if(!n)return;
  myNick=n;
  saveProfile();
  showLB();
};

$('CBchg').onclick=()=>{
  showScreen('CSU');
  if(myAvB64)avPrev.src=myAvB64;
  $('CNKinp').value=myNick;
};

function showScreen(id){
  ['CSU','CLB','CCH'].forEach(s=>{
    const el=$(s);
    if(el)el.classList.toggle('on',s===id);
  });
}
function showLB(){
  showScreen('CLB');
  $('CAvMe').src=myAvB64||'';
  $('CNkMe').textContent=myNick;
  setST('');
  loadRooms();
}
function showCH(){showScreen('CCH');}
const setST=(t,c)=>{$('CST').textContent=t;$('CST').className=c||'';};

if(myNick)showLB();

async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(API+path,o);
  if(!r.ok)throw new Error(String(r.status));
  return r.json();
}

async function loadRooms(){
  try{const list=await api('GET','/rooms');renderRooms(list);setST('');}
  catch(e){setST('Error red','er');}
}
function renderRooms(list){
  const fv=$('CiFI').value.trim().toLowerCase();
  const arr=(list||[]).filter(r=>!fv||r.name.toLowerCase().includes(fv));
  if(!arr.length){$('CRL').innerHTML='<div class="CNT">Sin salas</div>';return;}
  $('CRL').innerHTML='';
  arr.sort((a,b)=>b.ts-a.ts).forEach(r=>{
    const d=document.createElement('div');d.className='CRI';
    d.innerHTML=`<span class="CRN">${esc(r.name)}</span><span class="CRM">${r.hasPw?'🔒 ':''}${r.count||0} en sala</span>`;
    d.onclick=()=>clickRoom(r);$('CRL').appendChild(d);
  });
}
setST('Cargando...');
let pollIv=setInterval(loadRooms,POLL);
$('CiFI').oninput=loadRooms;

$('CBnb').onclick=()=>{
  $('CMOav').src=myAvB64||'';
  $('CMOnk').textContent=myNick;
  $('CMOc').classList.add('on');$('CiRN').focus();
};
$('CBrx').onclick=()=>$('CMOc').classList.remove('on');
$('CBrc').onclick=createRoom;
$('CiRN').onkeydown=e=>{if(e.key==='Enter')createRoom();};

async function createRoom(){
  const name=$('CiRN').value.trim();if(!name)return;
  const pw=$('CiRP').value;
  try{
    const{id}=await api('POST','/rooms',{name,pw});
    $('CiRN').value='';$('CiRP').value='';$('CMOc').classList.remove('on');
    enterRoom(id,name,pw);
  }catch(e){setST('Error crear sala','er');}
}
function clickRoom(r){
  if(r.hasPw){pendJ=r;$('CMpn').textContent=r.name;$('CiJP').value='';$('CMOp').classList.add('on');$('CiJP').focus();}
  else enterRoom(r.id,r.name,'');
}
$('CBjx').onclick=()=>{$('CMOp').classList.remove('on');pendJ=null;};
$('CBjj').onclick=()=>{
  if(!pendJ)return;const r=pendJ;pendJ=null;
  const pw=$('CiJP').value;$('CiJP').value='';$('CMOp').classList.remove('on');
  enterRoom(r.id,r.name,pw);
};
$('CiJP').onkeydown=e=>{if(e.key==='Enter')$('CBjj').onclick();};

function initPeer(){
  return new Promise((res,rej)=>{
    if(peer&&!peer.destroyed&&myPid){res();return;}
    if(peer&&!peer.destroyed)peer.destroy();
    peer=new Peer();
    peer.once('open',id=>{
      myPid=id;
      peer.on('connection',conn=>onConn(conn));
      peer.on('call',call=>{
        const combined=new MediaStream();
        if(aS)aS.getTracks().forEach(t=>combined.addTrack(t));
        if(vS)vS.getTracks().forEach(t=>combined.addTrack(t));
        call.answer(combined.getTracks().length?combined:new MediaStream());
        hCall(call);
      });
      peer.on('disconnected',()=>{if(curRoom)peer.reconnect();});
      res();
    });
    peer.once('error',e=>rej(e));
  });
}

function meta(){return{nick:myNick,av:myAvB64};}

function onConn(conn){
  conn.on('open',()=>{
    conns[conn.peer]=conn;
    const m=conn.metadata||{};
    pNick[conn.peer]=m.nick||conn.peer.slice(0,8);
    pAv[conn.peer]=m.av||'';
    conn.send({t:'meta',v:{nick:myNick,av:myAvB64}});
    conn.send({t:'history',v:msgHist.slice(-HIST_MAX)});
    addSys((pNick[conn.peer]||conn.peer.slice(0,8))+' se unio');
    renderPeers();
    callPeer(conn.peer);
  });
  conn.on('data',d=>onData(d,conn.peer));
  conn.on('close',()=>discPeer(conn.peer));
  conn.on('error',()=>discPeer(conn.peer));
}

function callPeer(pid){
  const combined=new MediaStream();
  if(aS)aS.getTracks().forEach(t=>combined.addTrack(t));
  if(vS)vS.getTracks().forEach(t=>combined.addTrack(t));
  if(!combined.getTracks().length)return;
  const c=peer.call(pid,combined,{metadata:meta()});
  hCall(c);
}

function onData(d,pid){
  if(!d||!d.t)return;
  if(d.t==='msg'){
    const col=getUC(pid);
    addMsg(pNick[pid]||pid,d.v,false,col,pAv[pid]||'',pid);
    pushHist({t:'msg',from:pid,nick:pNick[pid]||pid,v:d.v,col,av:pAv[pid]||''});
  }
  if(d.t==='meta'){pNick[pid]=d.v.nick||pNick[pid];pAv[pid]=d.v.av||'';renderPeers();}
  if(d.t==='history'){
    if(msgHist.length===0&&d.v&&d.v.length){
      d.v.forEach(m=>{
        if(m.t==='msg'){
          const col=m.col||getUC(m.from);
          uColor[m.from]=col;
          addMsg(m.nick,m.v,false,col,m.av||'',m.from);
          pushHist(m);
        }
      });
    }
  }
  if(d.t==='mute'){
    const el=document.getElementById('CVP_'+pid);
    if(el){const lbl=el.querySelector('.CVPn');if(lbl)lbl.textContent=(pNick[pid]||pid)+(d.v?' 🔇':'');}
  }
  if(d.t==='file_meta'){
    filesMeta[d.id]={name:d.name,size:d.size,mime:d.mime,chunks:[],total:d.total,from:pid};
    addFileMsg(pid,d);
  }
  if(d.t==='file_chunk'){
    const fm=filesMeta[d.id];
    if(!fm)return;
    fm.chunks.push(d.data);
    const prog=document.getElementById('CFP_'+d.id);
    if(prog)prog.textContent=`${fm.chunks.length}/${fm.total}`;
    if(fm.chunks.length>=fm.total){
      const blob=new Blob(fm.chunks.map(c=>Uint8Array.from(atob(c),x=>x.charCodeAt(0))),{type:fm.mime});
      const url=URL.createObjectURL(blob);
      const pp=document.getElementById('CFP_'+d.id);
      const wrap=document.getElementById('CFA_'+d.id);
      const isImg=/^image\//.test(fm.mime);
      const isVid=/^video\//.test(fm.mime);
      const small=fm.size<1048576;
      const isSticker=/^image\/(avif|webp)$/.test(fm.mime)&&fm.w>0&&fm.w<=512&&fm.h>0&&fm.h<=512;
      if(pp)pp.remove();
      if(wrap){
        if(isSticker){
          wrap.innerHTML='';
          const si=document.createElement('img');
          si.src=url;si.style.cssText='width:80px;height:80px;object-fit:contain;border-radius:4px;display:block;';
          wrap.appendChild(si);
        } else if(isImg&&small){
          wrap.innerHTML='';
          const im=document.createElement('img');
          im.src=url;im.style.cssText='max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:pointer;';
          im.onclick=()=>window.open(url,'_blank');
          wrap.appendChild(im);
        } else if(isVid&&small){
          wrap.innerHTML='';
          const vl=document.createElement('video');
          vl.src=url;vl.controls=1;vl.playsInline=1;
          vl.style.cssText='max-width:220px;border-radius:10px;display:block;';
          wrap.appendChild(vl);
        } else {
          wrap.innerHTML='';
          const a=document.createElement('a');
          a.href='#';a.textContent='Descargar '+fm.name;
          a.onclick=e=>{e.preventDefault();const dl=document.createElement('a');dl.href=url;dl.download=fm.name;dl.click();};
          wrap.appendChild(a);
        }
      }
      delete filesMeta[d.id];
    }
  }
}

function hCall(call){
  call.on('stream',stream=>{
    const pid=call.peer;
    const vTracks=stream.getVideoTracks();
    const aTracks=stream.getAudioTracks();
    if(vTracks.length){
      pVidOn[pid]=true;
      addVideoPeer(pid,stream);
    }
    if(aTracks.length){
      let a=pAu[pid];
      if(!a){a=document.createElement('audio');a.autoplay=1;a.playsInline=1;document.body.appendChild(a);pAu[pid]=a;}
      const as=new MediaStream(aTracks);
      a.srcObject=as;
      if(pMu[pid])a.muted=true;
    }
  });
  call.on('close',()=>{rmVideo(call.peer);});
}

function discPeer(pid){
  if(!conns[pid]&&!pNick[pid])return;
  addSys((pNick[pid]||pid)+' salio');
  delete conns[pid];delete pNick[pid];delete pVidOn[pid];
  if(pAu[pid]){pAu[pid].pause();pAu[pid].srcObject=null;pAu[pid].remove();delete pAu[pid];}
  rmVideo(pid);renderPeers();
}

async function enterRoom(id,name,pw){
  showCH();
  $('CMG').innerHTML='';$('CVL').innerHTML='';$('CVG').classList.remove('on');
  conns={};pAu={};pVi={};pMu={};pNick={};pAv={};pVidOn={};
  msgHist=[];domCount=0;
  $('CNM').textContent=name.toUpperCase();
  $('CPC').textContent=pw?'🔒 privada':'🌐 publica';
  addSys('Conectando...');renderPeers();

  try{await initPeer();}
  catch(e){addSys('Error PeerJS');showLB();return;}

  let data;
  try{data=await api('POST',`/rooms/${id}/join`,{pw,pid:myPid,nick:myNick});}
  catch(e){addSys(e.message==='403'?'Contrasena incorrecta':'Error al unirse');showLB();return;}

  curRoom=id;curPw=pw;
  addSys('Conectado como '+myNick);

  const others=(data.peers||[]).filter(p=>p.pid!==myPid);
  others.forEach(p=>{
    pNick[p.pid]=p.nick||p.pid.slice(0,8);
    const conn=peer.connect(p.pid,{metadata:meta(),reliable:true});
    onConn(conn);
  });

  startAudio();

  pingIv=setInterval(async()=>{
    if(!curRoom)return;
    try{
      const d=await api('POST',`/rooms/${curRoom}/ping`,{pid:myPid});
      const active=(d.peers||[]).map(p=>p.pid);
      Object.keys(conns).forEach(pid=>{if(!active.includes(pid))discPeer(pid);});
      $('CPC').textContent=(curPw?'🔒 ':'🌐 ')+active.length+' en sala';
    }catch(e){}
  },PING);
}

async function startAudio(){
  try{
    aS=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    $('CBmc').textContent='🎤';muted=false;
    Object.keys(conns).forEach(pid=>callPeer(pid));
  }catch(e){$('CBmc').textContent='🚫';}
}

$('CBmc').onclick=()=>{
  if(!aS)return;muted=!muted;
  aS.getAudioTracks().forEach(t=>t.enabled=!muted);
  $('CBmc').textContent=muted?'🔇':'🎤';
  broadcast({t:'mute',v:muted});
};

$('CBvc').onclick=async()=>{
  if(!vidOn){
    try{
      vS=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'user',width:{ideal:854},height:{ideal:480},frameRate:{ideal:24,max:24}},
        audio:false
      });
      addVideoSelf();
      Object.keys(conns).forEach(pid=>callPeer(pid));
      $('CVG').classList.add('on');
      vidOn=true;$('CBvc').classList.add('on');
    }catch(e){addSys('Sin camara');}
  }else{
    if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
    rmVideo('me');vidOn=false;$('CBvc').classList.remove('on');
    if(!Object.keys(pVidOn).length)$('CVG').classList.remove('on');
  }
};

function addVideoSelf(){
  let ve=document.getElementById('CVP_me');
  if(!ve){
    ve=document.createElement('div');ve.className='CVP';ve.id='CVP_me';
    const vid=document.createElement('video');vid.autoplay=1;vid.playsInline=1;vid.muted=1;
    const nm=document.createElement('div');nm.className='CVPn';nm.textContent=myNick+' (tu)';
    const btn=document.createElement('button');btn.className='CVPbtn';btn.textContent='Ocultar';
    btn.onclick=()=>toggleVideoView('me',btn,vid);
    ve.append(vid,nm,btn);$('CVL').appendChild(ve);
  }
  ve.querySelector('video').srcObject=vS;
}

function addVideoPeer(pid,stream){
  pVi[pid]=stream;
  let ve=document.getElementById('CVP_'+pid);
  if(!ve){
    ve=document.createElement('div');ve.className='CVP';ve.id='CVP_'+pid;
    const vid=document.createElement('video');vid.autoplay=1;vid.playsInline=1;
    const av=document.createElement('img');av.className='CVPav';
    if(pAv[pid])av.src=pAv[pid];
    const nm=document.createElement('div');nm.className='CVPn';nm.textContent=pNick[pid]||pid;
    const btn=document.createElement('button');btn.className='CVPbtn';btn.textContent='Ocultar';
    btn.onclick=()=>toggleVideoView(pid,btn,vid);
    ve.append(vid,av,nm,btn);$('CVL').appendChild(ve);
  }
  ve.querySelector('video').srcObject=stream;
  $('CVG').classList.add('on');
}

function toggleVideoView(pid,btn,vid){
  const showing=!vid.classList.contains('off');
  vid.classList.toggle('off',showing);
  const ve=document.getElementById('CVP_'+pid);
  if(ve)ve.classList.toggle('novid',showing);
  btn.textContent=showing?'Ver':'Ocultar';
}

function rmVideo(pid){
  const v=document.getElementById('CVP_'+pid);
  if(v)v.remove();
  delete pVi[pid];
  if(!Object.keys(pVi).length&&!vidOn)$('CVG').classList.remove('on');
}

$('CBpc').onclick=()=>$('CPP').classList.toggle('on');
document.addEventListener('click',e=>{
  if(!$('CPP').contains(e.target)&&!$('CBpc').contains(e.target))$('CPP').classList.remove('on');
});

function renderPeers(){
  $('CPL').innerHTML=`<div class="CPR"><div class="CPN">${esc(myNick)} (tu)</div></div>`;
  Object.keys(conns).forEach(pid=>{
    const mu=pMu[pid];
    const d=document.createElement('div');d.className='CPR';
    d.innerHTML=`<div class="CPN">${esc(pNick[pid]||pid.slice(0,8))}</div><button class="CPM${mu?' mu':''}" data-p="${pid}">${mu?'🔇':'🔊'}</button>`;
    $('CPL').appendChild(d);
  });
  $('CPL').querySelectorAll('.CPM').forEach(b=>{
    b.onclick=()=>{
      const p=b.dataset.p;pMu[p]=!pMu[p];
      if(pAu[p])pAu[p].muted=pMu[p];
      b.classList.toggle('mu',pMu[p]);b.textContent=pMu[p]?'🔇':'🔊';
    };
  });
}

$('CBlv').onclick=leaveRoom;
async function leaveRoom(){
  clearInterval(pingIv);pingIv=null;
  if(curRoom&&myPid)api('DELETE',`/rooms/${curRoom}/leave`,{pid:myPid}).catch(()=>{});
  Object.values(conns).forEach(c=>{try{c.close();}catch(e){}});
  if(aS){aS.getTracks().forEach(t=>t.stop());aS=null;}
  if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
  Object.values(pAu).forEach(a=>{a.pause();a.srcObject=null;a.remove();});
  if(peer){try{peer.destroy();}catch(e){}peer=null;myPid=null;}
  conns={};pAu={};pVi={};pMu={};pNick={};pAv={};pVidOn={};
  curRoom=null;curPw='';
  $('CVL').innerHTML='';$('CVG').classList.remove('on');
  $('CBmc').textContent='🎤';$('CBvc').classList.remove('on');
  muted=false;vidOn=false;
  showLB();
}

$('CBsb').onclick=sendMsg;
$('CiMI').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};

function sendMsg(){
  const v=$('CiMI').value.trim();if(!v)return;
  const col=getUC(myPid||'me');
  broadcast({t:'msg',v});
  addMsg(myNick,v,true,col,myAvB64,myPid||'me');
  pushHist({t:'msg',from:myPid||'me',nick:myNick,v,col,av:myAvB64});
  $('CiMI').value='';
}

function broadcast(data){
  Object.values(conns).filter(c=>c.open).forEach(c=>{try{c.send(data);}catch(e){}});
}

function pushHist(m){
  msgHist.push(m);
  if(msgHist.length>HIST_MAX)msgHist.shift();
}

function addMsg(nm,txt,me,col,av,pid){
  const mg=$('CMG');
  const atBottom=mg.scrollHeight-mg.scrollTop-mg.clientHeight<60;

  if(domCount>=DOM_MAX){
    const first=mg.querySelector('.CMS,.CSY');
    if(first)first.remove();
  } else {
    domCount++;
  }

  const d=document.createElement('div');
  d.className='CMS'+(me?' me':'');
  const avEl=av
    ?`<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    :`<span>${esc(nm).slice(0,2).toUpperCase()}</span>`;
  const bgCol=me?'rgba(255,255,255,0.12)':col+'cc';
  const txtCol=me?'#fff':'#222';
  d.innerHTML=`<div class="CAV" style="background:${me?'#ffffff22':col}">${avEl}</div>`+
    `<div style="max-width:75%">`+
    (!me?`<div class="CSN" style="color:${col}">${esc(nm)}</div>`:'')+ 
    `<div class="CBU" style="background:${bgCol};color:${txtCol}">${esc(txt)}</div>`+
    `</div>`;
  mg.appendChild(d);
  if(atBottom)mg.scrollTop=mg.scrollHeight;
}

function addSys(t){
  const mg=$('CMG');
  const d=document.createElement('div');d.className='CSY';d.textContent=t;
  if(domCount>=DOM_MAX){const f=mg.querySelector('.CMS,.CSY');if(f)f.remove();}
  else domCount++;
  mg.appendChild(d);mg.scrollTop=mg.scrollHeight;
}

$('CiFl').onchange=function(){
  const f=this.files[0];if(!f)return;
  sendFile(f);this.value='';
};

function sendFile(file){
  const id=Math.random().toString(36).slice(2,10);
  const total=Math.ceil(file.size/CHUNK);
  const col=getUC(myPid||'me');
  function doSend(w,h){
    broadcast({t:'file_meta',id,name:file.name,size:file.size,mime:file.type||'application/octet-stream',total,w:w||0,h:h||0});
    addOwnFileMsg(file,id);
    pushHist({t:'msg',from:myPid||'me',nick:myNick,v:`[${file.name}]`,col,av:myAvB64});
    const r2=new FileReader();let off=0,ix=0;
    const rc=()=>r2.readAsArrayBuffer(file.slice(off,off+CHUNK));
    r2.onload=e=>{
      broadcast({t:'file_chunk',id,data:btoa(String.fromCharCode(...new Uint8Array(e.target.result))),idx:ix});
      off+=CHUNK;ix++;if(off<file.size)rc();
    };
    rc();
  }
  if(/^image\//.test(file.type)){
    const u=URL.createObjectURL(file),i=new Image();
    i.onload=()=>{doSend(i.naturalWidth,i.naturalHeight);URL.revokeObjectURL(u);};
    i.onerror=()=>{doSend(0,0);URL.revokeObjectURL(u);};
    i.src=u;
  } else doSend(0,0);
}

function addOwnFileMsg(file,id){
  const mg=$('CMG');
  const col=getUC(myPid||'me');
  if(domCount>=DOM_MAX){const f=mg.querySelector('.CMS,.CSY');if(f)f.remove();}else domCount++;
  const d=document.createElement('div');d.className='CMS me';
  const avEl=myAvB64?`<img src="${myAvB64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span>${myNick.slice(0,2).toUpperCase()}</span>`;
  d.innerHTML=`<div class="CAV" style="background:#ffffff22">${avEl}</div>`+
    `<div><div class="CBU" style="background:rgba(255,255,255,0.12);color:#fff">`+
    `📎 ${esc(file.name)} <span style="font-size:.6rem;color:#ffffff55">(${(file.size/1024).toFixed(1)}KB)</span>`+
    `</div></div>`;
  mg.appendChild(d);mg.scrollTop=mg.scrollHeight;
}

function addFileMsg(pid,d){
  const mg=$('CMG');
  const col=getUC(pid);
  const nm=pNick[pid]||pid;
  const av=pAv[pid]||'';
  if(domCount>=DOM_MAX){const f=mg.querySelector('.CMS,.CSY');if(f)f.remove();}else domCount++;
  const el=document.createElement('div');el.className='CMS';
  const avEl=av?`<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span>${esc(nm).slice(0,2).toUpperCase()}</span>`;
  el.innerHTML=`<div class="CAV" style="background:${col}">${avEl}</div>`+
    `<div style="max-width:75%">`+
    `<div class="CSN" style="color:${col}">${esc(nm)}</div>`+
    `<div class="CBU" style="background:${col}cc;color:#222">`+
    `<span style="font-size:.7rem;opacity:.6">📎 ${esc(d.name)}</span>`+
    `<div id="CFA_${d.id}" style="margin-top:4px"></div>`+
    `<div class="CFP" id="CFP_${d.id}" style="font-size:.58rem;color:#ffffff66;margin-top:2px">0/${d.total}</div>`+
    `</div></div>`;
  mg.appendChild(el);mg.scrollTop=mg.scrollHeight;
}

const cont=$('content');
if(cont)cont.addEventListener('contentUnload',()=>{
  clearInterval(pollIv);
  leaveRoom();
},{once:true});

document.addEventListener('contentUnload',()=>{
  clearInterval(pollIv);
  leaveRoom();
},{once:true});

})();
</script>
