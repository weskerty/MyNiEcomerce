<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"></head>
<body>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
<style data-content>
:root{--a:#c8ff00;--r:#ff2d4e;--d:#ffffff18;--t:#e8e8e8;--bg:#0b0b14;--bg2:#0f0f1a;}
*{box-sizing:border-box;margin:0;padding:0;}
#CW{width:100%;height:100vh;color:var(--t);background:transparent;position:relative;overflow:hidden;}
.CS{display:none;flex-direction:column;position:absolute;inset:0;overflow:hidden;}
.CS.on{display:flex;}

/* setup */
#CSU{padding:20px 16px;gap:14px;max-width:400px;width:100%;margin:auto;display:flex;flex-direction:column;}
#CSU h2{font-size:1.2rem;letter-spacing:4px;color:var(--a);text-align:center;}
#C_AVp{width:72px;height:72px;border-radius:50%;border:2px solid var(--a);object-fit:cover;display:block;margin:0 auto;background:#ffffff11;}
#C_AVc{display:none;}

/* lobby */
#CLB{padding:20px 16px;gap:10px;max-width:460px;width:100%;margin:0 auto;display:flex;flex-direction:column;}
#CLB h1{font-size:2rem;letter-spacing:6px;color:var(--a);text-shadow:0 0 20px #c8ff0033;text-align:center;}

/* shared primitives */
.Clbl{font-size:.6rem;color:#ffffff44;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.Cdv{height:1px;background:var(--d);}
.Cip{width:100%;padding:8px 12px;background:transparent;border:1px solid #ffffff33;color:var(--t);font-size:.82rem;outline:none;transition:border-color .2s;}
.Cip:focus{border-color:var(--a);}
.Crw{display:flex;gap:8px;align-items:center;}
.Crw .Cip{flex:1;}
.Cbt{padding:7px 13px;background:transparent;border:1px solid var(--a);color:var(--a);font-size:.74rem;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:background .15s,color .15s;white-space:nowrap;}
.Cbt:hover{background:var(--a);color:#060608;}
.Cbt.r{border-color:var(--r);color:var(--r);}
.Cbt.r:hover{background:var(--r);color:#fff;}
.Cbt.d{border-color:#ffffff33;color:#ffffff55;}
.Cbt.d:hover{background:#ffffff11;color:#fff;}
.Cbt.sm{padding:5px 8px;font-size:.7rem;}
.Cbt.on{background:var(--a);color:#060608;}
#C_ST{font-size:.6rem;letter-spacing:1px;color:#ffffff33;text-align:right;}
#C_ST.ok{color:var(--a);}
#C_ST.er{color:var(--r);}

/* room list */
#C_RL{display:flex;flex-direction:column;gap:6px;min-height:44px;}
.C_RI{border:1px solid #ffffff1a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,background .15s;border-radius:4px;}
.C_RI:hover{border-color:var(--a);background:#c8ff0006;}
.C_RN{font-size:.85rem;color:var(--a);}
.C_RM{font-size:.6rem;color:#ffffff44;}
.CNT{font-size:.7rem;color:#ffffff33;text-align:center;padding:8px;}

/* modals */
.CMO{position:fixed;inset:0;background:#000000bb;display:none;align-items:center;justify-content:center;z-index:100;}
.CMO.on{display:flex;}
.CMB{width:min(320px,92vw);border:1px solid var(--d);background:var(--bg);padding:20px 16px;display:flex;flex-direction:column;gap:9px;border-radius:6px;}
.CMB h2{font-size:.88rem;letter-spacing:2px;color:var(--a);text-align:center;}

/* chat screen */
#CCH{flex:1;flex-direction:column;min-width:0;position:relative;}
#C_HD{padding:8px 12px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--d);flex-shrink:0;background:var(--bg);}
#C_NM{font-size:.86rem;letter-spacing:2px;color:var(--a);flex:1;}
#C_PC{font-size:.6rem;color:#ffffff44;}
#C_HP{flex:1;cursor:pointer;}
#C_PP{position:absolute;left:12px;top:44px;width:180px;background:var(--bg);border:1px solid var(--d);padding:10px;z-index:50;border-radius:4px;display:none;}
#C_PP.on{display:block;}
#C_PP h3{font-size:.65rem;letter-spacing:2px;color:var(--a);margin-bottom:8px;}
.C_PR{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #ffffff0a;}
.C_PN{font-size:.75rem;flex:1;}
.C_PM{font-size:.7rem;background:transparent;border:none;cursor:pointer;color:#ffffff55;}
.C_PM:hover{color:var(--a);}

/* video strip */
#C_VG{display:none;padding:8px;border-bottom:1px solid var(--d);background:#0a0a12;}
#C_VG.on{display:block;}
#C_VG h4{font-size:.6rem;letter-spacing:2px;color:#ffffff44;text-transform:uppercase;margin-bottom:6px;}
#C_VL{display:flex;flex-wrap:wrap;gap:6px;}
.C_VP{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.C_VP video{width:100px;height:75px;object-fit:cover;border:1px solid var(--d);border-radius:4px;background:#000;display:block;}
.C_VP .C_VPn{font-size:.58rem;color:#ffffff66;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.C_VP .C_VPav{width:100px;height:75px;border-radius:4px;border:1px solid var(--d);object-fit:cover;display:none;}
.C_VP.novid .C_VPav{display:block;}
.C_VP.novid video{display:none;}
.C_VPb{font-size:.58rem;padding:2px 6px;border:1px solid #ffffff33;color:#ffffff66;background:transparent;cursor:pointer;border-radius:3px;}
.C_VPb:hover{border-color:var(--a);color:var(--a);}

/* messages */
#C_MG{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;min-width:0;transition:height .2s;}
.C_MS{display:flex;gap:8px;align-items:flex-end;max-width:85%;}
.C_MS.me{flex-direction:row-reverse;align-self:flex-end;}
.C_AV{width:28px;height:28px;border-radius:50%;border:1px solid var(--d);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:900;flex-shrink:0;color:#060608;overflow:hidden;}
.C_AV img{width:100%;height:100%;object-fit:cover;}
.C_BU{padding:8px 12px;border-radius:18px;font-size:.82rem;line-height:1.4;max-width:100%;word-break:break-word;}
.C_MS.me .C_BU{border-bottom-right-radius:4px;}
.C_MS:not(.me) .C_BU{border-bottom-left-radius:4px;}
.C_SN{font-size:.6rem;margin-bottom:3px;opacity:.7;}
.C_SY{font-size:.62rem;color:#ffffff33;text-align:center;padding:3px 0;}
.C_FP{font-size:.58rem;color:#ffffff66;margin-top:2px;}

/* sticker bubble */
.C_SK{width:128px;height:128px;display:block;image-rendering:auto;}

/* file download button */
.C_DL{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid #ffffff33;border-radius:8px;font-size:.72rem;color:#ffffff88;cursor:pointer;margin-top:4px;background:#ffffff08;transition:border-color .15s,color .15s;}
.C_DL:hover{border-color:var(--a);color:var(--a);}
.C_FN{font-size:.72rem;padding:5px 10px;border-radius:10px;margin-top:2px;display:inline-block;}

/* input bar */
.C_IB{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--d);flex-shrink:0;align-items:center;background:var(--bg);position:relative;z-index:10;}
.C_IB .Cip{flex:1;}

/* emoji/sticker drawer */
#C_EP{position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border-top:1px solid var(--d);display:none;flex-direction:column;z-index:20;max-height:320px;}
#C_EP.on{display:flex;}
#C_ET{display:flex;border-bottom:1px solid var(--d);}
.C_ETb{flex:1;padding:8px;font-size:.72rem;letter-spacing:1px;background:transparent;border:none;color:#ffffff55;cursor:pointer;text-transform:uppercase;transition:color .15s,border-bottom .15s;border-bottom:2px solid transparent;}
.C_ETb.on{color:var(--a);border-bottom-color:var(--a);}
#C_EPC{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#C_EPC emoji-picker{--background:transparent;--border-color:var(--d);--text-color:var(--t);--emoji-size:1.4rem;--num-columns:8;--input-border-radius:4px;--input-font-size:.75rem;--input-padding:.4rem .6rem;width:100%;height:100%;flex:1;}
#C_SPC{flex:1;overflow-y:auto;padding:8px;display:none;flex-wrap:wrap;gap:6px;align-content:flex-start;}
#C_SPC.on{display:flex;}
#C_EPC.stkmode{display:none;}
#C_EPC.stkmode~#C_SPC{display:flex;}

/* sticker item in panel */
.C_SI{width:72px;height:72px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;position:relative;flex-shrink:0;}
.C_SI:hover{border-color:var(--a);}
.C_SI img{width:100%;height:100%;object-fit:fill;}
.C_SI.held{border-color:var(--r);}

/* sticker creator modal */
#C_SCM .CMB{max-width:min(340px,94vw);}
#C_SCv{display:block;max-width:100%;border-radius:4px;border:1px solid var(--d);background:#000;margin:0 auto;}
#C_SCc{display:none;}
#C_SCp{width:100%;height:200px;object-fit:contain;background:#000;border-radius:4px;border:1px solid var(--d);display:none;}
.C_SCpv{width:100%;height:200px;background:#111;border-radius:4px;border:1px solid var(--d);display:flex;align-items:center;justify-content:center;color:#ffffff33;font-size:.8rem;}

/* avatar in create room modal */
#C_MO_av{width:40px;height:40px;border-radius:50%;border:2px solid var(--a);object-fit:cover;background:#ffffff11;cursor:pointer;}
.C_MO_avwrap{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
</style>

<div id="CW">

  <!-- setup screen -->
  <div id="CSU" class="CS on">
    <h2>CHAT</h2>
    <div style="text-align:center">
      <img id="C_AVp" src="" alt="">
      <canvas id="C_AVc" width="50" height="50"></canvas>
      <div style="margin-top:8px">
        <label class="Cbt sm" style="cursor:pointer">Foto <input type="file" id="C_AVi" accept="image/*" style="display:none"></label>
      </div>
    </div>
    <div>
      <div class="Clbl">Nombre</div>
      <input id="C_NKi" class="Cip" placeholder="Nombre..." maxlength="24">
    </div>
    <button id="C_BEN" class="Cbt">Entrar</button>
  </div>

  <!-- lobby screen -->
  <div id="CLB" class="CS">
    <h1>CHAT</h1>
    <div class="Crw">
      <input id="C_FI" class="Cip" placeholder="Buscar sala...">
      <button id="C_BNB" class="Cbt">+ Nueva</button>
    </div>
    <div class="Clbl">Salas activas</div>
    <div id="C_RL"><div class="CNT">Buscando...</div></div>
    <div id="C_ST"></div>
  </div>

  <!-- chat screen -->
  <div id="CCH" class="CS">
    <div id="C_HD">
      <button id="C_BBK" class="Cbt d sm">←</button>
      <div id="C_HP">
        <div id="C_NM">—</div>
        <div id="C_PC"></div>
      </div>
      <button id="C_BMC" class="Cbt d sm">🎤</button>
      <button id="C_BVC" class="Cbt d sm">📷</button>
      <button id="C_BPC" class="Cbt d sm">👥</button>
      <button id="C_BLV" class="Cbt r sm">Salir</button>
    </div>
    <div id="C_PP">
      <h3>PARTICIPANTES</h3>
      <div id="C_PL"></div>
    </div>
    <div id="C_VG">
      <h4>Video</h4>
      <div id="C_VL"></div>
    </div>
    <div id="C_MG"></div>
    <div class="C_IB" style="position:relative;">
      <div id="C_EP">
        <div id="C_ET">
          <button class="C_ETb on" id="C_ETe">Emoji</button>
          <button class="C_ETb" id="C_ETs">Stickers</button>
          <button class="C_ETb" id="C_ETsc" style="flex:none;padding:8px 10px;">+</button>
        </div>
        <div id="C_EPC"><emoji-picker id="C_EMJ"></emoji-picker></div>
        <div id="C_SPC"></div>
      </div>
      <button id="C_BEP" class="Cbt sm d">😊</button>
      <input id="C_MI" class="Cip" placeholder="Mensaje...">
      <label class="Cbt sm d" style="cursor:pointer" title="Archivo">📎<input type="file" id="C_FL" style="display:none"></label>
      <button id="C_BSB" class="Cbt sm">➤</button>
    </div>
  </div>

  <!-- create room modal -->
  <div class="CMO" id="C_MOc">
    <div class="CMB">
      <div class="C_MO_avwrap">
        <img id="C_MO_av" src="" alt="" title="Cambiar foto">
        <input type="file" id="C_MO_avi" accept="image/*" style="display:none">
        <div style="flex:1">
          <div style="font-size:.82rem;color:var(--a)" id="C_MO_nk"></div>
          <div style="font-size:.6rem;color:#ffffff44">Tu perfil</div>
        </div>
        <button id="C_MO_chg" class="Cbt sm d">Editar</button>
      </div>
      <div class="Cdv"></div>
      <div class="Clbl">Nombre sala</div>
      <input id="C_iRN" class="Cip" placeholder="Nombre sala...">
      <div class="Clbl">Contrasena (opcional)</div>
      <input id="C_iRP" class="Cip" type="password" placeholder="...">
      <div class="Crw">
        <button id="C_BRC" class="Cbt" style="flex:1">Crear</button>
        <button id="C_BRX" class="Cbt d">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- join room modal -->
  <div class="CMO" id="C_MOp">
    <div class="CMB">
      <h2 id="C_Mpn"></h2>
      <div class="Clbl">Contrasena</div>
      <input id="C_iJP" class="Cip" type="password">
      <div class="Crw">
        <button id="C_BJJ" class="Cbt" style="flex:1">Unirse</button>
        <button id="C_BJX" class="Cbt d">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- sticker creator modal -->
  <div class="CMO" id="C_SCM">
    <div class="CMB" id="C_SCM_b">
      <h2>Crear Sticker</h2>
      <div class="C_SCpv" id="C_SCpv">Elige una imagen</div>
      <img id="C_SCp" src="" alt="">
      <canvas id="C_SCc" width="512" height="512"></canvas>
      <div class="Crw">
        <label class="Cbt sm d" style="cursor:pointer;flex:1;text-align:center">Elegir<input type="file" id="C_SCi" accept="image/*" style="display:none"></label>
        <button id="C_SCok" class="Cbt" style="flex:1">Guardar y Enviar</button>
        <button id="C_SCx" class="Cbt d">×</button>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
const API='/api/chat';
const POLL=5000,PING=10000,DOM_MAX=50,HIST_MAX=200,CHUNK=16384;
const OPFS_DIR='chat/stickers';
const STK_MAX=1048576;
const IMG_AUTO_MAX=1048576;

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const PASTELS=['#ffd6d6','#ffd9b3','#fffacd','#d4f1d4','#d6eaff','#e8d5f5','#ffd6f0','#d5f0f0'];
const uColor={};let colorIdx=0;
function getUC(pid){if(!uColor[pid])uColor[pid]=PASTELS[(colorIdx++)%PASTELS.length];return uColor[pid];}

let myNick='',myAvB64='',peer=null,myPid=null,curRoom=null,curPw='';
let conns={},pAu={},pVi={},pViStr={},pMu={},pNick={},pAv={},pVidOn={};
let aS=null,vS=null,muted=false,vidOn=false,pingIv=null,pendJ=null;
let msgHist=[],domCount=0,fileChunks={},filesMeta={};
let stickerFiles=[];

function loadProfile(){myNick=localStorage.getItem('cn_nick')||'';myAvB64=localStorage.getItem('cn_av')||'';}
function saveProfile(){localStorage.setItem('cn_nick',myNick);localStorage.setItem('cn_av',myAvB64);}
loadProfile();

const avPrev=$('C_AVp');
const avCanvas=$('C_AVc');
if(myAvB64)avPrev.src=myAvB64;
if(myNick)$('C_NKi').value=myNick;

function processAvatar(file,cb){
  const img=new Image(),url=URL.createObjectURL(file);
  img.onload=()=>{
    const ctx=avCanvas.getContext('2d');
    ctx.drawImage(img,0,0,50,50);
    cb(avCanvas.toDataURL('image/jpeg',0.4));
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

$('C_AVi').onchange=function(){
  const f=this.files[0];if(!f)return;
  processAvatar(f,b64=>{myAvB64=b64;avPrev.src=b64;});
};

$('C_BEN').onclick=()=>{
  const n=$('C_NKi').value.trim();if(!n)return;
  myNick=n;saveProfile();showLB();
};

function showScreen(id){
  ['CSU','CLB','CCH'].forEach(s=>{const el=$(s);if(el)el.classList.toggle('on',s===id);});
}
function showLB(){showScreen('CLB');setST('');loadRooms();}
function showCH(){showScreen('CCH');}
const setST=(t,c)=>{$('C_ST').textContent=t;$('C_ST').className=c||'';};

if(myNick)showLB();

async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(API+path,o);
  if(!r.ok)throw new Error(String(r.status));
  return r.json();
}

async function loadRooms(){
  try{const list=await api('GET','/rooms');renderRooms(list);setST('');}
  catch(e){setST('Error red','er');}
}
function renderRooms(list){
  const fv=$('C_FI').value.trim().toLowerCase();
  const arr=(list||[]).filter(r=>!fv||r.name.toLowerCase().includes(fv));
  if(!arr.length){$('C_RL').innerHTML='<div class="CNT">Sin salas</div>';return;}
  $('C_RL').innerHTML='';
  arr.sort((a,b)=>b.ts-a.ts).forEach(r=>{
    const d=document.createElement('div');d.className='C_RI';
    d.innerHTML=`<span class="C_RN">${esc(r.name)}</span><span class="C_RM">${r.hasPw?'🔒 ':''}${r.count||0} en sala</span>`;
    d.onclick=()=>clickRoom(r);$('C_RL').appendChild(d);
  });
}
setST('Cargando...');
let pollIv=setInterval(loadRooms,POLL);
$('C_FI').oninput=loadRooms;

$('C_BNB').onclick=()=>{
  $('C_MO_av').src=myAvB64||'';
  $('C_MO_nk').textContent=myNick;
  $('C_MOc').classList.add('on');
  $('C_iRN').focus();
};
$('C_BRX').onclick=()=>$('C_MOc').classList.remove('on');
$('C_BRC').onclick=createRoom;
$('C_iRN').onkeydown=e=>{if(e.key==='Enter')createRoom();};

$('C_MO_chg').onclick=()=>{
  $('C_MOc').classList.remove('on');
  showScreen('CSU');
  if(myAvB64)avPrev.src=myAvB64;
  $('C_NKi').value=myNick;
};
$('C_MO_av').onclick=()=>$('C_MO_avi').click();
$('C_MO_avi').onchange=function(){
  const f=this.files[0];if(!f)return;
  processAvatar(f,b64=>{myAvB64=b64;myAvB64&&($('C_MO_av').src=b64);saveProfile();});
};

async function createRoom(){
  const name=$('C_iRN').value.trim();if(!name)return;
  const pw=$('C_iRP').value;
  try{
    const{id}=await api('POST','/rooms',{name,pw});
    $('C_iRN').value='';$('C_iRP').value='';$('C_MOc').classList.remove('on');
    enterRoom(id,name,pw);
  }catch(e){setST('Error crear sala','er');}
}

function clickRoom(r){
  if(r.hasPw){pendJ=r;$('C_Mpn').textContent=r.name;$('C_iJP').value='';$('C_MOp').classList.add('on');$('C_iJP').focus();}
  else enterRoom(r.id,r.name,'');
}
$('C_BJX').onclick=()=>{$('C_MOp').classList.remove('on');pendJ=null;};
$('C_BJJ').onclick=()=>{
  if(!pendJ)return;const r=pendJ;pendJ=null;
  const pw=$('C_iJP').value;$('C_iJP').value='';$('C_MOp').classList.remove('on');
  enterRoom(r.id,r.name,pw);
};
$('C_iJP').onkeydown=e=>{if(e.key==='Enter')$('C_BJJ').onclick();};

$('C_BBK').onclick=leaveRoom;
$('C_BLV').onclick=leaveRoom;
async function leaveRoom(){
  clearInterval(pingIv);pingIv=null;
  if(curRoom&&myPid)api('DELETE',`/rooms/${curRoom}/leave`,{pid:myPid}).catch(()=>{});
  Object.values(conns).forEach(c=>{try{c.close();}catch(e){}});
  if(aS){aS.getTracks().forEach(t=>t.stop());aS=null;}
  if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
  Object.values(pAu).forEach(a=>{a.pause();a.srcObject=null;a.remove();});
  if(peer){try{peer.destroy();}catch(e){}peer=null;myPid=null;}
  conns={};pAu={};pVi={};pViStr={};pMu={};pNick={};pAv={};pVidOn={};
  curRoom=null;curPw='';
  $('C_VL').innerHTML='';$('C_VG').classList.remove('on');
  $('C_BMC').textContent='🎤';$('C_BVC').classList.remove('on');
  muted=false;vidOn=false;
  closeEP();
  showLB();
}

function initPeer(){
  return new Promise((res,rej)=>{
    if(peer&&!peer.destroyed&&myPid){res();return;}
    if(peer&&!peer.destroyed)peer.destroy();
    peer=new Peer();
    peer.once('open',id=>{
      myPid=id;
      peer.on('connection',conn=>onConn(conn));
      peer.on('call',call=>{
        const combined=new MediaStream();
        if(aS)aS.getTracks().forEach(t=>combined.addTrack(t));
        if(vS)vS.getTracks().forEach(t=>combined.addTrack(t));
        call.answer(combined.getTracks().length?combined:new MediaStream());
        hCall(call);
      });
      peer.on('disconnected',()=>{if(curRoom)peer.reconnect();});
      res();
    });
    peer.once('error',e=>rej(e));
  });
}

function meta(){return{nick:myNick,av:myAvB64};}

function onConn(conn){
  conn.on('open',()=>{
    conns[conn.peer]=conn;
    const m=conn.metadata||{};
    pNick[conn.peer]=m.nick||conn.peer.slice(0,8);
    pAv[conn.peer]=m.av||'';
    conn.send({t:'meta',v:{nick:myNick,av:myAvB64}});
    conn.send({t:'history',v:msgHist.slice(-HIST_MAX)});
    addSys((pNick[conn.peer]||conn.peer.slice(0,8))+' se unio');
    renderPeers();callPeer(conn.peer);
  });
  conn.on('data',d=>onData(d,conn.peer));
  conn.on('close',()=>discPeer(conn.peer));
  conn.on('error',()=>discPeer(conn.peer));
}

function callPeer(pid){
  const combined=new MediaStream();
  if(aS)aS.getTracks().forEach(t=>combined.addTrack(t));
  if(vS)vS.getTracks().forEach(t=>combined.addTrack(t));
  if(!combined.getTracks().length)return;
  const c=peer.call(pid,combined,{metadata:meta()});
  hCall(c);
}

function onData(d,pid){
  if(!d||!d.t)return;
  if(d.t==='msg'){
    const col=getUC(pid);
    addMsg(pNick[pid]||pid,d.v,false,col,pAv[pid]||'',pid);
    pushHist({t:'msg',from:pid,nick:pNick[pid]||pid,v:d.v,col,av:pAv[pid]||''});
  }
  if(d.t==='meta'){pNick[pid]=d.v.nick||pNick[pid];pAv[pid]=d.v.av||'';renderPeers();}
  if(d.t==='history'){
    if(msgHist.length===0&&d.v&&d.v.length){
      d.v.forEach(m=>{
        if(m.t==='msg'){
          const col=m.col||getUC(m.from);
          uColor[m.from]=col;
          addMsg(m.nick,m.v,false,col,m.av||'',m.from);
          pushHist(m);
        }
      });
    }
  }
  if(d.t==='mute'){
    const el=document.getElementById('C_VP_'+pid);
    if(el){const lbl=el.querySelector('.C_VPn');if(lbl)lbl.textContent=(pNick[pid]||pid)+(d.v?' 🔇':'');}
  }
  if(d.t==='file_meta'){
    filesMeta[d.id]={name:d.name,size:d.size,mime:d.mime,chunks:[],total:d.total,from:pid,w:d.w||0,h:d.h||0};
    addFileMsg(pid,d);
  }
  if(d.t==='file_chunk'){
    const fm=filesMeta[d.id];if(!fm)return;
    fm.chunks.push(d.data);
    const prog=document.getElementById('C_FP_'+d.id);
    if(prog)prog.textContent=`${fm.chunks.length}/${fm.total}`;
    if(fm.chunks.length>=fm.total)assembleFile(d.id,fm);
  }
}

function isSticker(fm){
  return /^image\/(avif|webp|gif)$/.test(fm.mime)&&fm.w>0&&fm.w<=512&&fm.h>0&&fm.h<=512;
}
function isStickerVideo(fm){
  return /^video\/(webm)$/.test(fm.mime)&&fm.w>0&&fm.w<=512&&fm.h>0&&fm.h<=512;
}

function assembleFile(id,fm){
  const blob=new Blob(fm.chunks.map(c=>Uint8Array.from(atob(c),x=>x.charCodeAt(0))),{type:fm.mime});
  const url=URL.createObjectURL(blob);
  const wrap=document.getElementById('C_FA_'+id);
  const prog=document.getElementById('C_FP_'+id);
  const fnEl=document.getElementById('C_FN_'+id);
  if(prog)prog.remove();

  if(isSticker(fm)){
    if(fnEl)fnEl.remove();
    if(wrap){
      const img=document.createElement('img');
      img.src=url;img.className='C_SK';img.style.cssText='width:128px;height:128px;object-fit:fill;border-radius:4px;display:block;';
      wrap.innerHTML='';wrap.appendChild(img);
      addSaveToFavBtn(wrap,blob,fm.name);
    }
  } else if(isStickerVideo(fm)){
    if(fnEl)fnEl.remove();
    if(wrap){
      const v=document.createElement('video');
      v.src=url;v.autoplay=1;v.loop=1;v.muted=1;v.playsInline=1;
      v.style.cssText='width:128px;height:128px;object-fit:fill;border-radius:4px;display:block;';
      wrap.innerHTML='';wrap.appendChild(v);
      addSaveToFavBtn(wrap,blob,fm.name);
    }
  } else if(/^image\//.test(fm.mime)&&fm.size<=IMG_AUTO_MAX){
    if(wrap){
      const img=document.createElement('img');
      img.src=url;img.style.cssText='max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-top:4px;';
      img.onclick=()=>window.open(url,'_blank');
      wrap.innerHTML='';wrap.appendChild(img);
    }
  } else {
    if(wrap){
      const btn=document.createElement('button');
      btn.className='C_DL';
      btn.innerHTML=`⬇ ${esc(fm.name)} <span style="font-size:.6rem;color:#ffffff44">${fmtSz(fm.size)}</span>`;
      btn.onclick=()=>{const a=document.createElement('a');a.href=url;a.download=fm.name;a.click();};
      wrap.innerHTML='';wrap.appendChild(btn);
    }
  }
  delete filesMeta[id];
}

function addSaveToFavBtn(wrap,blob,name){
  const b=document.createElement('button');
  b.className='C_DL';b.style.cssText='font-size:.6rem;padding:3px 8px;margin-top:4px;';
  b.textContent='★ Favorito';
  b.onclick=async()=>{b.disabled=true;await saveStickerOPFS(blob,name);b.textContent='✓ Guardado';loadStickerPanel();};
  wrap.appendChild(b);
}

function fmtSz(b){return b>1048576?(b/1048576).toFixed(1)+'MB':(b/1024).toFixed(0)+'KB';}

function hCall(call){
  call.on('stream',stream=>{
    const pid=call.peer;
    const vTracks=stream.getVideoTracks();
    const aTracks=stream.getAudioTracks();
    if(vTracks.length){pVidOn[pid]=true;pViStr[pid]=stream;addVideoPeer(pid,stream);}
    if(aTracks.length){
      let a=pAu[pid];
      if(!a){a=document.createElement('audio');a.autoplay=1;a.playsInline=1;document.body.appendChild(a);pAu[pid]=a;}
      a.srcObject=new MediaStream(aTracks);
      if(pMu[pid])a.muted=true;
    }
  });
  call.on('close',()=>{rmVideo(call.peer);});
}

function discPeer(pid){
  if(!conns[pid]&&!pNick[pid])return;
  addSys((pNick[pid]||pid)+' salio');
  delete conns[pid];delete pNick[pid];delete pVidOn[pid];delete pViStr[pid];
  if(pAu[pid]){pAu[pid].pause();pAu[pid].srcObject=null;pAu[pid].remove();delete pAu[pid];}
  rmVideo(pid);renderPeers();
}

async function enterRoom(id,name,pw){
  showCH();
  $('C_MG').innerHTML='';$('C_VL').innerHTML='';$('C_VG').classList.remove('on');
  conns={};pAu={};pVi={};pViStr={};pMu={};pNick={};pAv={};pVidOn={};
  msgHist=[];domCount=0;
  $('C_NM').textContent=name.toUpperCase();
  $('C_PC').textContent=pw?'🔒 privada':'🌐 publica';
  addSys('Conectando...');renderPeers();

  try{await initPeer();}
  catch(e){addSys('Error PeerJS');showLB();return;}

  let data;
  try{data=await api('POST',`/rooms/${id}/join`,{pw,pid:myPid,nick:myNick});}
  catch(e){addSys(e.message==='403'?'Contrasena incorrecta':'Error al unirse');showLB();return;}

  curRoom=id;curPw=pw;
  addSys('Conectado como '+myNick);
  const others=(data.peers||[]).filter(p=>p.pid!==myPid);
  others.forEach(p=>{
    pNick[p.pid]=p.nick||p.pid.slice(0,8);
    const conn=peer.connect(p.pid,{metadata:meta(),reliable:true});
    onConn(conn);
  });
  startAudio();

  pingIv=setInterval(async()=>{
    if(!curRoom)return;
    try{
      const d=await api('POST',`/rooms/${curRoom}/ping`,{pid:myPid});
      const active=(d.peers||[]).map(p=>p.pid);
      Object.keys(conns).forEach(pid=>{if(!active.includes(pid))discPeer(pid);});
      $('C_PC').textContent=(curPw?'🔒 ':'🌐 ')+active.length+' en sala';
    }catch(e){}
  },PING);
}

function sendFile(file){
  const id=Math.random().toString(36).slice(2,10);
  const total=Math.ceil(file.size/CHUNK);
  const col=getUC(myPid||'me');
  function doSend(w,h){
    broadcast({t:'file_meta',id,name:file.name,size:file.size,mime:file.type||'application/octet-stream',total,w:w||0,h:h||0});
    addOwnFileMsg(file,id,w,h);
    pushHist({t:'msg',from:myPid||'me',nick:myNick,v:`[${file.name}]`,col,av:myAvB64});
    const r2=new FileReader();let off=0,ix=0;
    const rc=()=>r2.readAsArrayBuffer(file.slice(off,off+CHUNK));
    r2.onload=e=>{
      broadcast({t:'file_chunk',id,data:btoa(String.fromCharCode(...new Uint8Array(e.target.result))),idx:ix});
      off+=CHUNK;ix++;if(off<file.size)rc();
    };
    rc();
  }
  if(/^image\//.test(file.type)){
    const u=URL.createObjectURL(file),i=new Image();
    i.onload=()=>{doSend(i.naturalWidth,i.naturalHeight);URL.revokeObjectURL(u);};
    i.onerror=()=>{doSend(0,0);URL.revokeObjectURL(u);};
    i.src=u;
  }else doSend(0,0);
}

/* ---- OPFS stickers ---- */
async function getOPFSDir(){
  const root=await navigator.storage.getDirectory();
  const parts=OPFS_DIR.split('/');
  let dir=root;
  for(const p of parts)dir=await dir.getDirectoryHandle(p,{create:true});
  return dir;
}

async function saveStickerOPFS(blob,origName){
  const dir=await getOPFSDir();
  const base='sticker_'+origName.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_');
  let fname=base+'.webp',n=1;
  while(true){
    try{
      const fh=await dir.getFileHandle(fname);
      const existing=await fh.getFile();
      if(existing.size===blob.size){return fname;}
      fname=base+'_'+(++n)+'.webp';
    }catch{break;}
  }
  const webpBlob=await toWebP512(blob);
  const fh=await dir.getFileHandle(fname,{create:true});
  const w=await fh.createWritable();
  await w.write(webpBlob);await w.close();
  return fname;
}

async function toWebP512(blob){
  const url=URL.createObjectURL(blob);
  const img=new Image();
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
  URL.revokeObjectURL(url);
  const c=document.createElement('canvas');c.width=512;c.height=512;
  c.getContext('2d').drawImage(img,0,0,512,512);
  return new Promise(res=>c.toBlob(res,'image/webp',0.85));
}

async function listStickerFiles(){
  try{
    const dir=await getOPFSDir();
    const files=[];
    for await(const[name]of dir.entries())if(name.endsWith('.webp')||name.endsWith('.gif'))files.push(name);
    return files;
  }catch{return[];}
}

async function loadStickerPanel(){
  const sp=$('C_SPC');
  sp.innerHTML='<div class="CNT" style="width:100%">Cargando...</div>';
  const files=await listStickerFiles();
  sp.innerHTML='';
  if(!files.length){
    sp.innerHTML='<div class="CNT" style="width:100%">Sin stickers. Crea o guarda uno.</div>';
    return;
  }
  const dir=await getOPFSDir();
  for(const fname of files){
    try{
      const fh=await dir.getFileHandle(fname);
      const file=await fh.getFile();
      const url=URL.createObjectURL(file);
      const item=document.createElement('div');item.className='C_SI';item.dataset.fname=fname;
      const img=document.createElement('img');img.src=url;
      item.appendChild(img);
      item.onclick=()=>sendStickerFile(file,fname);
      setupLongPress(item,()=>confirmDeleteSticker(fname,item,url));
      sp.appendChild(item);
    }catch{}
  }
}

function setupLongPress(el,cb){
  let t=null;
  const start=()=>{el.classList.add('held');t=setTimeout(()=>{el.classList.remove('held');cb();},700);};
  const cancel=()=>{clearTimeout(t);el.classList.remove('held');};
  el.addEventListener('pointerdown',start);
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointerleave',cancel);
  el.addEventListener('contextmenu',e=>{e.preventDefault();});
}

async function confirmDeleteSticker(fname,item,url){
  if(!confirm(`Borrar "${fname}" de tus stickers?`))return;
  try{
    const dir=await getOPFSDir();
    await dir.removeEntry(fname);
    URL.revokeObjectURL(url);
    item.remove();
  }catch(e){alert('Error al borrar');}
}

function sendStickerFile(file,fname){
  closeEP();
  sendFile(file);
}

/* ---- sticker creator ---- */
let scImgBlob=null;

$('C_SCi').onchange=function(){
  const f=this.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const prev=$('C_SCp');
  prev.src=url;prev.style.display='block';
  $('C_SCpv').style.display='none';
  scImgBlob=f;
};

$('C_SCok').onclick=async()=>{
  if(!scImgBlob){alert('Elige una imagen');return;}
  const url=URL.createObjectURL(scImgBlob);
  const img=new Image();
  img.onload=async()=>{
    URL.revokeObjectURL(url);
    const c=$('C_SCc');
    c.getContext('2d').drawImage(img,0,0,512,512);
    c.toBlob(async blob=>{
      if(blob.size>STK_MAX){
        c.toBlob(async b2=>{
          const fname=await saveStickerOPFS(b2,scImgBlob.name);
          closeScModal();
          sendFile(new File([b2],fname,{type:'image/webp'}));
          loadStickerPanel();
        },'image/webp',0.7);
      }else{
        const fname=await saveStickerOPFS(blob,scImgBlob.name);
        closeScModal();
        sendFile(new File([blob],fname,{type:'image/webp'}));
        loadStickerPanel();
      }
    },'image/webp',0.85);
  };
  img.src=url;
};

$('C_SCx').onclick=closeScModal;
function closeScModal(){
  $('C_SCM').classList.remove('on');
  $('C_SCp').style.display='none';
  $('C_SCpv').style.display='flex';
  $('C_SCi').value='';
  scImgBlob=null;
}

/* ---- unload ---- */
const cont=$('content');
if(cont)cont.addEventListener('contentUnload',()=>{clearInterval(pollIv);leaveRoom();},{once:true});
document.addEventListener('contentUnload',()=>{clearInterval(pollIv);leaveRoom();},{once:true});

})();
