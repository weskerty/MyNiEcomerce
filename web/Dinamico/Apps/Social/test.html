<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ac:#c8ff00;--rd:#ff4466;--bg:#0d0d14;--s1:#13131f;--s2:#1a1a28;--bd:#ffffff14;--tx:#e0e0e0;--t2:#888;--r:14px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* screens */
.SC{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:1}
.SC.vis{transform:none;z-index:2}
.SC.base{transform:none;z-index:1}

/* lobby */
#LB{background:var(--bg)}
#LB_h{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--bd);flex-shrink:0}
#LB_h h1{flex:1;font-size:1.1rem;letter-spacing:.15em;color:var(--ac)}
#LB_s{padding:10px 16px;flex-shrink:0}
#LB_si{width:100%;padding:10px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.9rem;outline:none}
#LB_si:focus{border-color:var(--ac)44}
#LB_l{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.RI{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.RI:hover,.RI:active{background:var(--s2);border-color:var(--bd)}
.RI_ic{width:44px;height:44px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:1px solid var(--bd)}
.RI_tx{flex:1;min-width:0}
.RI_nm{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.RI_sb{font-size:.72rem;color:var(--t2);margin-top:2px}
.RI_bd{font-size:.7rem;color:var(--t2)}
#LB_e{text-align:center;padding:32px;color:var(--t2);font-size:.85rem}

/* btn */
.B{border:none;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.B:active{opacity:.7}
.Bi{width:40px;height:40px;border-radius:50%;background:var(--s2);color:var(--tx);font-size:1.1rem}
.Bp{padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;letter-spacing:.05em}
.Bac{background:var(--ac);color:#0d0d14}
.Bs{background:var(--s2);color:var(--tx)}

/* modal */
.MO{position:fixed;inset:0;background:#00000099;display:none;align-items:flex-end;justify-content:center;z-index:50}
.MO.on{display:flex}
.MB{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;display:flex;flex-direction:column;gap:12px}
.MB h2{font-size:1rem;font-weight:600;letter-spacing:.05em;text-align:center}
.MI{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.9rem;outline:none}
.MI:focus{border-color:var(--ac)66}
.ML{font-size:.7rem;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.MR{display:flex;gap:8px}
.MR .Bp{flex:1}

/* avatar pick in modal */
.AW{display:flex;align-items:center;gap:12px}
.AV{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--s2);border:2px solid var(--bd);cursor:pointer;display:block;flex-shrink:0}
.AV_nm{flex:1}
.AV_nm input{width:100%;padding:8px 0;background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--tx);font-size:.95rem;outline:none}
.AV_nm input:focus{border-color:var(--ac)}

/* chat screen */
#CH{background:var(--bg)}
#CH_h{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1)}
#CH_av{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;border:1px solid var(--bd);overflow:hidden}
#CH_av img{width:100%;height:100%;object-fit:cover}
#CH_tx{flex:1;min-width:0}
#CH_nm{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#CH_sb{font-size:.68rem;color:var(--t2)}
#CH_hb{display:flex;gap:4px}

/* video strip */
#VG{display:none;flex-shrink:0;border-bottom:1px solid var(--bd);background:var(--s1)}
#VG.on{display:block}
#VL{display:flex;gap:8px;padding:8px;overflow-x:auto}
.VP{flex-shrink:0;position:relative;cursor:pointer}
.VP video,.VP .VA{width:90px;height:68px;border-radius:8px;object-fit:cover;background:#000;display:block;border:1px solid var(--bd)}
.VP .VA{display:none;object-fit:cover}
.VP.hid video{display:none}
.VP.hid .VA{display:block}
.VP_n{font-size:.58rem;color:var(--t2);text-align:center;margin-top:2px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.VP_b{position:absolute;top:3px;right:3px;background:#00000088;border:none;color:#fff;font-size:.6rem;border-radius:4px;padding:1px 4px;cursor:pointer}

/* messages */
#MG{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:4px;min-height:0}
.MS{display:flex;gap:8px;max-width:80%;align-items:flex-end}
.MS.me{flex-direction:row-reverse;align-self:flex-end}
.MS .AVI{width:26px;height:26px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0;overflow:hidden;border:1px solid var(--bd)}
.MS .AVI img{width:100%;height:100%;object-fit:cover}
.MS_b{padding:9px 13px;border-radius:18px;font-size:.875rem;line-height:1.45;word-break:break-word;max-width:100%}
.MS.me .MS_b{border-bottom-right-radius:4px;background:#2a4a2a;color:#e0ffe0}
.MS:not(.me) .MS_b{border-bottom-left-radius:4px}
.MS_nm{font-size:.62rem;margin-bottom:3px;font-weight:600}
.MS_t{font-size:.6rem;color:var(--t2);margin-top:3px;text-align:right}
.SY{font-size:.68rem;color:var(--t2);text-align:center;padding:6px 0}
.SK{width:128px;height:128px;display:block;border-radius:8px;object-fit:fill;cursor:pointer}
.DLB{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-size:.78rem;color:var(--tx);cursor:pointer;margin-top:4px;transition:border-color .15s}
.DLB:hover{border-color:var(--ac)}
.PR{font-size:.65rem;color:var(--t2);margin-top:3px}

/* input bar - KEY: position relative wrapper, no absolute inside flex */
#IW{flex-shrink:0;position:relative;background:var(--s1);border-top:1px solid var(--bd)}
#EP{background:var(--s2);border-top:1px solid var(--bd);display:none;flex-direction:column;max-height:300px}
#EP.on{display:flex}
#ET{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.ETb{flex:1;padding:9px;background:none;border:none;color:var(--t2);font-size:.75rem;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.ETb.on{color:var(--ac);border-bottom-color:var(--ac)}
#EPC{flex:1;overflow:hidden;display:flex}
#EPC emoji-picker{--background:transparent;--border-color:var(--bd);--text-color:var(--tx);--emoji-size:1.5rem;--num-columns:8;width:100%;height:100%}
#SPC{flex:1;overflow-y:auto;padding:8px;display:none;flex-wrap:wrap;gap:6px;align-content:flex-start}
#SPC.on{display:flex}
.SI{width:72px;height:72px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0;position:relative}
.SI:hover{border-color:var(--ac)}
.SI.hld{border-color:var(--rd)}
.SI img{width:100%;height:100%;object-fit:fill}
#IB{display:flex;align-items:flex-end;gap:6px;padding:8px 10px}
#MI{flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--tx);font-size:.9rem;outline:none;resize:none;max-height:120px;line-height:1.4;overflow-y:auto}
#MI:focus{border-color:var(--ac)44}

/* participants panel */
#PP{position:fixed;top:0;right:0;bottom:0;width:min(260px,80vw);background:var(--s1);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .2s;z-index:30;display:flex;flex-direction:column}
#PP.on{transform:none}
#PP h3{padding:16px;font-size:.85rem;letter-spacing:.1em;border-bottom:1px solid var(--bd);color:var(--ac)}
#PL{flex:1;overflow-y:auto;padding:8px}
.PE{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px}
.PE:hover{background:var(--s2)}
.PE_av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;overflow:hidden;border:1px solid var(--bd)}
.PE_av img{width:100%;height:100%;object-fit:cover}
.PE_nm{flex:1;font-size:.83rem}
.PE_m{background:none;border:none;cursor:pointer;font-size:1rem;padding:4px}

/* sticker creator */
#SCM .MB{border-radius:20px;width:min(360px,95vw);margin:auto;margin-top:auto}
#SC_pv{height:180px;background:var(--s2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:.85rem;border:1px dashed var(--bd)}
#SC_pi{height:180px;object-fit:contain;border-radius:10px;background:#000;display:none;width:100%}
#SC_cv{display:none}
#SCM .MO{align-items:center}

/* overlay for participants */
#OV{position:fixed;inset:0;z-index:29;display:none}
#OV.on{display:block}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<!-- LOBBY -->
<div class="SC base" id="LB">
  <div id="LB_h">
    <h1>Chats</h1>
    <button class="B Bi" id="LB_bn" title="Nueva sala">✏️</button>
  </div>
  <div id="LB_s">
    <input id="LB_si" placeholder="Buscar..." type="search">
  </div>
  <div id="LB_l"><div id="LB_e">Cargando...</div></div>
</div>

<!-- CHAT -->
<div class="SC" id="CH">
  <div id="CH_h">
    <button class="B Bi" id="CH_bk" style="font-size:.9rem">←</button>
    <div id="CH_av"></div>
    <div id="CH_tx">
      <div id="CH_nm"></div>
      <div id="CH_sb"></div>
    </div>
    <div id="CH_hb">
      <button class="B Bi" id="CH_bm" title="Mic">🎤</button>
      <button class="B Bi" id="CH_bv" title="Cam">📷</button>
      <button class="B Bi" id="CH_bp" title="Participantes">👥</button>
    </div>
  </div>
  <div id="VG"><div id="VL"></div></div>
  <div id="MG"></div>
  <div id="IW">
    <div id="EP">
      <div id="ET">
        <button class="ETb on" id="ET_e">Emoji</button>
        <button class="ETb" id="ET_s">Stickers</button>
        <button class="ETb" id="ET_sc" style="flex:none;padding:9px 14px">+ Crear</button>
      </div>
      <div id="EPC"><emoji-picker id="EMJ"></emoji-picker></div>
      <div id="SPC"></div>
    </div>
    <div id="IB">
      <button class="B Bi" id="IB_ep" style="font-size:1rem">😊</button>
      <textarea id="MI" rows="1" placeholder="Mensaje..."></textarea>
      <label class="B Bi" style="font-size:1rem;cursor:pointer" title="Archivo">📎<input type="file" id="FL" style="display:none"></label>
      <button class="B Bi" id="IB_sn" style="background:var(--ac);color:#0d0d14;font-size:1rem">➤</button>
    </div>
  </div>
</div>

<!-- PARTICIPANTS PANEL -->
<div id="OV"></div>
<div id="PP">
  <h3>PARTICIPANTES</h3>
  <div id="PL"></div>
</div>

<!-- MODAL: nueva sala -->
<div class="MO" id="MO_c">
  <div class="MB">
    <h2>Nueva Sala</h2>
    <div class="AW">
      <img class="AV" id="MO_av" src="" alt="">
      <input type="file" id="MO_avi" accept="image/*" style="display:none">
      <div class="AV_nm">
        <div class="ML">Tu nombre</div>
        <input class="MI" id="MO_nk" placeholder="Nombre..." maxlength="24" style="border-radius:0;background:transparent">
      </div>
    </div>
    <div>
      <div class="ML">Nombre de la sala</div>
      <input class="MI" id="MO_rn" placeholder="Sala...">
    </div>
    <div>
      <div class="ML">Contrasena (opcional)</div>
      <input class="MI" id="MO_rp" type="password" placeholder="...">
    </div>
    <div class="MR">
      <button class="B Bp Bac" id="MO_cr">Crear</button>
      <button class="B Bp Bs" id="MO_cx">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: password join -->
<div class="MO" id="MO_p">
  <div class="MB">
    <h2 id="MO_pn"></h2>
    <div class="ML">Contrasena</div>
    <input class="MI" id="MO_pp" type="password">
    <div class="MR">
      <button class="B Bp Bac" id="MO_pj">Unirse</button>
      <button class="B Bp Bs" id="MO_px">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL: sticker creator -->
<div class="MO" id="SCM" style="align-items:center">
  <div class="MB" style="border-radius:20px;width:min(360px,95vw);margin:auto">
    <h2>Crear Sticker</h2>
    <div id="SC_pv">Elige una imagen</div>
    <img id="SC_pi" alt="">
    <canvas id="SC_cv" width="512" height="512"></canvas>
    <div class="MR">
      <label class="B Bp Bs" style="cursor:pointer;flex:1;justify-content:center">Elegir<input type="file" id="SC_fi" accept="image/*" style="display:none"></label>
      <button class="B Bp Bac" id="SC_ok" style="flex:1">Guardar y Enviar</button>
      <button class="B Bp Bs" id="SC_cx">✕</button>
    </div>
  </div>
</div>

<script>
(()=>{
const API='/api/chat',POLL=5000,PING=10000,CHUNK=16384,HIST=200,DOM=60,OPFS='chat/stickers',IM1=1048576;
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const mk=(tag,cls,sty)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(sty)e.style.cssText=sty;return e;};
const COLS=['#e8a0a0','#e8c4a0','#e8e0a0','#a8d8a0','#a0c4e8','#c4a8e8','#e8a8d0','#a8dede'];
const uC={};let cI=0;
const gUC=pid=>{if(!uC[pid])uC[pid]=COLS[(cI++)%COLS.length];return uC[pid];};
const fSz=b=>b>1048576?(b/1048576).toFixed(1)+'MB':(b/1024).toFixed(0)+'KB';

let nick='',avB64='',peer=null,pid=null,curR=null,curPw='';
let conns={},pAu={},pVStr={},pMu={},pNk={},pAv={},pVOn={};
let aS=null,vS=null,muted=false,vOn=false,pingIv=null,pendJ=null;
let hist=[],dCnt=0,fMeta={},crLock=false,epOpen=false,epTab='emoji',scBlob=null;

const LP=()=>localStorage.getItem('cn_nick')||'';
const LA=()=>localStorage.getItem('cn_av')||'';
const SP=(n,a)=>{localStorage.setItem('cn_nick',n);if(a!==undefined)localStorage.setItem('cn_av',a);};
nick=LP();avB64=LA();

function navTo(id){
  document.querySelectorAll('.SC').forEach(s=>{
    s.classList.toggle('vis',s.id===id);
    s.classList.toggle('base',s.id!==id);
  });
}

async function api(m,p,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(API+p,o);
  if(!r.ok)throw new Error(r.status);
  return r.json();
}

function procAv(file,cb){
  const img=new Image(),u=URL.createObjectURL(file);
  img.onload=()=>{
    const c=mk('canvas');c.width=60;c.height=60;
    c.getContext('2d').drawImage(img,0,0,60,60);
    cb(c.toDataURL('image/jpeg',0.5));
    URL.revokeObjectURL(u);
  };
  img.src=u;
}

function setLBav(){
  const av=$('MO_av');
  av.src=avB64||'';
  av.style.background=avB64?'transparent':'var(--s2)';
  $('MO_nk').value=nick;
}

$('MO_av').onclick=()=>$('MO_avi').click();
$('MO_avi').onchange=function(){
  const f=this.files[0];if(!f)return;
  procAv(f,b=>{avB64=b;SP(nick,b);$('MO_av').src=b;});
};
$('MO_nk').oninput=function(){nick=this.value.trim();SP(nick,avB64);};

$('LB_bn').onclick=()=>{setLBav();showMO('MO_c');setTimeout(()=>($('MO_rn').focus()),100);};
$('MO_cx').onclick=()=>hideMO('MO_c');
$('MO_cr').onclick=doCreateRoom;
$('MO_rn').onkeydown=e=>{if(e.key==='Enter')doCreateRoom();};
$('MO_px').onclick=()=>{hideMO('MO_p');pendJ=null;};
$('MO_pj').onclick=doJoinPw;
$('MO_pp').onkeydown=e=>{if(e.key==='Enter')doJoinPw();};

function showMO(id){$(id).classList.add('on');}
function hideMO(id){$(id).classList.remove('on');}

async function doCreateRoom(){
  if(crLock)return;
  const rn=$('MO_rn').value.trim();
  if(!rn)return;
  const n=$('MO_nk').value.trim();
  if(!n){$('MO_nk').focus();return;}
  nick=n;SP(nick,avB64);
  crLock=true;
  $('MO_cr').textContent='...';$('MO_cr').disabled=true;
  try{
    const pw=$('MO_rp').value;
    const{id}=await api('POST','/rooms',{name:rn,pw});
    $('MO_rn').value='';$('MO_rp').value='';
    hideMO('MO_c');
    enterRoom(id,rn,pw);
  }catch(e){$('MO_cr').textContent='Error';}
  finally{
    setTimeout(()=>{crLock=false;$('MO_cr').textContent='Crear';$('MO_cr').disabled=false;},1000);
  }
}

function doJoinPw(){
  if(!pendJ)return;
  const r=pendJ;pendJ=null;
  const pw=$('MO_pp').value;
  $('MO_pp').value='';hideMO('MO_p');
  enterRoom(r.id,r.name,pw);
}

let pollIv=null;
function startPoll(){if(pollIv)return;pollIv=setInterval(loadRooms,POLL);}
function stopPoll(){clearInterval(pollIv);pollIv=null;}

async function loadRooms(){
  try{
    const list=await api('GET','/rooms');
    const fv=$('LB_si').value.trim().toLowerCase();
    const arr=(list||[]).filter(r=>!fv||r.name.toLowerCase().includes(fv));
    const lb=$('LB_l');
    if(!arr.length){lb.innerHTML=`<div id="LB_e">Sin salas activas</div>`;return;}
    lb.innerHTML='';
    arr.sort((a,b)=>b.ts-a.ts).forEach(r=>{
      const d=mk('div','RI');
      const ic=mk('div','RI_ic');ic.textContent=r.hasPw?'🔒':'💬';
      const tx=mk('div','RI_tx');
      const nm=mk('div','RI_nm');nm.textContent=r.name;
      const sb=mk('div','RI_sb');sb.textContent=(r.count||0)+' en sala';
      tx.append(nm,sb);d.append(ic,tx);
      d.onclick=()=>clickRoom(r);
      lb.appendChild(d);
    });
  }catch(e){}
}
$('LB_si').oninput=loadRooms;

function clickRoom(r){
  if(r.hasPw){pendJ=r;$('MO_pn').textContent=r.name;$('MO_pp').value='';showMO('MO_p');setTimeout(()=>$('MO_pp').focus(),100);}
  else{
    const n=$('MO_nk').value.trim()||nick;
    if(!n){setLBav();showMO('MO_c');return;}
    enterRoom(r.id,r.name,'');
  }
}

function initPeer(){
  return new Promise((res,rej)=>{
    if(peer&&!peer.destroyed&&pid){res();return;}
    if(peer&&!peer.destroyed)peer.destroy();
    peer=new Peer();
    peer.once('open',id=>{
      pid=id;
      peer.on('connection',conn=>onConn(conn));
      peer.on('call',call=>{
        const s=new MediaStream();
        if(aS)aS.getTracks().forEach(t=>s.addTrack(t));
        if(vS)vS.getTracks().forEach(t=>s.addTrack(t));
        call.answer(s.getTracks().length?s:new MediaStream());
        hCall(call);
      });
      peer.on('disconnected',()=>{if(curR)peer.reconnect();});
      res();
    });
    peer.once('error',e=>rej(e));
  });
}

function meta(){return{nick,av:avB64};}

function onConn(conn){
  conn.on('open',()=>{
    conns[conn.peer]=conn;
    const m=conn.metadata||{};
    pNk[conn.peer]=m.nick||conn.peer.slice(0,8);
    pAv[conn.peer]=m.av||'';
    conn.send({t:'meta',v:{nick,av:avB64}});
    conn.send({t:'hist',v:hist.slice(-HIST)});
    addSys((pNk[conn.peer]||conn.peer.slice(0,8))+' se unio');
    renderPeers();callPeer(conn.peer);
  });
  conn.on('data',d=>onData(d,conn.peer));
  conn.on('close',()=>discPeer(conn.peer));
  conn.on('error',()=>discPeer(conn.peer));
}

function callPeer(p){
  const s=new MediaStream();
  if(aS)aS.getTracks().forEach(t=>s.addTrack(t));
  if(vS)vS.getTracks().forEach(t=>s.addTrack(t));
  if(!s.getTracks().length)return;
  hCall(peer.call(p,s,{metadata:meta()}));
}

function onData(d,from){
  if(!d||!d.t)return;
  switch(d.t){
    case'msg':{
      const col=gUC(from);
      addMsg(pNk[from]||from,d.v,false,col,pAv[from]||'',from);
      hist.push({t:'msg',from,nick:pNk[from]||from,v:d.v,col,av:pAv[from]||''});
      if(hist.length>HIST)hist.shift();
      break;
    }
    case'meta':pNk[from]=d.v.nick||pNk[from];pAv[from]=d.v.av||'';renderPeers();break;
    case'hist':
      if(!hist.length&&d.v?.length){
        d.v.forEach(m=>{
          if(m.t==='msg'){const col=m.col||gUC(m.from);uC[m.from]=col;addMsg(m.nick,m.v,false,col,m.av||'',m.from);hist.push(m);}
        });
      }
      break;
    case'mute':{const el=$('VP_'+from);if(el){const n=el.querySelector('.VP_n');if(n)n.textContent=(pNk[from]||from)+(d.v?' 🔇':'');} break;}
    case'file_meta':
      fMeta[d.id]={name:d.name,size:d.size,mime:d.mime,chunks:[],total:d.total,w:d.w||0,h:d.h||0};
      addFileMsg(from,d);
      break;
    case'file_chunk':{
      const fm=fMeta[d.id];if(!fm)return;
      fm.chunks.push(d.data);
      const pr=$('FP_'+d.id);if(pr)pr.textContent=`${fm.chunks.length}/${fm.total}`;
      if(fm.chunks.length>=fm.total)assembleFile(d.id,fm);
      break;
    }
  }
}

const isStk=fm=>/^image\/(avif|webp|gif)$/.test(fm.mime)&&fm.w>0&&fm.w<=512&&fm.h>0&&fm.h<=512;
const isStkV=fm=>/^video\/webm$/.test(fm.mime)&&fm.w>0&&fm.w<=512&&fm.h>0&&fm.h<=512;

function assembleFile(id,fm){
  const blob=new Blob(fm.chunks.map(c=>Uint8Array.from(atob(c),x=>x.charCodeAt(0))),{type:fm.mime});
  const url=URL.createObjectURL(blob);
  const wrap=$('FA_'+id);
  const pr=$('FP_'+id);if(pr)pr.remove();
  const fnEl=$('FN_'+id);
  if(!wrap){delete fMeta[id];return;}

  if(isStk(fm)){
    if(fnEl)fnEl.remove();
    const img=mk('img','SK');img.src=url;
    wrap.replaceChildren(img);
    wrap.appendChild(favBtn(blob,fm.name));
  }else if(isStkV(fm)){
    if(fnEl)fnEl.remove();
    const v=mk('video');v.src=url;v.autoplay=v.loop=v.muted=v.playsInline=1;
    v.className='SK';
    wrap.replaceChildren(v);
    wrap.appendChild(favBtn(blob,fm.name));
  }else if(/^image\//.test(fm.mime)&&fm.size<=IM1){
    const img=mk('img','','max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-top:4px');
    img.src=url;img.onclick=()=>window.open(url,'_blank');
    wrap.replaceChildren(img);
  }else{
    const btn=mk('button','DLB');
    btn.innerHTML=`⬇ ${esc(fm.name)} <span style="font-size:.65rem;opacity:.5">${fSz(fm.size)}</span>`;
    btn.onclick=()=>{const a=mk('a');a.href=url;a.download=fm.name;a.click();};
    wrap.replaceChildren(btn);
  }
  delete fMeta[id];
}

function favBtn(blob,name){
  const b=mk('button','DLB','font-size:.65rem;padding:4px 8px;margin-top:5px');
  b.textContent='★ Favorito';
  b.onclick=async()=>{b.disabled=true;await saveStk(blob,name);b.textContent='✓ Guardado';if(epTab==='stickers')loadStkPanel();};
  return b;
}

function hCall(call){
  call.on('stream',stream=>{
    const p=call.peer;
    if(stream.getVideoTracks().length){pVOn[p]=true;pVStr[p]=stream;addVidPeer(p,stream);}
    if(stream.getAudioTracks().length){
      let a=pAu[p];
      if(!a){a=mk('audio');a.autoplay=a.playsInline=1;document.body.appendChild(a);pAu[p]=a;}
      a.srcObject=new MediaStream(stream.getAudioTracks());
      if(pMu[p])a.muted=true;
    }
  });
  call.on('close',()=>rmVid(call.peer));
}

function discPeer(p){
  if(!conns[p]&&!pNk[p])return;
  addSys((pNk[p]||p)+' salio');
  delete conns[p];delete pNk[p];delete pVOn[p];delete pVStr[p];
  if(pAu[p]){pAu[p].pause();pAu[p].srcObject=null;pAu[p].remove();delete pAu[p];}
  rmVid(p);renderPeers();
}

  $('VG').classList.remove('on');
  conns={};pAu={};pVStr={};pMu={};pNk={};pAv={};pVOn={};

  $('CH_nm').textContent=rn;
  $('CH_sb').textContent='Conectando...';
  const hav=$('CH_av');
  hav.innerHTML='';hav.textContent='💬';

  navTo('CH');

  try{await initPeer();}
  catch(e){addSys('Error PeerJS');goBack();return;}

  let data;
  try{data=await api('POST',`/rooms/${id}/join`,{pw,pid,nick});}
  catch(e){addSys(e.message==='403'?'Contrasena incorrecta':'Error al unirse');goBack();return;}

  curR=id;curPw=pw;

    pNk[p.pid]=p.nick||p.pid.slice(0,8);
    const conn=peer.connect(p.pid,{metadata:meta(),reliable:true});

      Object.keys(conns).forEach(p=>{if(!active.includes(p))discPeer(p);});
      $('CH_sb').textContent=(curPw?'🔒 ':'🌐 ')+active.length+' en sala';
    }catch(e){}
  },PING);
}

}

function goBack(){
  clearInterval(pingIv);pingIv=null;
  if(curR&&pid)api('DELETE',`/rooms/${curR}/leave`,{pid}).catch(()=>{});
  Object.values(conns).forEach(c=>{try{c.close();}catch(e){}});
  if(aS){aS.getTracks().forEach(t=>t.stop());aS=null;}
  if(vS){vS.getTracks().forEach(t=>t.stop());vS=null;}
  Object.values(pAu).forEach(a=>{a.pause();a.srcObject=null;a.remove();});
  if(peer){try{peer.destroy();}catch(e){}peer=null;pid=null;}
  conns={};pAu={};pVStr={};pMu={};pNk={};pAv={};pVOn={};
  curR=null;curPw='';muted=false;vOn=false;
  $('CH_bm').textContent='🎤';

}

function sendFile(file){
  const id=Math.random().toString(36).slice(2,10);
  const total=Math.ceil(file.size/CHUNK);
  const doSend=(w,h)=>{
    broadcast({t:'file_meta',id,name:file.name,size:file.size,mime:file.type||'application/octet-stream',total,w:w||0,h:h||0});
    addOwnFileMsg(file,id,w,h);
    const r=new FileReader();let off=0,ix=0;
    const rc=()=>r.readAsArrayBuffer(file.slice(off,off+CHUNK));
    r.onload=e=>{
      broadcast({t:'file_chunk',id,data:btoa(String.fromCharCode(...new Uint8Array(e.target.result))),idx:ix});
      off+=CHUNK;ix++;if(off<file.size)rc();
    };
    rc();
  };
  if(/^image\//.test(file.type)){
    const u=URL.createObjectURL(file),i=new Image();
    i.onload=()=>{doSend(i.naturalWidth,i.naturalHeight);URL.revokeObjectURL(u);};
    i.onerror=()=>{doSend(0,0);URL.revokeObjectURL(u);};
    i.src=u;
  }else doSend(0,0);
}

async function getOPFS(){
  const root=await navigator.storage.getDirectory();
  let dir=root;
  for(const p of OPFS.split('/'))dir=await dir.getDirectoryHandle(p,{create:true});
  return dir;
}

async function saveStk(blob,origName){
  const dir=await getOPFS();
  const base='sticker_'+origName.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_');
  let fname=base+'.webp',n=1;
  while(true){
    try{const fh=await dir.getFileHandle(fname);const ex=await fh.getFile();if(ex.size===blob.size)return fname;fname=base+'_'+(++n)+'.webp';}
    catch{break;}
  }
  const wb=await toW512(blob);
  const fh=await dir.getFileHandle(fname,{create:true});
  const w=await fh.createWritable();await w.write(wb);await w.close();
  return fname;
}

async function toW512(blob){
  const url=URL.createObjectURL(blob),img=new Image();
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
  URL.revokeObjectURL(url);
  const c=mk('canvas');c.width=c.height=512;c.getContext('2d').drawImage(img,0,0,512,512);
  return new Promise(res=>c.toBlob(res,'image/webp',0.85));
}

async function loadStkPanel(){
  const sp=$('SPC');sp.innerHTML='<div style="width:100%;padding:12px;font-size:.8rem;color:var(--t2)">Cargando...</div>';
  try{
    const dir=await getOPFS();const files=[];
    for await(const[n]of dir.entries())if(n.endsWith('.webp')||n.endsWith('.gif'))files.push(n);
    sp.innerHTML='';
    if(!files.length){sp.innerHTML='<div style="width:100%;padding:12px;font-size:.8rem;color:var(--t2)">Sin stickers guardados</div>';return;}
    for(const fn of files){
      try{
        const fh=await dir.getFileHandle(fn);const file=await fh.getFile();
        const url=URL.createObjectURL(file);
        const item=mk('div','SI');item.dataset.fn=fn;
        const img=mk('img');img.src=url;item.appendChild(img);
        item.onclick=()=>{closeEP();sendFile(file);};
        lpSetup(item,()=>delStk(fn,item,url));
        sp.appendChild(item);
      }catch{}
    }
  }catch{sp.innerHTML='<div style="padding:12px;font-size:.8rem;color:var(--t2)">Error OPFS</div>';}
}

function lpSetup(el,cb){
  let t=null;
  const s=()=>{el.classList.add('hld');t=setTimeout(()=>{el.classList.remove('hld');cb();},700);};
  const c=()=>{clearTimeout(t);el.classList.remove('hld');};
  el.addEventListener('pointerdown',s);el.addEventListener('pointerup',c);el.addEventListener('pointerleave',c);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

async function delStk(fn,item,url){
  if(!confirm('Borrar "'+fn+'"?'))return;
  try{const d=await getOPFS();await d.removeEntry(fn);URL.revokeObjectURL(url);item.remove();}
  catch{alert('Error al borrar');}
}
