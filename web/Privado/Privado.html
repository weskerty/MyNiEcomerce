<style>
:root{--font-h:'Libre Baskerville','Merriweather','Times New Roman','Georgia','Fluent Emoji Color',serif}
#pb-wrap *{box-sizing:border-box}
.pb-nb{position:absolute;top:0;font-size:1.8rem;text-decoration:none;z-index:10}
.pb-nb-l{left:0}
.pb-nb-r{right:0}
.pb-head{margin-bottom:clamp(16px,3vw,32px)}
.pb-head h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;color:rgba(255,255,255,.95);letter-spacing:-.02em;text-shadow:0 2px 20px rgba(0,0,0,.3);line-height:1.1;border-bottom:2px solid #1a73e8;padding-bottom:.5rem;display:inline-block;font-family:var(--font-h)}
.pb-head p{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:5px;font-weight:300;letter-spacing:.06em;text-transform:uppercase}
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:16px}
.pb-card{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;text-decoration:none;display:block;min-height:200px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 24px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.15);transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s ease}
.pb-card:hover{will-change:transform;transform:translateY(-5px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);text-decoration:none}
.pb-card:active{transform:scale(.98)}
.pb-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s cubic-bezier(.2,.8,.2,1),filter .3s ease;filter:brightness(.5) saturate(1.2)}
.pb-card:hover .pb-bg{transform:scale(1.05);filter:brightness(.4) saturate(1.4)}
.pb-bg-none{background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02))}
.pb-gloss{position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;border-radius:20px 20px 0 0}
.pb-body{position:relative;z-index:2;padding:20px 18px 18px;display:flex;flex-direction:column;justify-content:flex-end;min-height:200px}
.pb-cat{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.pb-cat::before{content:'';display:inline-block;width:14px;height:1px;background:rgba(255,255,255,.35)}
.pb-title{font-family:var(--font-h);font-size:clamp(1rem,2.5vw,1.3rem);font-weight:700;color:rgba(255,255,255,.95);line-height:1.25;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.pb-arr{position:absolute;bottom:18px;right:18px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);font-size:13px;transition:transform .25s cubic-bezier(.2,.8,.2,1),background .25s ease}
.pb-card:hover .pb-arr{transform:translate(2px,-2px);background:rgba(255,255,255,.22)}
.pb-wide{grid-column:1/-1;min-height:260px}
.pb-wide .pb-body{min-height:260px}
.pb-wide .pb-title{font-size:clamp(1.2rem,4vw,1.8rem)}
.pb-empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:rgba(255,255,255,.4)}
.pb-empty span{display:block;font-size:2rem;margin-bottom:10px}
.pb-dots{display:flex;align-items:center;justify-content:center;gap:7px;padding:50px}
.pb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);animation:pbP .8s ease-in-out infinite}
.pb-dot:nth-child(2){animation-delay:.15s}
.pb-dot:nth-child(3){animation-delay:.3s}
@keyframes pbP{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.pb-pg{display:flex;justify-content:center;gap:12px;margin-top:16px;grid-column:1/-1}
.pb-pg button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:white;padding:6px 18px;cursor:pointer;font-size:.85em;transition:background .2s}
.pb-pg button:hover{background:rgba(255,255,255,.22)}
.pb-pg button:disabled{opacity:.3;cursor:default}
@keyframes pb-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pb-anim{animation:pb-in .25s ease both}
.pb-sh-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;z-index:99999;padding:60px 16px 20px}
.pb-sh-modal.pb-v{display:flex}
.pb-sh-mc{background:rgba(20,20,35,.95);border:1px solid rgba(255,255,255,.13);border-radius:20px;width:100%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.pb-sh-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.pb-sh-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:1rem;font-family:inherit}
.pb-sh-bar input::placeholder{color:rgba(255,255,255,.35)}
.pb-sh-clr{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.13);border-radius:50%;color:rgba(255,255,255,.5);font-size:.85rem;cursor:pointer;width:26px;height:26px;display:none;align-items:center;justify-content:center;flex-shrink:0}
.pb-sh-clr.pb-sv{display:flex}
.pb-sh-clr:hover{background:rgba(255,255,255,.2);color:#fff}
.pb-sh-close{font-size:1.4rem;cursor:pointer;color:rgba(255,255,255,.5);flex-shrink:0;line-height:1}
.pb-sh-close:hover{color:#fff}
.pb-sh-res{overflow-y:auto;padding:10px 14px;flex:1}
.pb-sh-it{display:flex;align-items:center;border-radius:12px;text-decoration:none;color:#fff;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);margin-bottom:6px;overflow:hidden;min-height:54px;transition:background .15s}
.pb-sh-it:hover{background:rgba(255,255,255,.1);text-decoration:none}
.pb-sh-it img{width:54px;height:54px;object-fit:fill;border-radius:11px 0 0 11px;background:rgba(0,0,0,.3)}
.pb-sh-it-info{padding:8px 12px;flex:1;min-width:0}
.pb-sh-it-nm{font-size:.9rem;line-height:1.3;word-break:break-word}
.pb-sh-it-cat{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px}
.pb-sh-mt{text-align:center;color:rgba(255,255,255,.4);padding:30px 0;font-size:.9rem}
.pb-sh-sk{display:flex;flex-direction:column;gap:7px;padding:8px 0}
.pb-sh-sk-i{height:54px;border-radius:12px;background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);background-size:200% 100%;animation:pb-shim 1.4s infinite}
@keyframes pb-shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:480px){.pb-grid{grid-template-columns:1fr}.pb-wide{min-height:220px}}
</style>

<a class="pb-nb pb-nb-l" href="web/es.html">🏠</a>
<a class="pb-nb pb-nb-r" id="pb-sh-btn" href="#">🔍</a>

<div style="text-align:center">
<div id="pb-wrap">
  <div class="pb-head">
    <h1>🔒 Recursos </h1>
    <p id="pb-cnt"></p>
  </div>
  <div class="pb-dots" id="pb-ld"><div class="pb-dot"></div><div class="pb-dot"></div><div class="pb-dot"></div></div>
  <div class="pb-grid" id="pb-gr" style="display:none"></div>
</div>
</div>

<div class="pb-sh-modal" id="pb-sh-modal">
  <div class="pb-sh-mc">
    <div class="pb-sh-bar">
      <span style="font-size:1.1rem;opacity:.5;flex-shrink:0">🔍</span>
      <input id="pb-sh-inp" type="search" placeholder="Buscar..." autocomplete="off">
      <button class="pb-sh-clr" id="pb-sh-clr">✕</button>
      <span class="pb-sh-close" id="pb-sh-close">✕</span>
    </div>
    <div class="pb-sh-res" id="pb-sh-res"></div>
  </div>
</div>

<script>
(function(){
const DJ='web/Privado/data.json';
const PAGE=30;
const MS_CDN='https://cdn.jsdelivr.net/npm/minisearch@7/dist/umd/index.js';
const MS_LOCAL='web/scripts/Otros/MiniSearch/index.js';

let curList=[],curPg=0,imgIO=null,fetchAC=null;
let allItems=[],ms=null,msReady=false,dbt=null;

function fN(p){return p.split('/').pop().replace(/\.[^.]+$/,'')}
function mL(p){return p.replace(/\.[^.]+$/,'.md')}
function nN(n){const m=n.match(/NB=([^.]+)/);return m?m[1].trim():n.replace(/-/g,' ')}

function parseItems(galleries){
  const out=[];
  Object.entries(galleries).forEach(([cat,val])=>{
    if(Array.isArray(val)){
      val.forEach(p=>out.push({name:nN(fN(p)),cat,sub:'',img:p,md:mL(p)}));
    }else{
      Object.entries(val).forEach(([sub,arr])=>{
        arr.forEach(p=>out.push({name:nN(fN(p)),cat,sub,img:p,md:mL(p)}));
      });
    }
  });
  return out;
}

async function fetchData(){
  let g=window.__DJ?.[DJ]||null;
  if(!g){
    if(fetchAC)fetchAC.abort();
    fetchAC=new AbortController();
    try{
      const res=await fetch(DJ,{signal:fetchAC.signal});
      const d=await res.json();
      g=d.galleries;
      (window.__DJ=window.__DJ||{})[DJ]=g;
      fetchAC=null;
    }catch(e){if(e.name==='AbortError')return null;return null;}
  }
  return g;
}

function mkCard(item,wide){
  const a=document.createElement('a');
  a.href=item.md;
  a.className='pb-card'+(wide?' pb-wide':'');
  const bg=document.createElement('div');
  bg.className='pb-bg'+(item.img?'':' pb-bg-none');
  if(item.img)bg.dataset.bg=item.img;
  const gl=document.createElement('div');gl.className='pb-gloss';
  const bd=document.createElement('div');bd.className='pb-body';
  bd.innerHTML='<div class="pb-cat">'+item.cat+(item.sub?'/'+item.sub:'')+'</div><div class="pb-title">'+item.name+'</div>';
  const ar=document.createElement('div');ar.className='pb-arr';ar.textContent='↗';
  a.append(bg,gl,bd,ar);
  return a;
}

function setupImgIO(){
  if(imgIO)imgIO.disconnect();
  imgIO=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const bg=e.target,url=bg.dataset.bg;
      if(url){bg.style.backgroundImage='url('+encodeURI(url)+')';delete bg.dataset.bg;}
      imgIO.unobserve(bg);
    });
  },{rootMargin:'100px'});
}

function renderPage(gr,list,p,animate){
  gr.innerHTML='';
  if(!list.length){gr.innerHTML='<div class="pb-empty"><span>📭</span>Sin entradas</div>';return;}
  const maxPg=Math.ceil(list.length/PAGE)-1;
  const slice=list.slice(p*PAGE,(p+1)*PAGE);
  setupImgIO();
  slice.forEach((item,i)=>{
    const card=mkCard(item,p===0&&i===0);
    gr.appendChild(card);
    const bg=card.querySelector('.pb-bg[data-bg]');
    if(bg)imgIO.observe(bg);
  });
  if(list.length>PAGE){
    const nav=document.createElement('div');nav.className='pb-pg';
    const bP=document.createElement('button');bP.textContent='Anterior';bP.disabled=p===0;
    const bN=document.createElement('button');bN.textContent='Siguiente';bN.disabled=p===maxPg;
    bP.onclick=()=>{curPg--;renderPage(gr,curList,curPg,true)};
    bN.onclick=()=>{curPg++;renderPage(gr,curList,curPg,true)};
    nav.append(bP,bN);gr.appendChild(nav);
  }
  if(animate){gr.classList.remove('pb-anim');void gr.offsetWidth;gr.classList.add('pb-anim');}
}

function loadMS(cb){
  if(window.MiniSearch){cb();return;}
  const s=document.createElement('script');
  s.src=MS_CDN;s.onload=cb;
  s.onerror=()=>{const f=document.createElement('script');f.src=MS_LOCAL;f.onload=cb;document.head.appendChild(f);};
  document.head.appendChild(s);
}

function initMS(){
  ms=new MiniSearch({fields:['name','cat','sub'],storeFields:['name','cat','sub','img','md'],searchOptions:{prefix:true,fuzzy:.2}});
  let id=0;
  ms.addAll(allItems.map(x=>({...x,id:id++})));
  msReady=true;
}

function doSearch(q){
  const res=document.getElementById('pb-sh-res');
  if(!q){res.innerHTML='<div class="pb-sh-mt">Escribe para buscar</div>';return;}
  if(!msReady){res.innerHTML='<div class="pb-sh-mt">Cargando...</div>';return;}
  const ids=new Set(ms.search(q).map(x=>x.id));
  const hits=allItems.filter((_,i)=>ids.has(i));
  if(!hits.length){res.innerHTML='<div class="pb-sh-mt">Sin resultados</div>';return;}
  res.innerHTML='';
  hits.forEach(it=>{
    const a=document.createElement('a');a.className='pb-sh-it';a.href=it.md;
    const img=document.createElement('img');img.src=it.img;img.alt=it.name;img.loading='lazy';img.decoding='async';
    const info=document.createElement('div');info.className='pb-sh-it-info';
    info.innerHTML=`<div class="pb-sh-it-nm">${it.name}</div><div class="pb-sh-it-cat">${it.cat}${it.sub?'/'+it.sub:''}</div>`;
    a.append(img,info);
    a.addEventListener('click',closeSearch);
    res.appendChild(a);
  });
}

function openSearch(){
  document.getElementById('pb-sh-modal').classList.add('pb-v');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('pb-sh-inp').focus(),100);
  document.getElementById('pb-sh-res').innerHTML='<div class="pb-sh-mt">Escribe para buscar</div>';
}

function closeSearch(){
  document.getElementById('pb-sh-modal').classList.remove('pb-v');
  document.body.style.overflow='';
  document.getElementById('pb-sh-inp').value='';
  document.getElementById('pb-sh-clr').classList.remove('pb-sv');
}

async function init(){
  const gr=document.getElementById('pb-gr');
  const ld=document.getElementById('pb-ld');
  const cnt=document.getElementById('pb-cnt');
  if(!gr)return;
  const galleries=await fetchData();
  if(ld)ld.style.display='none';
  gr.style.display='';
  if(!galleries){gr.innerHTML='<div class="pb-empty"><span>⚠️</span>Error cargando datos</div>';return;}
  allItems=parseItems(galleries);
  if(cnt)cnt.textContent=allItems.length+(allItems.length===1?' entrada':' entradas');
  curList=allItems;curPg=0;
  renderPage(gr,curList,0,false);
  loadMS(initMS);
}

document.getElementById('pb-sh-btn').addEventListener('click',e=>{e.preventDefault();openSearch();});
document.getElementById('pb-sh-close').addEventListener('click',closeSearch);
document.getElementById('pb-sh-modal').addEventListener('click',e=>{if(e.target===document.getElementById('pb-sh-modal'))closeSearch();});

const inp=document.getElementById('pb-sh-inp');
const clrBtn=document.getElementById('pb-sh-clr');
inp.addEventListener('input',()=>{
  clrBtn.classList.toggle('pb-sv',inp.value.length>0);
  clearTimeout(dbt);dbt=setTimeout(()=>doSearch(inp.value.trim()),250);
});
clrBtn.addEventListener('click',()=>{
  inp.value='';clrBtn.classList.remove('pb-sv');inp.focus();
  document.getElementById('pb-sh-res').innerHTML='<div class="pb-sh-mt">Escribe para buscar</div>';
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});

function onCL(){
  if(!document.getElementById('pb-wrap'))return;
  curList=[];curPg=0;allItems=[];ms=null;msReady=false;
  document.addEventListener('contentUnload',onCU,{once:true});
  init();
}
function onCU(){document.removeEventListener('contentLoaded',onCL);}
document.addEventListener('contentLoaded',onCL);
document.addEventListener('contentUnload',onCU,{once:true});

init();
})();
</script>
