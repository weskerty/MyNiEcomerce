<style>
#sh-w{
  --acc:#38bdf8;
  --acc2:#818cf8;
  --glass:rgba(255,255,255,.06);
  --glass-b:rgba(255,255,255,.11);
  --border:rgba(255,255,255,.13);
  --txt:rgba(255,255,255,.9);
  --txt-dim:rgba(255,255,255,.45);
  font-family:inherit;
}

#sh-w *{box-sizing:border-box}

#sh-bar{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  border-radius:24px;
  padding:12px 18px;
  transition:border-color .2s,box-shadow .2s;
}
#sh-bar:focus-within{
  border-color:rgba(56,189,248,.4);
  box-shadow:0 0 0 3px rgba(56,189,248,.08),0 8px 32px rgba(0,0,0,.25);
}

#sh-bar .sh-home{
  font-size:1.3rem;
  text-decoration:none;
  flex-shrink:0;
  line-height:1;
  opacity:.8;
  transition:opacity .2s,transform .2s;
}
#sh-bar .sh-home:hover{opacity:1;transform:scale(1.15)}

#sh-icon{font-size:1.2rem;flex-shrink:0;opacity:.5}

#sh-inp{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:var(--txt);
  font-size:1rem;
  font-family:inherit;
  min-width:0;
  letter-spacing:.01em;
}
#sh-inp::placeholder{color:var(--txt-dim)}
#sh-inp::-webkit-search-cancel-button,
#sh-inp::-webkit-search-decoration{-webkit-appearance:none;display:none}

#sh-clr{
  background:rgba(255,255,255,.1);
  border:1px solid var(--border);
  border-radius:50%;
  color:var(--txt-dim);
  font-size:.85rem;
  cursor:pointer;
  width:26px;height:26px;
  display:none;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:background .2s,color .2s;
  line-height:1;
}
#sh-clr.sh-vis{display:flex}
#sh-clr:hover{background:rgba(255,255,255,.2);color:white}

#sh-r{margin-top:4px}

.sh-skeleton{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:8px 0;
}
.sh-sk-item{
  height:58px;
  border-radius:14px;
  background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);
  background-size:200% 100%;
  animation:sh-shimmer 1.4s infinite;
}
@keyframes sh-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.sh-cat{margin-bottom:20px}

.sh-cat-hd{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  padding-bottom:10px;
  border-bottom:2px solid #1a73e8;
}
.sh-cat-hd h2{
  margin:0;
  font-size:1.2rem;
  font-family:'Libre Baskerville','Merriweather','Times New Roman','Georgia',serif;
  font-weight:700;
  color:var(--txt);
  letter-spacing:.02em;
  text-align:center;
}

.sh-sub{margin-bottom:10px}
.sh-sub>h3{
  color:var(--txt-dim);
  margin:10px 0 6px;
  padding:4px 10px;
  font-size:.82rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  background:rgba(255,255,255,.04);
  border-radius:6px;
  display:inline-block;
}

.sh-it{
  display:flex;
  align-items:center;
  border-radius:14px;
  text-decoration:none;
  color:var(--txt);
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
  margin-bottom:6px;
  overflow:hidden;
  min-height:58px;
  transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;
  will-change:transform;
  position:relative;
}
.sh-it::after{
  content:'›';
  position:absolute;
  right:14px;
  font-size:1.2rem;
  color:var(--txt-dim);
  opacity:0;
  transform:translateX(-4px);
  transition:opacity .18s,transform .18s;
}
.sh-it:hover{
  transform:translateY(-2px);
  background:var(--glass-b);
  border-color:rgba(56,189,248,.28);
  box-shadow:0 6px 24px rgba(0,0,0,.22);
  text-decoration:none;
}
.sh-it:hover::after{opacity:1;transform:translateX(0)}

.sh-it img{
  width:58px;min-width:58px;max-width:58px;
  height:58px;
  align-self:stretch;
  object-fit:cover;
  border-radius:13px 0 0 13px;
  background:rgba(0,0,0,.3);
  display:block;
}

.sh-it-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:10px 36px 10px 14px;
  flex:1;
  min-width:0;
}
.sh-it-name{
  font-size:.95rem;
  line-height:1.35;
  word-break:break-word;
  color:var(--txt);
}

.sh-mt{
  color:var(--txt-dim);
  font-size:.95rem;
  text-align:center;
  padding:32px 0 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.sh-mt span{font-size:2rem}
</style>

<div id="sh-w">
  <div id="sh-bar">
    <a class="sh-home" href="web/es.html">🏠</a>
    <span id="sh-icon">🔍</span>
    <input id="sh-inp" type="search" placeholder="Buscar productos..." autocomplete="off">
    <button id="sh-clr" aria-label="Limpiar">✕</button>
  </div>
  <div id="sh-r"></div>
</div>

<script>
(function(){
const DJ='web/Dinamico/data.json';
const MS_CDN='https://cdn.jsdelivr.net/npm/minisearch@7/dist/umd/index.js';
const MS_LOCAL='web/scripts/Otros/MiniSearch/index.js';
const PAGE=40;

let ms,allItems=[],ready=false,curList=[],curOff=0,io=null,dbt=null;

const inp=document.getElementById('sh-inp');
const clr=document.getElementById('sh-clr');
const r=document.getElementById('sh-r');

function fN(p){return p.split('/').pop().replace(/\.[^.]+$/,'')}
function nN(n){const m=n.match(/NB=([^.]+)/);return m?m[1].trim():n}
function mL(p){return p.replace(/\.[^.]+$/,'.md')}

function loadMS(cb){
  const s=document.createElement('script');
  s.src=MS_CDN;
  s.onload=cb;
  s.onerror=()=>{const f=document.createElement('script');f.src=MS_LOCAL;f.onload=cb;document.head.appendChild(f)};
  document.head.appendChild(s);
}

function buildItems(galleries){
  let id=0;
  Object.entries(galleries).forEach(([cat,val])=>{
    if(Array.isArray(val)){
      val.forEach(p=>allItems.push({id:id++,name:nN(fN(p)),cat,sub:'',img:p,md:mL(p)}));
    }else{
      Object.entries(val).forEach(([sub,arr])=>{
        arr.forEach(p=>allItems.push({id:id++,name:nN(fN(p)),cat,sub,img:p,md:mL(p)}));
      });
    }
  });
}

function mkItem(it){
  const a=document.createElement('a');
  a.className='sh-it';
  a.href=it.md;
  const img=document.createElement('img');
  img.src=it.img;img.alt=it.name;img.loading='lazy';img.decoding='async';img.width=58;img.height=58;
  const info=document.createElement('div');
  info.className='sh-it-info';
  const nm=document.createElement('span');
  nm.className='sh-it-name';
  nm.textContent=it.name;
  info.appendChild(nm);
  a.appendChild(img);a.appendChild(info);
  return a;
}

function mkSentinel(){
  const d=document.createElement('div');
  d.id='sh-sentinel';d.style.height='1px';
  return d;
}

function appendPage(container,list,off){
  const slice=list.slice(off,off+PAGE);
  if(!slice.length)return off;
  const cats={};
  slice.forEach(it=>{
    const ck=it.cat;
    if(!cats[ck])cats[ck]={};
    const sk=it.sub||'__';
    if(!cats[ck][sk])cats[ck][sk]=[];
    cats[ck][sk].push(it);
  });
  Object.entries(cats).forEach(([cat,subs])=>{
    let catDiv=container.querySelector(`.sh-cat[data-cat="${CSS.escape(cat)}"]`);
    if(!catDiv){
      catDiv=document.createElement('div');
      catDiv.className='sh-cat';
      catDiv.dataset.cat=cat;
      const hd=document.createElement('div');
      hd.className='sh-cat-hd';
      const h2=document.createElement('h2');
      h2.textContent=cat;
      hd.appendChild(h2);
      catDiv.appendChild(hd);
      container.appendChild(catDiv);
    }
    Object.entries(subs).forEach(([sub,its])=>{
      let subDiv=null;
      if(sub!=='__'){
        subDiv=catDiv.querySelector(`.sh-sub[data-sub="${CSS.escape(sub)}"]`);
        if(!subDiv){
          subDiv=document.createElement('div');
          subDiv.className='sh-sub';
          subDiv.dataset.sub=sub;
          const h3=document.createElement('h3');
          h3.textContent=sub;
          subDiv.appendChild(h3);
          catDiv.appendChild(subDiv);
        }
      }
      its.forEach(it=>(subDiv||catDiv).appendChild(mkItem(it)));
    });
  });
  return off+slice.length;
}

function setupIO(container,list){
  if(io)io.disconnect();
  let sent=document.getElementById('sh-sentinel');
  if(!sent){sent=mkSentinel();container.appendChild(sent);}
  io=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting)return;
    if(curOff>=list.length){io.disconnect();sent.remove();return;}
    curOff=appendPage(container,list,curOff);
    if(curOff>=list.length){io.disconnect();sent.remove();}
  },{rootMargin:'200px'});
  io.observe(sent);
}

function showSkeleton(){
  const sk=document.createElement('div');
  sk.className='sh-skeleton';
  for(let i=0;i<6;i++){const d=document.createElement('div');d.className='sh-sk-item';d.style.animationDelay=(i*.08)+'s';sk.appendChild(d);}
  r.innerHTML='';r.appendChild(sk);
}

function renderItems(list){
  r.innerHTML='';
  if(!list.length){
    r.innerHTML='<div class="sh-mt"><span>🔍</span>Sin resultados</div>';
    return;
  }
  curList=list;curOff=0;
  curOff=appendPage(r,list,curOff);
  if(curOff<list.length)setupIO(r,list);
}

function initMS(){
  ms=new MiniSearch({fields:['name','cat','sub'],storeFields:['name','cat','sub','img','md'],searchOptions:{prefix:true,fuzzy:.2}});
  ms.addAll(allItems);
  ready=true;
  renderItems(allItems);
}

async function init(){
  showSkeleton();
  try{
    const sk='__dj:'+DJ;
    let g=null;
    try{const sc=sessionStorage.getItem(sk);if(sc)g=JSON.parse(sc);}catch(e){}
    if(!g){
      const res=await fetch(DJ);
      const d=await res.json();
      g=d.galleries;
      try{sessionStorage.setItem(sk,JSON.stringify(g));}catch(e){}
    }
    buildItems(g);
  }catch(e){r.innerHTML='<div class="sh-mt"><span>⚠️</span>Error cargando datos</div>';return;}
  loadMS(initMS);
}

function doSearch(){
  const q=inp.value.trim();
  clr.classList.toggle('sh-vis',q.length>0);
  if(!q){renderItems(allItems);return;}
  const ids=new Set(ms.search(q).map(x=>x.id));
  renderItems(allItems.filter(it=>ids.has(it.id)));
}

inp.addEventListener('input',function(){
  if(!ready)return;
  clearTimeout(dbt);
  dbt=setTimeout(doSearch,250);
});

clr.addEventListener('click',function(){
  inp.value='';
  clr.classList.remove('sh-vis');
  inp.focus();
  if(ready)renderItems(allItems);
});

init();
})();
</script>
