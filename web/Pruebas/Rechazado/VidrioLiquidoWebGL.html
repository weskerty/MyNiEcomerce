<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG Test</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow-x:hidden}
#root{position:relative;min-height:100vh;overflow:visible}
#bg-video{position:fixed;top:50%;left:50%;width:100%;min-height:100dvh;height:100%;object-fit:cover;transform:translate(-50%,-50%);z-index:-1}
.glass{position:relative;padding:24px;color:#fff;margin:80px auto 20px;max-width:760px}
.glass-fallback{background:rgba(20,20,20,0.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px;border:1px solid rgba(255,255,255,0.15)}
.pill{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);height:45px;padding:0 20px;display:flex;align-items:center;gap:10px;border-radius:30px;z-index:9999}
.pill-fallback{background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.18)}
.LGT_transp{background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-color:transparent!important}
#status{position:fixed;top:8px;left:8px;font-size:11px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:8px;z-index:99999;line-height:1.5}
</style>
</head>
<body>

<div id="status">Detectando...</div>

<div id="root">
  <video id="bg-video" autoplay muted loop playsinline crossorigin="anonymous">
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
  </video>

  <div class="glass glass-fallback" id="panel1">
    <h2>test</h2>
    <p>Rechazado por mal rendimiento en video al deslizar y complejidad con kore.</p>
  </div>
  <div class="glass glass-fallback" id="panel2">
    <p>Segundo panel glass sobre el mismo root.</p>
  </div>

  <div class="pill pill-fallback" id="pill">
    <span>🛒</span><span id="pillCount">3</span><span>Finalizar Compra</span>
  </div>
</div>

<script>
!function(){
const SE=document.getElementById('status');
function WG1(){
  try{
    const c=document.createElement('canvas');
    return!!(window.WebGLRenderingContext&&(c.getContext('webgl2')||c.getContext('webgl')));
  }catch(e){return!1}
}
const perf=localStorage.getItem('perf');
const webgl=WG1();
const canLG=webgl&&perf!=='low';
SE.innerHTML=`WebGL: ${webgl?'si':'no'}<br>perf localStorage: ${perf||'(sin dato)'}<br>Usando: ${canLG?'LiquidGlass':'CSS fallback'}`;
if(!canLG)return;
import('https://cdn.jsdelivr.net/npm/@ybouane/liquidglass/dist/index.js').then(mod=>{
  const{LiquidGlass}=mod;
  document.fonts.ready.then(async()=>{
    const root=document.getElementById('root');
    const gEls=[document.getElementById('panel1'),document.getElementById('panel2'),document.getElementById('pill')];
    try{
      const inst=await LiquidGlass.init({root,glassElements:gEls});
      gEls.forEach(el=>el.classList.add('LGT_transp'));
      SE.innerHTML+='<br>LiquidGlass OK';
      window.__LG=inst;
    }catch(err){
      SE.innerHTML+='<br>Error LG init: '+err.message;
    }
  });
}).catch(err=>{
  SE.innerHTML+='<br>Error import LG: '+err.message;
});
}();
</script>
</body>
</html>
