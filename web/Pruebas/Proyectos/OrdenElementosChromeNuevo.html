<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CSS Grid Lanes Test</title>
<style>
body{font-family:sans-serif;margin:20px;background:#f0f2f5}
#A1{display:grid-lanes;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:20px}
.B1{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);padding:15px;box-sizing:border-box}
button{padding:8px 16px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<h1>Prueba CSS Grid-Lanes (Masonry Chromium)</h1>
<p>Requiere 'Experimental Web Platform features' activado en chrome://flags</p>
<button onclick="C1()">Añadir Bloque Aleatorio</button>
<div id="A1">
<div class="B1" style="height:120px">Bloque 1 (120px)</div>
<div class="B1" style="height:250px">Bloque 2 (250px)</div>
<div class="B1" style="height:180px">Bloque 3 (180px)</div>
<div class="B1" style="height:90px">Bloque 4 (90px)</div>
<div class="B1" style="height:310px">Bloque 5 (310px)</div>
<div class="B1" style="height:140px">Bloque 6 (140px)</div>
</div>
<script>
function C1(){let d=document.getElementById("A1"),e=document.createElement("div"),h=Math.floor(Math.random()*(350-100+1))+100;e.className="B1";e.style.height=h+"px";e.innerText=`Nuevo (${h}px)`;d.appendChild(e)}
</script>
</body>
</html>
