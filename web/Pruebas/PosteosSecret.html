<style>
#SB_W *{box-sizing:border-box}
.SB_NB{position:absolute;top:0;font-size:1.8rem;text-decoration:none;z-index:10}
.SB_NBL{left:0}
.SB_NBR{right:0}
.SB_HD{margin-bottom:clamp(16px,3vw,32px)}
.SB_HD h2{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;color:rgba(255,255,255,.95);letter-spacing:-.02em;border-bottom:2px solid #1a73e8;padding-bottom:.5rem;display:inline-block}
.SB_BR{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
#SB_AB{padding:8px 18px;border-radius:20px;border:1px solid rgba(120,200,255,.35);background:rgba(120,200,255,.1);color:#9fd8ff;font-size:.8rem;letter-spacing:.05em;cursor:pointer;transition:background .2s,transform .15s}
#SB_AB:hover{background:rgba(120,200,255,.2);transform:translateY(-1px)}
.SB_FRM{display:none;flex-direction:column;gap:8px;margin:14px auto 0;max-width:520px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px;backdrop-filter:blur(10px)}
.SB_FRM textarea{resize:vertical;min-height:70px;max-height:220px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.2);color:#fff;padding:10px;font-size:.9rem;font-family:inherit}
.SB_FRM .SB_CNT{font-size:.7rem;color:rgba(255,255,255,.4);text-align:right}
.SB_FRM button{align-self:flex-end;padding:7px 16px;border-radius:14px;border:1px solid rgba(120,200,255,.4);background:rgba(120,200,255,.15);color:#cfe9ff;cursor:pointer}
.SB_LST{display:flex;flex-direction:column;gap:12px;max-width:640px;margin:0 auto}
.SB_IT{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:14px 16px;text-align:left;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.12);cursor:pointer}
.SB_ROW{display:flex;gap:10px;align-items:flex-start}
.SB_AV{width:36px;height:36px;border-radius:50%;flex:none;background-size:cover;background-position:center;border:1px solid rgba(255,255,255,.2)}
.SB_NM{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:4px;letter-spacing:.03em}
.SB_TX{color:rgba(255,255,255,.92);font-size:.92rem;line-height:1.45;white-space:pre-wrap;word-break:break-word}
.SB_MT{margin-top:8px;font-size:.7rem;color:rgba(255,255,255,.35)}
.SB_CW{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;gap:10px}
.SB_CW.SB_OPEN{display:flex}
.SB_CB{background:rgba(0,0,0,.18);border-radius:14px;padding:10px 12px}
.SB_CMORE{align-self:center;background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);border-radius:12px;padding:5px 14px;font-size:.75rem;cursor:pointer}
.SB_CFRM{display:flex;gap:8px}
.SB_CFRM input{flex:1;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.2);color:#fff;padding:8px 10px;font-size:.85rem}
.SB_CFRM button{border-radius:12px;border:1px solid rgba(120,200,255,.4);background:rgba(120,200,255,.15);color:#cfe9ff;padding:0 14px;cursor:pointer}
.SB_EMP{text-align:center;padding:50px 20px;color:rgba(255,255,255,.4)}
.SB_DTS{display:flex;align-items:center;justify-content:center;gap:7px;padding:50px}
.SB_DT{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);animation:SB_P .8s ease-in-out infinite}
.SB_DT:nth-child(2){animation-delay:.15s}
.SB_DT:nth-child(3){animation-delay:.3s}
@keyframes SB_P{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.SB_PG{display:flex;justify-content:center;margin-top:16px}
.SB_PG button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;padding:6px 18px;cursor:pointer;font-size:.85em}
.SB_PG button:disabled{opacity:.3;cursor:default}
</style>

<a class="SB_NB SB_NBL" href="web/es.html">🏠</a>

<div style="text-align:center">
<div id="SB_W">
<div class="SB_HD">
<h2>SECRETOS</h2>
<div class="SB_BR"><button id="SB_AB">✍️ Añadir Nota</button></div>
<div class="SB_FRM" id="SB_PF">
<textarea id="SB_PTX" maxlength="2000" placeholder="Escribe algo..."></textarea>
<div class="SB_CNT"><span id="SB_PCT">0</span>/2000</div>
<div style="display:flex;gap:8px;justify-content:flex-end">
<button id="SB_PCA" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.7)">Cancelar</button>
<button id="SB_PSD">Publicar</button>
</div>
</div>
</div>
<div class="SB_DTS" id="SB_LD"><div class="SB_DT"></div><div class="SB_DT"></div><div class="SB_DT"></div></div>
<div class="SB_LST" id="SB_LS" style="display:none"></div>
</div>
</div>

<script>
(function(){
const SB_API='/api/secret';
const SB_PG=30;
let SB_off=0,SB_load=false,SB_ac=null,SB_open=null;

function SB_seed(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return h;}
function SB_av(id){return `https://picsum.photos/seed/${SB_seed(id)}/64/64`;}
function SB_nm(id){const n=SB_seed(id)%10000;return 'Anonimo#'+String(n).padStart(4,'0');}
function SB_esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function SB_clean(t){
  return t.replace(/<[^>]*>/g,'').replace(/!\[[^\]]*\]\([^)]*\)/g,'').replace(/\[[^\]]*\]\([^)]*\)/g,'').trim();
}
function SB_time(ts){
  const d=new Date(ts),now=Date.now(),diff=(now-ts)/1000;
  if(diff<60)return 'ahora';
  if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return d.toLocaleDateString();
}

function SB_mkCmt(c){
  const w=document.createElement('div');w.className='SB_CB';
  w.innerHTML=`<div class="SB_ROW"><div class="SB_AV" style="background-image:url(${SB_av(String(c.ts))})"></div>
  <div style="flex:1"><div class="SB_NM">${SB_nm(String(c.ts))} · ${SB_time(c.ts)}</div>
  <div class="SB_TX">${SB_esc(c.txt)}</div></div></div>`;
  return w;
}

async function SB_openCmts(it,p){
  const cw=it.querySelector('.SB_CW');
  if(SB_open&&SB_open!==cw)SB_open.classList.remove('SB_OPEN');
  cw.classList.toggle('SB_OPEN');
  SB_open=cw.classList.contains('SB_OPEN')?cw:null;
  if(!cw.classList.contains('SB_OPEN')||cw.dataset.loaded)return;
  cw.dataset.loaded='1';
  await SB_loadCmts(cw,p.id,0);
}

async function SB_loadCmts(cw,pid,coff){
  try{
    const r=await fetch(`${SB_API}?id=${encodeURIComponent(pid)}&coff=${coff}`);
    const d=await r.json();
    const box=cw.querySelector('.SB_CBOX');
    (d.cmts||[]).forEach(c=>box.appendChild(SB_mkCmt(c)));
    const more=cw.querySelector('.SB_CMORE');
    if(d.cmts&&d.cmts.length===SB_PG){
      more.style.display='';
      more.onclick=()=>SB_loadCmts(cw,pid,coff+SB_PG);
    }else if(more)more.style.display='none';
  }catch(e){}
}

async function SB_sendCmt(pid,txt,cw){
  const c=SB_clean(txt).slice(0,500);
  if(!c)return;
  try{
    const r=await fetch(`${SB_API}?c=1`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:pid,txt:c})});
    if(!r.ok)return;
    const row=await r.json();
    cw.querySelector('.SB_CBOX').appendChild(SB_mkCmt(row));
  }catch(e){}
}

function SB_mkItem(p){
  const it=document.createElement('div');it.className='SB_IT';
  const nm=SB_nm(p.id),av=SB_av(p.id);
  it.innerHTML=`
  <div class="SB_ROW">
  <div class="SB_AV" style="background-image:url(${av})"></div>
  <div style="flex:1">
  <div class="SB_NM">${nm}</div>
  <div class="SB_TX">${SB_esc(p.txt)}</div>
  <div class="SB_MT">${SB_time(p.ts)} · ${p.nc||0} comentarios</div>
  </div></div>
  <div class="SB_CW">
  <div class="SB_CBOX"></div>
  <button class="SB_CMORE" style="display:none">Cargar mas</button>
  <div class="SB_CFRM"><input type="text" maxlength="500" placeholder="Comentar..."/><button>Enviar</button></div>
  </div>`;
  it.querySelector('.SB_ROW').addEventListener('click',()=>SB_openCmts(it,p));
  const inp=it.querySelector('.SB_CFRM input'),btn=it.querySelector('.SB_CFRM button');
  const send=()=>{if(!inp.value.trim())return;SB_sendCmt(p.id,inp.value,it.querySelector('.SB_CW'));inp.value='';};
  btn.addEventListener('click',e=>{e.stopPropagation();send();});
  inp.addEventListener('click',e=>e.stopPropagation());
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
  return it;
}

async function SB_fetchPage(off){
  if(SB_ac)SB_ac.abort();
  SB_ac=new AbortController();
  try{
    const r=await fetch(`${SB_API}?off=${off}`,{signal:SB_ac.signal});
    return await r.json();
  }catch(e){return [];}
}

async function SB_render(off,append){
  const ls=document.getElementById('SB_LS'),ld=document.getElementById('SB_LD');
  const posts=await SB_fetchPage(off);
  if(ld)ld.style.display='none';
  ls.style.display='';
  if(!append)ls.innerHTML='';
  ls.querySelectorAll('.SB_PG').forEach(n=>n.remove());
  if(!posts.length&&!append){
    ls.innerHTML='<div class="SB_EMP">🕳️ Sin publicaciones aun</div>';
    return;
  }
  posts.forEach(p=>ls.appendChild(SB_mkItem(p)));
  if(posts.length===SB_PG){
    const nav=document.createElement('div');nav.className='SB_PG';
    const b=document.createElement('button');b.textContent='Cargar mas';
    b.onclick=()=>{SB_off+=SB_PG;SB_render(SB_off,true);};
    nav.appendChild(b);ls.appendChild(nav);
  }
}

function SB_updCnt(){
  const t=document.getElementById('SB_PTX'),c=document.getElementById('SB_PCT');
  if(t&&c)c.textContent=t.value.length;
}

async function SB_publish(){
  const t=document.getElementById('SB_PTX');
  const c=SB_clean(t.value).slice(0,2000);
  if(!c)return;
  const btn=document.getElementById('SB_PSD');
  btn.disabled=true;
  try{
    const r=await fetch(SB_API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({txt:c})});
    if(r.status===429){alert('Limite diario alcanzado');btn.disabled=false;return;}
    if(!r.ok){btn.disabled=false;return;}
    const p=await r.json();
    t.value='';SB_updCnt();
    const pf=document.getElementById('SB_PF');
    pf.classList.remove('SB_FOPEN');
    pf.style.display='none';
    const ls=document.getElementById('SB_LS');
    ls.insertBefore(SB_mkItem(p),ls.firstChild);
  }catch(e){}
  btn.disabled=false;
}

function SB_init(){
  if(!document.getElementById('SB_W'))return;
  SB_off=0;
  const ab=document.getElementById('SB_AB'),pf=document.getElementById('SB_PF');
  ab.addEventListener('click',()=>{
    const open=pf.classList.toggle('SB_FOPEN');
    pf.style.display=open?'flex':'none';
  });
  document.getElementById('SB_PCA').addEventListener('click',()=>{
    pf.classList.remove('SB_FOPEN');
    pf.style.display='none';
    document.getElementById('SB_PTX').value='';
    SB_updCnt();
  });
  document.getElementById('SB_PTX').addEventListener('input',SB_updCnt);
  document.getElementById('SB_PSD').addEventListener('click',SB_publish);
  SB_render(0,false);
}

function SB_cleanup(){
  if(SB_ac)SB_ac.abort();
  document.removeEventListener('contentLoaded',SB_init);
}

document.addEventListener('contentLoaded',SB_init);
document.addEventListener('contentUnload',SB_cleanup,{once:true});
})();
</script>
