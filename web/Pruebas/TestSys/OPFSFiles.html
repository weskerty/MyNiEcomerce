<style>
#ST_W{padding:8px 12px;max-width:900px;margin:0 auto}
.ST_TB{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.ST_TB a{font-size:1.3rem;text-decoration:none;opacity:.8}
.ST_TAB{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:#fff;padding:6px 16px;cursor:pointer;font-size:.85em}
.ST_TAB.on{background:rgba(56,189,248,.22);border-color:rgba(56,189,248,.45)}
.ST_INFO{margin-left:auto;font-size:.78em;color:rgba(255,255,255,.5)}
#ST_FE{min-height:340px;position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.ST_CRUMB{display:flex;gap:4px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1);font-size:.82em;align-items:center}
.ST_CRUMB span{cursor:pointer;color:#7dd3fc}
.ST_CRUMB span:hover{text-decoration:underline}
.ST_CRUMB .sep{color:rgba(255,255,255,.35);cursor:default}
.ST_LIST{flex:1;overflow-y:auto;max-height:50vh}
.ST_ROW{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;user-select:none}
.ST_ROW:hover{background:rgba(255,255,255,.05)}
.ST_ROW input{margin:0}
.ST_ROW .ic{font-size:1.1em;width:22px;text-align:center;flex-shrink:0}
.ST_ROW .nm{flex:1;font-size:.88em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ST_ROW .sz{font-size:.75em;color:rgba(255,255,255,.45);flex-shrink:0}
.ST_ACTIONS{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.1);flex-wrap:wrap}
.ST_ACTIONS button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:7px 14px;cursor:pointer;font-size:.82em}
.ST_ACTIONS button:hover{background:rgba(255,255,255,.16)}
.ST_ACTIONS button.danger{background:rgba(255,90,90,.15);border-color:rgba(255,90,90,.35);color:#ffb0b0}
.ST_ACTIONS button.danger:hover{background:rgba(255,90,90,.28)}
.ST_ACTIONS button:disabled{opacity:.4;cursor:default}
.ST_PANE{display:none}
.ST_PANE.on{display:block}
.ST_CACHES{display:flex;flex-direction:column;gap:8px}
.ST_CI{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px}
.ST_CI .nm{flex:1;font-size:.9em}
.ST_CI .ct{font-size:.75em;color:rgba(255,255,255,.5)}
.ST_CI button{background:rgba(255,90,90,.15);border:1px solid rgba(255,90,90,.35);color:#ffb0b0;border-radius:10px;padding:6px 14px;cursor:pointer;font-size:.82em}
.ST_CI button:hover{background:rgba(255,90,90,.28)}
.ST_MSG{text-align:center;color:rgba(255,255,255,.5);padding:24px;font-size:.9em}
</style>

<div id="ST_W">
<div class="ST_TB">
<a href="web/es.html">🏠</a>
<button class="ST_TAB on" id="ST_TFS">📁 Archivos</button>
<button class="ST_TAB" id="ST_TCH">🗄️ Cache</button>
<span class="ST_INFO" id="ST_QT"></span>
</div>

<div class="ST_PANE on" id="ST_PFS">
<div id="ST_FE">
<div class="ST_CRUMB" id="ST_CR"></div>
<div class="ST_LIST" id="ST_LI"></div>
<div class="ST_ACTIONS">
<button id="ST_NF">📁 Nueva carpeta</button>
<button id="ST_DW" disabled>⬇️ Descargar seleccionados</button>
<button id="ST_DL" class="danger" disabled>🗑️ Borrar seleccionados</button>
</div>
</div>
</div>

<div class="ST_PANE" id="ST_PCH">
<div class="ST_CACHES" id="ST_CL"></div>
</div>
</div>

<script>
(function(){
  const tFS=document.getElementById('ST_TFS'),tCH=document.getElementById('ST_TCH');
  const pFS=document.getElementById('ST_PFS'),pCH=document.getElementById('ST_PCH');
  const qtEl=document.getElementById('ST_QT');
  const clEl=document.getElementById('ST_CL');
  const crEl=document.getElementById('ST_CR');
  const liEl=document.getElementById('ST_LI');
  const nfBtn=document.getElementById('ST_NF');
  const dwBtn=document.getElementById('ST_DW');
  const dlBtn=document.getElementById('ST_DL');
  let curPath=[];
  let sel=new Set();

  function fmtSize(b){
    if(b==null)return '-';
    if(b<1024)return b+' B';
    if(b<1048576)return (b/1024).toFixed(1)+' KB';
    if(b<1073741824)return (b/1048576).toFixed(1)+' MB';
    return (b/1073741824).toFixed(2)+' GB';
  }

  async function updQuota(){
    try{
      const est=await navigator.storage.estimate();
      qtEl.textContent=fmtSize(est.usage)+' / '+fmtSize(est.quota);
    }catch{qtEl.textContent='';}
  }

  async function getDirByPath(path){
    let dir=await navigator.storage.getDirectory();
    for(const seg of path)dir=await dir.getDirectoryHandle(seg);
    return dir;
  }

  function renderCrumb(){
    crEl.innerHTML='';
    const root=document.createElement('span');
    root.textContent='OPFS (/)';
    root.onclick=()=>{curPath=[];sel.clear();loadFS();};
    crEl.appendChild(root);
    curPath.forEach((seg,i)=>{
      const s=document.createElement('span');s.className='sep';s.textContent=' / ';
      crEl.appendChild(s);
      const b=document.createElement('span');
      b.textContent=seg;
      b.onclick=()=>{curPath=curPath.slice(0,i+1);sel.clear();loadFS();};
      crEl.appendChild(b);
    });
  }

  function updDlBtn(){
    dlBtn.disabled=sel.size===0;
    dlBtn.textContent='🗑️ Borrar seleccionados'+(sel.size?' ('+sel.size+')':'');
    dwBtn.disabled=sel.size===0;
    dwBtn.textContent='⬇️ Descargar seleccionados'+(sel.size?' ('+sel.size+')':'');
  }

  async function loadFS(){
    renderCrumb();
    liEl.innerHTML='<div class="ST_MSG">Cargando...</div>';
    sel.clear();updDlBtn();
    try{
      const dir=await getDirByPath(curPath);
      const items=[];
      for await(const[name,handle]of dir.entries()){
        if(handle.kind==='directory'){
          items.push({name,isdir:true,size:null});
        }else{
          let size=0;
          try{size=(await handle.getFile()).size;}catch{}
          items.push({name,isdir:false,size});
        }
      }
      items.sort((a,b)=>a.isdir!==b.isdir?(a.isdir?-1:1):a.name.localeCompare(b.name));
      liEl.innerHTML='';
      if(!items.length){liEl.innerHTML='<div class="ST_MSG">Carpeta vacia</div>';return;}
      items.forEach(it=>{
        const row=document.createElement('div');row.className='ST_ROW';
        const cb=document.createElement('input');cb.type='checkbox';
        cb.onclick=e=>{
          e.stopPropagation();
          cb.checked?sel.add(it.name):sel.delete(it.name);
          updDlBtn();
        };
        const ic=document.createElement('span');ic.className='ic';ic.textContent=it.isdir?'📁':'📄';
        const nm=document.createElement('span');nm.className='nm';nm.textContent=it.name;
        const sz=document.createElement('span');sz.className='sz';sz.textContent=it.isdir?'':fmtSize(it.size);
        row.append(cb,ic,nm,sz);
        row.onclick=()=>{if(it.isdir){curPath=curPath.concat(it.name);loadFS();}};
        liEl.appendChild(row);
      });
      updQuota();
    }catch(e){
      liEl.innerHTML='<div class="ST_MSG">Error al leer OPFS: '+e.message+'</div>';
    }
  }

  nfBtn.onclick=async()=>{
    const name=prompt('Nombre de la carpeta:');
    if(!name)return;
    try{
      const dir=await getDirByPath(curPath);
      await dir.getDirectoryHandle(name,{create:true});
      loadFS();
    }catch(e){alert('Error: '+e.message);}
  };

  dlBtn.onclick=async()=>{
    if(!sel.size)return;
    if(!confirm('Borrar '+sel.size+' elemento(s) de forma PERMANENTE? Esto no se puede deshacer.'))return;
    try{
      const dir=await getDirByPath(curPath);
      for(const name of sel)await dir.removeEntry(name,{recursive:true});
      loadFS();
    }catch(e){alert('Error al borrar: '+e.message);}
  };

  function downloadBlob(file,name){
    const url=URL.createObjectURL(file);
    const a=document.createElement('a');
    a.href=url;a.download=name;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  }

  async function delay(ms){return new Promise(r=>setTimeout(r,ms));}

  async function downloadDirRecursive(dirHandle){
    for await(const[name,handle]of dirHandle.entries()){
      if(handle.kind==='directory'){
        await downloadDirRecursive(handle);
      }else{
        const file=await handle.getFile();
        downloadBlob(file,name);
        await delay(250);
      }
    }
  }

  dwBtn.onclick=async()=>{
    if(!sel.size)return;
    dwBtn.disabled=true;
    try{
      const dir=await getDirByPath(curPath);
      for(const name of sel){
        const handle=await dir.getDirectoryHandle(name).catch(()=>null);
        if(handle){
          await downloadDirRecursive(handle);
        }else{
          const fh=await dir.getFileHandle(name);
          const file=await fh.getFile();
          downloadBlob(file,name);
          await delay(250);
        }
      }
    }catch(e){alert('Error al descargar: '+e.message);}
    updDlBtn();
  };

  async function loadCaches(){
    clEl.innerHTML='<p class="ST_MSG">Cargando...</p>';
    try{
      const keys=await caches.keys();
      if(!keys.length){clEl.innerHTML='<p class="ST_MSG">Sin caches almacenados</p>';return;}
      clEl.innerHTML='';
      for(const key of keys){
        const c=await caches.open(key);
        const reqs=await c.keys();
        const row=document.createElement('div');
        row.className='ST_CI';
        row.innerHTML='<div class="nm">'+key+'</div><div class="ct">'+reqs.length+' entradas</div>';
        const btn=document.createElement('button');
        btn.textContent='Borrar';
        btn.onclick=async()=>{
          if(!confirm('Borrar el cache "'+key+'" completo?'))return;
          await caches.delete(key);
          loadCaches();
          updQuota();
        };
        row.appendChild(btn);
        clEl.appendChild(row);
      }
    }catch(e){
      clEl.innerHTML='<p class="ST_MSG">Error: '+e.message+'</p>';
    }
  }

  function showTab(t){
    tFS.classList.toggle('on',t==='fs');
    tCH.classList.toggle('on',t==='ch');
    pFS.classList.toggle('on',t==='fs');
    pCH.classList.toggle('on',t==='ch');
    if(t==='ch')loadCaches();
  }

  tFS.onclick=()=>showTab('fs');
  tCH.onclick=()=>showTab('ch');

  loadFS();
  updQuota();
})();
</script>
