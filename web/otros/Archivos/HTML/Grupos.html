<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSS Test</title>
<style>
  :root {
    --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
    --txt: #e8e8e8; --muted: #888; --acc: #f0a500;
    --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; }
  input  { flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--txt); padding: .6rem 1rem; border-radius: var(--r); font-size: .95rem; outline: none; }
  input:focus { border-color: var(--acc); }
  button { background: var(--acc); color: #000; border: none; padding: .6rem 1.2rem; border-radius: var(--r); font-weight: 600; cursor: pointer; white-space: nowrap; }
  button:hover { opacity: .85; }
  #status { padding: .8rem 2rem; font-size: .85rem; color: var(--muted); min-height: 2rem; }
  #feed   { padding: 0 2rem 2rem; display: grid; gap: 1rem; }
  .item   { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.2rem; }
  .item h3 { font-size: 1rem; margin-bottom: .4rem; }
  .item h3 a { color: var(--acc); text-decoration: none; }
  .item h3 a:hover { text-decoration: underline; }
  .meta   { font-size: .78rem; color: var(--muted); margin-bottom: .8rem; }
  .media  { line-height: 1.6; font-size: .92rem; }
  .media img   { max-width: 100%; border-radius: 6px; display: block; margin: .4rem 0; }
  .media video { max-width: 100%; border-radius: 6px; display: block; margin: .4rem 0; }
  .media audio  { width: 100%; margin: .4rem 0; }
  .media p { margin: .4rem 0; }
  .media a { color: var(--acc); }
  @media(max-width:600px){ header { flex-direction: column; } input { width: 100%; } }
</style>
</head>
<body>

<header>
  <input id="urlInput" value="telegram/channel/2003488356" placeholder="rss path">
  <button onclick="load()">Cargar</button>
</header>
<div id="status"></div>
<div id="feed"></div>

<script>
const $  = id => document.getElementById(id);
const st = t  => { $('status').textContent = t; };

async function load() {
  const url = $('urlInput').value.trim();
  if (!url) return;
  $('feed').innerHTML = '';
  st('Cargando...');
  try {
    const res = await fetch(`/api/rss?url=${encodeURIComponent(url)}`);
    if (!res.ok) { st(`Error ${res.status}`); return; }
    const xml  = await res.text();
    const doc  = new DOMParser().parseFromString(xml, 'text/xml');
    const err  = doc.querySelector('parsererror');
    if (err) { st('XML invalido'); return; }

    const items = [...doc.querySelectorAll('item')];
    if (!items.length) { st('Sin items'); return; }
    st(`${items.length} publicaciones`);

    const g  = (el, tag) => el.getElementsByTagName(tag)[0]?.textContent || '';
    const gh = (el, tag) => {
      const node = el.getElementsByTagName(tag)[0];
      if (!node) return '';
      const cd = node.firstChild;
      return (cd && cd.nodeType === 4) ? cd.data : node.textContent;
    };

    $('feed').innerHTML = items.map(item => {
      const title  = g(item, 'title');
      const link   = g(item, 'link');
      const desc   = gh(item, 'description');
      const date   = g(item, 'pubDate');
      const author = g(item, 'author');
      const d      = date ? new Date(date).toLocaleString('es-PY') : '';
      return `<div class="item">
        <h3><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
        <div class="meta">${[author, d].filter(Boolean).join(' · ')}</div>
        <div class="media">${desc}</div>
      </div>`;
    }).join('');
  } catch (e) {
    st(`Error: ${e.message}`);
  }
}

load();
</script>
</body>
</html>
