<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:monospace;background:#0d0d0d;color:#ccc;padding:12px;font-size:13px}
.it{background:#111;border:1px solid #333;border-radius:8px;padding:12px;margin:10px 0}
.k{color:#7ec8e3}
.v{color:#b5e48c;word-break:break-all}
.tg{color:#f4a261}
.desc{background:#0a0a0a;border:1px solid #222;border-radius:4px;padding:8px;margin-top:6px;max-height:120px;overflow:auto;font-size:11px;color:#888}
button{background:#1a1a2e;border:1px solid #444;color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;margin-bottom:12px}
#status{color:#f4a261;margin-bottom:8px}
</style>
</head>
<body>
<button onclick="load()">Reload</button>
<div id="status"></div>
<div id="out"></div>
<script>
const RSS='telegram/channel/2003488356';
const st=document.getElementById('status');
const out=document.getElementById('out');

function gT(el,tag){return el.getElementsByTagName(tag)[0]?.textContent||'';}
function gH(el,tag){
  const n=el.getElementsByTagName(tag)[0];
  if(!n)return '';
  const c=n.firstChild;
  return(c&&c.nodeType===4)?c.data:n.textContent;
}

async function load(){
  st.textContent='Loading...';
  out.innerHTML='';
  try{
    const res=await fetch(`/api/rss?url=${encodeURIComponent(RSS)}`);
    st.textContent=`HTTP ${res.status}`;
    const txt=await res.text();
    const doc=new DOMParser().parseFromString(txt,'text/xml');
    const err=doc.querySelector('parsererror');
    if(err){st.textContent='ParseError: '+err.textContent;return;}
    const items=[...doc.querySelectorAll('item')];
    st.textContent=`OK - ${items.length} items`;
    items.forEach((item,i)=>{
      const title=gT(item,'title');
      const link=gT(item,'link');
      const desc=gH(item,'description');
      const date=gT(item,'pubDate');
      const isTg=link.startsWith('https://t.me');
      const div=document.createElement('div');
      div.className='it';
      div.innerHTML=`<b>#${i+1} ${isTg?'<span class="tg">[t.me - NO FIX]</span>':'<span style="color:#b5e48c">[link OK]</span>'}</b><br>
<span class="k">title:</span> <span class="v">${title}</span><br>
<span class="k">link:</span>  <span class="v">${link}</span><br>
<span class="k">date:</span>  ${date}<br>
<span class="k">desc:</span><div class="desc">${desc.replace(/</g,'&lt;')}</div>`;
      out.appendChild(div);
    });
  }catch(e){st.textContent='ERR: '+e.message;}
}
load();
</script>
</body>
</html>
