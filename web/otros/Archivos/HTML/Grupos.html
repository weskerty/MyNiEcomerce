<div class="rss-section">
  <h2>📰 Novedades</h2>
  <div id="rv-c"></div>
  <button id="rv-btn" class="view-all-button" style="display:none" onclick="rvOpen()">Ver todas →</button>
</div>

<div id="rv-ov">
  <div id="rv-inner">
    <div id="rv-hd">
      <span>📰 Novedades</span>
      <button onclick="rvClose()">✕</button>
    </div>
    <div id="rv-f"></div>
  </div>
</div>

<style>
.rss-section{margin:20px 0;border:1px solid rgba(255,255,255,.15);border-radius:15px;padding:16px}
.rss-section h2{color:#fff;margin-bottom:12px;font-size:1.4em;text-align:center}
.rv-ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;text-decoration:none;transition:background .2s}
.rv-ci:last-child{border-bottom:none}
.rv-ci-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.06)}
.rv-ci-thumb.rv-no{display:flex;align-items:center;justify-content:center;font-size:1.3em}
.rv-ci-info{flex:1;min-width:0}
.rv-ci-title{font-size:.88em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-h)}
.rv-ci-meta{font-size:.72em;color:rgba(255,255,255,.45);margin-top:2px}

#rv-ov{display:none;position:fixed;inset:0;z-index:50;overflow-y:auto;background:rgba(0,0,0,.9);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);padding:0}
#rv-ov.open{display:block}
#rv-inner{max-width:800px;margin:0 auto;padding:16px}
#rv-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #1a73e8;position:sticky;top:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);z-index:1;border-radius:0 0 4px 4px}
#rv-hd span{font-family:var(--font-h);font-size:1.3em;color:#fff}
#rv-hd button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:1em;transition:background .2s;line-height:1}
#rv-hd button:hover{background:rgba(255,255,255,.25)}
.rv-it{background:rgba(20,20,20,.5);border:1px solid rgba(255,255,255,.1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.rv-it-meta{padding:8px 14px 2px;font-size:.75em;color:rgba(255,255,255,.45)}
.rv-it-title{padding:2px 14px 8px;font-family:var(--font-h);font-size:.95em}
.rv-it-title a{color:#fff;text-decoration:none}
.rv-it-title a:hover{color:#1a73e8}
.rv-it-body img{width:100%;display:block}
.rv-it-body video{width:100%;display:block;background:#000}
.rv-it-body audio{width:100%;display:block;padding:8px 14px;box-sizing:border-box}
.rv-it-body p{padding:6px 14px;margin:0;font-size:.88em;color:#ddd;line-height:1.5}
.rv-it-body a{color:lightblue}
.rv-it-body div{padding:2px 14px;font-size:.83em;color:#bbb}
</style>

<script>
(function(){
  const RSS_PATH = 'telegram/channel/2003488356';
  const cEl = document.getElementById('rv-c');
  const fEl = document.getElementById('rv-f');
  const btn = document.getElementById('rv-btn');
  let items = [];

  function gT(el, tag){ return el.getElementsByTagName(tag)[0]?.textContent || ''; }
  function gH(el, tag){
    const n = el.getElementsByTagName(tag)[0];
    if (!n) return '';
    const c = n.firstChild;
    return (c && c.nodeType === 4) ? c.data : n.textContent;
  }

  function firstImg(html){
    const d = new DOMParser().parseFromString(html, 'text/html');
    return d.querySelector('img')?.src || null;
  }

  function mkCompact(item){
    const title = gT(item, 'title');
    const link  = gT(item, 'link');
    const desc  = gH(item, 'description');
    const date  = gT(item, 'pubDate');
    const d     = date ? new Date(date).toLocaleString('es-PY', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const img   = firstImg(desc);
    const a = document.createElement('a');
    a.className = 'rv-ci';
    a.href = link; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML = img
      ? `<img class="rv-ci-thumb" src="${img}" loading="lazy">`
      : `<div class="rv-ci-thumb rv-no">📌</div>`;
    a.innerHTML += `<div class="rv-ci-info"><div class="rv-ci-title">${title}</div><div class="rv-ci-meta">${d}</div></div>`;
    return a;
  }

  function mkFull(item){
    const title  = gT(item, 'title');
    const link   = gT(item, 'link');
    const desc   = gH(item, 'description');
    const date   = gT(item, 'pubDate');
    const author = gT(item, 'author');
    const d      = date ? new Date(date).toLocaleString('es-PY') : '';
    const div    = document.createElement('div');
    div.className = 'rv-it';
    div.innerHTML = `<div class="rv-it-meta">${[author, d].filter(Boolean).join(' · ')}</div>
      <div class="rv-it-title"><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></div>
      <div class="rv-it-body">${desc}</div>`;
    return div;
  }

  async function load(){
    try{
      const res = await fetch(`/api/rss?url=${encodeURIComponent(RSS_PATH)}`);
      if (!res.ok) return;
      const doc = new DOMParser().parseFromString(await res.text(), 'text/xml');
      if (doc.querySelector('parsererror')) return;
      items = [...doc.querySelectorAll('item')];
      if (!items.length) return;
      items.slice(0, 4).forEach(i => cEl.appendChild(mkCompact(i)));
      btn.style.display = '';
    } catch {}
  }

  window.rvOpen = function(){
    fEl.innerHTML = '';
    items.forEach(i => fEl.appendChild(mkFull(i)));
    document.getElementById('rv-ov').classList.add('open');
  };

  window.rvClose = function(){
    document.getElementById('rv-ov').classList.remove('open');
    fEl.innerHTML = '';
  };

  load();
})();
</script>
