<div class="rss-section">
  <h2>📰 Novedades</h2>
  <div id="rv-c"></div>
  <button id="rv-btn" class="view-all-button" style="display:none" onclick="rvOpen()">Ver todas →</button>
</div>

<div id="rv-ov">
  <div id="rv-inner">
    <div id="rv-hd">
      <span>📰 Novedades</span>
      <button onclick="rvClose()">✕</button>
    </div>
    <div id="rv-f"></div>
  </div>
</div>

<style>
.rss-section{
margin:20px 0;
padding:18px;
border-radius:24px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.035);
box-shadow:0 12px 32px rgba(0,0,0,.18);
}

.rss-section h2{
margin:0 0 14px;
font-size:1.35em;
font-weight:700;
letter-spacing:.3px;
text-align:center;
color:#fff;
}

#rv-c{
display:flex;
flex-direction:column;
gap:10px;
}

.rv-ci{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:18px;
text-decoration:none;
background:rgba(255,255,255,.028);
border:1px solid rgba(255,255,255,.055);
transition:.22s ease;
}

.rv-ci:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.055);
border-color:rgba(255,255,255,.12);
box-shadow:0 10px 20px rgba(0,0,0,.12);
}

.rv-ci-thumb{
width:56px;
height:56px;
aspect-ratio:1/1;
border-radius:16px;
object-fit:cover;
flex-shrink:0;
background:rgba(255,255,255,.06);
}

.rv-ci-thumb.rv-no{
display:flex;
align-items:center;
justify-content:center;
font-size:1.3em;
}

.rv-ci-info{
flex:1;
min-width:0;
}

.rv-ci-title{
font-size:.92em;
line-height:1.35;
color:#fff;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.rv-ci-meta{
margin-top:5px;
font-size:.73em;
color:rgba(255,255,255,.5);
}

.view-all-button{
margin-top:14px;
width:100%;
padding:13px;
border:none;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
color:#fff;
font-size:.95em;
cursor:pointer;
transition:.2s ease;
}

.view-all-button:hover{
background:rgba(255,255,255,.075);
transform:translateY(-1px);
}

#rv-ov{
display:none;
position:fixed;
inset:0;
z-index:50;
overflow-y:auto;
padding:20px;
background:rgba(10,10,18,.38);
backdrop-filter:blur(18px) saturate(160%);
-webkit-backdrop-filter:blur(18px) saturate(160%);
opacity:0;
pointer-events:none;
transition:opacity .22s ease;
}

#rv-ov.open{
display:block;
opacity:1;
pointer-events:auto;
}

#rv-inner{
max-width:820px;
margin:0 auto;
}

#rv-hd{
position:sticky;
top:0;
z-index:2;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
margin-bottom:14px;
border-radius:20px;
background:rgba(255,255,255,.055);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
box-shadow:0 8px 24px rgba(0,0,0,.14);
}

#rv-hd span{
font-size:1.15em;
font-weight:700;
color:#fff;
}

#rv-hd button{
width:38px;
height:38px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.06);
color:#fff;
font-size:1em;
cursor:pointer;
transition:.2s;
}

#rv-hd button:hover{
background:rgba(255,255,255,.12);
transform:scale(1.04);
}

#rv-f{
display:flex;
flex-direction:column;
gap:14px;
}

.rv-it{
overflow:hidden;
border-radius:22px;
background:rgba(255,255,255,.045);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 10px 28px rgba(0,0,0,.18);
}

.rv-it-meta{
padding:14px 16px 2px;
font-size:.74em;
color:rgba(255,255,255,.45);
}

.rv-it-title{
padding:2px 16px 12px;
font-size:1rem;
font-weight:700;
line-height:1.42;
}

.rv-it-title a{
color:#fff;
text-decoration:none;
}

.rv-it-title a:hover{
opacity:.86;
}

.rv-it-body img,
.rv-it-body video{
width:100%;
display:block;
}

.rv-it-body audio{
width:100%;
display:block;
padding:10px 14px;
box-sizing:border-box;
}

.rv-it-body p{
margin:0;
padding:8px 16px;
font-size:.92em;
line-height:1.6;
color:rgba(255,255,255,.88);
}

.rv-it-body div{
padding:4px 16px 10px;
font-size:.84em;
line-height:1.55;
color:rgba(255,255,255,.72);
}

.rv-it-body a{
color:#9fd3ff;
text-decoration:none;
}

.rv-it-body a:hover{
text-decoration:underline;
}

@media (max-width:700px){

.rss-section{
padding:15px;
border-radius:20px;
}

.rv-ci{
padding:11px;
border-radius:16px;
}

.rv-ci-thumb{
width:50px;
height:50px;
border-radius:14px;
}

#rv-ov{
padding:14px;
}

#rv-hd{
padding:12px 14px;
border-radius:18px;
}

.rv-it{
border-radius:18px;
}

.rv-it-title{
font-size:.96rem;
}
}
</style>

<script>
(function(){
  const RSS_PATH = 'telegram/channel/2003488356';
  const cEl = document.getElementById('rv-c');
  const fEl = document.getElementById('rv-f');
  const btn = document.getElementById('rv-btn');
  let items = [];

  function gT(el, tag){ return el.getElementsByTagName(tag)[0]?.textContent || ''; }
  function gH(el, tag){
    const n = el.getElementsByTagName(tag)[0];
    if (!n) return '';
    const c = n.firstChild;
    return (c && c.nodeType === 4) ? c.data : n.textContent;
  }

  function firstImg(html){
    const d = new DOMParser().parseFromString(html, 'text/html');
    return d.querySelector('img')?.src || null;
  }

  function mkCompact(item){
    const title = gT(item, 'title');
    const link  = gT(item, 'link');
    const desc  = gH(item, 'description');
    const date  = gT(item, 'pubDate');
    const d     = date ? new Date(date).toLocaleString('es-PY', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const img   = firstImg(desc);
    const a = document.createElement('a');
    a.className = 'rv-ci';
    a.href = link; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML = img
      ? `<img class="rv-ci-thumb" src="${img}" loading="lazy">`
      : `<div class="rv-ci-thumb rv-no">📌</div>`;
    a.innerHTML += `<div class="rv-ci-info"><div class="rv-ci-title">${title}</div><div class="rv-ci-meta">${d}</div></div>`;
    return a;
  }

  function mkFull(item){
    const title  = gT(item, 'title');
    const link   = gT(item, 'link');
    const desc   = gH(item, 'description');
    const date   = gT(item, 'pubDate');
    const author = gT(item, 'author');
    const d      = date ? new Date(date).toLocaleString('es-PY') : '';
    const div    = document.createElement('div');
    div.className = 'rv-it';
    div.innerHTML = `<div class="rv-it-meta">${[author, d].filter(Boolean).join(' · ')}</div>
      <div class="rv-it-title"><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></div>
      <div class="rv-it-body">${desc}</div>`;
    return div;
  }

  async function load(){
    try{
      const res = await fetch(`/api/rss?url=${encodeURIComponent(RSS_PATH)}`);
      if (!res.ok) return;
      const doc = new DOMParser().parseFromString(await res.text(), 'text/xml');
      if (doc.querySelector('parsererror')) return;
      items = [...doc.querySelectorAll('item')];
      if (!items.length) return;
      items.slice(0, 4).forEach(i => cEl.appendChild(mkCompact(i)));
      btn.style.display = '';
    } catch {}
  }

  window.rvOpen = function(){
    fEl.innerHTML = '';
    items.forEach(i => fEl.appendChild(mkFull(i)));
    document.getElementById('rv-ov').classList.add('open');
  };

  window.rvClose = function(){
    document.getElementById('rv-ov').classList.remove('open');
    fEl.innerHTML = '';
  };

  load();
})();
</script>
