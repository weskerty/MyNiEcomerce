<script>
(function(){
const RSS_PATH='telegram/channel/cheagana';
const RSS_URL='/api/rss?url='+encodeURIComponent(RSS_PATH);
const cEl=document.getElementById('rv-c');
const fEl=document.getElementById('rv-f');
const btn=document.getElementById('rv-btn');
const ovEl=document.getElementById('rv-ov');
const sentinel=document.getElementById('rv-sentinel');
let items=[],_populated=false,_chunkIdx=0;
const PREVIEW=4,CHUNK=8;

const LD=document.createElement('link');
LD.rel='alternate';LD.type='application/rss+xml';
LD.title='Actividades Paraguay';LD.href=RSS_URL;
document.head.appendChild(LD);

const SVG={
  wa:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.555 4.122 1.528 5.855L0 24l6.335-1.505A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.89 0-3.66-.498-5.194-1.37l-.372-.22-3.862.918.975-3.768-.242-.387A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>',
  tg:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>',
  ig:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>',
  fb:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
  dc:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>'
};

function lk(href,type,label){
  return`<a class="lk lk-${type}" href="${href}" target="_blank" rel="noopener noreferrer">${SVG[type]||''}${label}</a>`;
}

function gT(el,tag){return el.getElementsByTagName(tag)[0]?.textContent||'';}
function gH(el,tag){
  const n=el.getElementsByTagName(tag)[0];
  if(!n)return'';
  const c=n.firstChild;
  return(c&&c.nodeType===4)?c.data:n.textContent;
}
function fI(html){
  return new DOMParser().parseFromString(html,'text/html').querySelector('img')?.src||null;
}

function mkC(item){
  const title=gT(item,'title'),link=gT(item,'link'),
        desc=gH(item,'description'),date=gT(item,'pubDate'),
        d=date?new Date(date).toLocaleString('es-PY',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'',
        img=fI(desc),a=document.createElement('a');
  a.className='rv-ci';
  a.href=link;a.target='_blank';a.rel='noopener noreferrer';
  a.innerHTML=(img?`<img class="rv-ci-thumb" src="${img}" loading="lazy">`:`<div class="rv-ci-thumb rv-no">📌</div>`)
    +`<div class="rv-ci-info"><div class="rv-ci-title">${title}</div><div class="rv-ci-meta">${d}</div></div>`;
  return a;
}

function mkF(item){
  const title=gT(item,'title'),link=gT(item,'link'),
        desc=gH(item,'description'),date=gT(item,'pubDate'),
        author=gT(item,'author'),
        d=date?new Date(date).toLocaleString('es-PY'):'',
        div=document.createElement('div');
  div.className='rv-it';
  div.innerHTML=`<div class="rv-it-meta">${[author,d].filter(Boolean).join(' · ')}</div>
    <div class="rv-it-title"><a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a></div>
    <div class="rv-it-body">${desc}</div>`;
  return div;
}

function appendChunk(){
  if(_chunkIdx>=items.length)return;
  const end=Math.min(_chunkIdx+CHUNK,items.length);
  const frag=document.createDocumentFragment();
  for(let i=_chunkIdx;i<end;i++)frag.appendChild(mkF(items[i]));
  fEl.appendChild(frag);
  _chunkIdx=end;
}

let _io=null;
function setupIO(){
  if(_io)_io.disconnect();
  _io=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting)appendChunk();
  },{root:ovEl,rootMargin:'200px'});
  _io.observe(sentinel);
}

const OPFS_S=`(async()=>{
const R=await fetch('/api/rss?url=${encodeURIComponent(RSS_PATH)}',{cache:'no-store'});
if(!R.ok)return notify(null);
const x=await R.text();
const gM=x.match(/<item>[\\s\\S]*?<guid[^>]*>([^<]+)<\\/guid>/);
if(!gM)return notify(null);
const guid=gM[1];
const root=await self.navigator.storage.getDirectory();
const dir=await root.getDirectoryHandle('notify',{create:true});
let prev=null;
try{prev=await(await(await dir.getFileHandle('rss.state')).getFile()).text();}catch{}
const wh=await(await dir.getFileHandle('rss.state',{create:true})).createWritable();
await wh.write(guid);await wh.close();
if(prev===null||guid===prev)return notify(null);
const tM=x.match(/<item>[\\s\\S]*?<title>([^<]+)<\\/title>/);
const title=(tM?tM[1]:'Nueva actividad').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
const iM=x.match(/poster=&quot;(https:\\/\\/[^&]+)&quot;/)||x.match(/src=&quot;(https:\\/\\/[^&\\s]+)&quot;/);
const lM=x.match(/<item>[\\s\\S]*?<link>([^<]+)<\\/link>/);
notify({title:'Nueva actividad \\uD83D\\uDCC5',body:title,...(iM?{image:iM[1]}:{}),tag:'rss-'+guid,url:lM?lM[1]:'${location.origin}'});
})();`;

async function wOPFS(){
  try{
    const root=await navigator.storage.getDirectory();
    const dir=await root.getDirectoryHandle('notify',{create:true});
    const fh=await dir.getFileHandle('rss.js',{create:true});
    const wt=await fh.createWritable();
    await wt.write(OPFS_S);
    await wt.close();
  }catch{}
}

async function load(){
  try{
    const sk=document.createDocumentFragment();
    for(let i=0;i<PREVIEW;i++){const d=document.createElement('div');d.className='rv-skeleton';sk.appendChild(d);}
    cEl.appendChild(sk);
    const res=await fetch(RSS_URL);
    cEl.innerHTML='';
    if(!res.ok)return;
    const doc=new DOMParser().parseFromString(await res.text(),'text/xml');
    if(doc.querySelector('parseerror'))return;
    items=[...doc.querySelectorAll('item')];
    if(!items.length)return;
    const frag=document.createDocumentFragment();
    items.slice(0,PREVIEW).forEach(i=>frag.appendChild(mkC(i)));
    cEl.appendChild(frag);
    btn.style.display='';
  }catch{cEl.innerHTML='';}
}

window.rvOpen=function(){
  if(!_populated){
    _populated=true;
    _chunkIdx=0;
    fEl.innerHTML='';
    appendChunk();
    setupIO();
  }
  ovEl.classList.add('open');
  document.body.style.overflow='hidden';
};
window.rvClose=function(){
  ovEl.classList.remove('open');
  document.body.style.overflow='';
};

document.addEventListener('contentUnload',function(){
  ovEl.classList.remove('open');
  document.body.style.overflow='';
  if(_io){_io.disconnect();_io=null;}
  LD.remove();
  delete window.rvOpen;
  delete window.rvClose;
},{once:true});

load();
wOPFS();
})();
</script>
