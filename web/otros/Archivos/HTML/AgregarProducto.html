<style>
:root{
--g1:rgba(255,255,255,0.06);
--g2:rgba(255,255,255,0.10);
--gb:rgba(255,255,255,0.13);
--gbb:rgba(255,255,255,0.18);
--acc:#4f8ef7;
--acc2:#a78bfa;
--ok:#34d399;
--err:#f87171;
--warn:#fbbf24;
--txt:rgba(255,255,255,0.92);
--txt2:rgba(255,255,255,0.45);
--r:16px;
--ri:12px;
}
#ap-wrap{color:var(--txt);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;padding:0 0 90px;-webkit-font-smoothing:antialiased}
#ap-wrap *{box-sizing:border-box}
.ap-top{padding:22px 18px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--gb)}
.ap-top h1{margin:0;font-size:19px;font-weight:700;letter-spacing:-.3px}
.ap-top span{font-size:12px;color:var(--txt2);margin-top:2px;display:block}
.ap-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:0 4px 14px rgba(79,142,247,.28)}
.ap-sect{max-width:600px;margin:0 auto;padding:18px 14px 0}
.ap-card{background:var(--g1);border:1px solid var(--gb);border-radius:var(--r);padding:18px;margin-bottom:14px;backdrop-filter:none}
.ap-card h2{margin:0 0 14px;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:5px;letter-spacing:.03em}
.fg input,.fg select,.fg textarea{
width:100%;
background:var(--g1);
border:1px solid var(--gb);
border-radius:var(--ri);
color:var(--txt);
padding:10px 13px;
font-size:15px;
outline:none;
transition:border .15s,background .15s;
-webkit-appearance:none;
font-family:inherit;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(79,142,247,.6);background:var(--g2)}
.fg select option{background:#1a1a2e;color:#fff}
.ap-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ap-btn{
display:inline-flex;align-items:center;justify-content:center;gap:7px;
padding:12px 20px;border:none;border-radius:var(--ri);
font-size:15px;font-weight:600;cursor:pointer;
transition:opacity .15s,transform .1s,box-shadow .15s;
width:100%;font-family:inherit;letter-spacing:-.1px;
}
.ap-btn:active{transform:scale(.97)}
.ap-btn.pri{
background:linear-gradient(135deg,var(--acc),var(--acc2));
color:#fff;
box-shadow:0 4px 18px rgba(79,142,247,.3);
}
.ap-btn.pri:hover{box-shadow:0 6px 22px rgba(79,142,247,.45)}
.ap-btn.sec{
background:transparent;
color:var(--txt);
border:1px solid var(--gbb);
}
.ap-btn.sec:hover{background:var(--g2)}
.ap-btn:disabled{opacity:.4;cursor:not-allowed}
.ap-msg{
position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
background:rgba(20,20,35,0.85);
border:1px solid var(--gb);
border-radius:50px;padding:10px 22px;
font-size:13px;font-weight:500;color:var(--txt);
z-index:9999;pointer-events:none;white-space:nowrap;
max-width:88vw;text-overflow:ellipsis;overflow:hidden;
backdrop-filter:saturate(1.4);
box-shadow:0 8px 32px rgba(0,0,0,.35);
}
.ap-msg.ok{border-color:rgba(52,211,153,.4);color:var(--ok)}
.ap-msg.err{border-color:rgba(248,113,113,.4);color:var(--err)}
.ap-msg.warn{border-color:rgba(251,191,36,.4);color:var(--warn)}
.ap-tabs{
display:flex;gap:2px;
background:var(--g1);
border:1px solid var(--gb);
border-radius:50px;padding:3px;margin-bottom:18px;
}
.ap-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.ap-tab.act{background:var(--g2);color:var(--txt);border:1px solid var(--gb)}

.ap-img-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.ap-img-thumb{
width:72px;height:72px;flex-shrink:0;
border-radius:var(--ri);
border:1.5px dashed var(--gb);
overflow:hidden;cursor:pointer;
background:var(--g1);
display:flex;align-items:center;justify-content:center;
font-size:24px;transition:border-color .15s,background .15s;
position:relative;
}
.ap-img-thumb:hover{border-color:var(--acc);background:var(--g2)}
.ap-img-thumb img{width:100%;height:100%;object-fit:cover;display:none;border-radius:calc(var(--ri) - 2px)}
.ap-img-fields{flex:1;display:flex;flex-direction:column;gap:8px}
.ap-img-fields .fg{margin:0}
.ap-img-size{font-size:11px;color:var(--txt2);padding:0 2px}

.ap-sol-item{
background:var(--g1);border:1px solid var(--gb);
border-radius:var(--ri);padding:13px;margin-bottom:10px;
display:flex;gap:11px;align-items:flex-start;
}
.ap-sol-img{width:52px;height:52px;object-fit:cover;border-radius:9px;flex-shrink:0;background:rgba(255,255,255,.05)}
.ap-sol-info{flex:1;min-width:0}
.ap-sol-info .nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ap-sol-info .dt{font-size:11px;color:var(--txt2);margin-top:3px}
.ap-sol-neg{
background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
border-radius:8px;padding:7px 10px;font-size:12px;color:#fca5a5;margin-top:6px
}
.ap-sol-acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ap-sol-acts button{
padding:5px 12px;border-radius:50px;
border:1px solid var(--gb);background:var(--g1);
color:var(--txt);font-size:12px;cursor:pointer;
font-family:inherit;transition:background .15s;
}
.ap-sol-acts button:hover{background:var(--g2)}
.ap-sol-acts button.del{border-color:rgba(248,113,113,.3);color:#fca5a5}
.ap-badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.04em}
.ap-badge.pend{background:rgba(79,142,247,.15);color:#93c5fd;border:1px solid rgba(79,142,247,.25)}
.ap-badge.neg{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.ap-auth-note{font-size:12px;color:var(--txt2);text-align:center;margin-top:10px}
.ap-auth-note a{color:var(--acc);cursor:pointer}

#ap-mde .EasyMDEContainer{background:transparent!important;border-radius:var(--ri);overflow:hidden}
#ap-mde .CodeMirror{background:var(--g1)!important;color:var(--txt)!important;min-height:180px;border-radius:0 0 var(--ri) var(--ri)!important;border:1px solid var(--gb)!important;border-top:none!important}
#ap-mde .editor-toolbar{background:var(--g1)!important;border:1px solid var(--gb)!important;border-bottom:1px solid var(--gb)!important;border-radius:var(--ri) var(--ri) 0 0!important}
#ap-mde .editor-toolbar button{color:var(--txt2)!important}
#ap-mde .editor-toolbar button:hover,#ap-mde .editor-toolbar button.active{background:var(--g2)!important;border-color:var(--gb)!important}
#ap-mde .editor-toolbar i.separator{border-color:var(--gb)!important}
</style>

<script>
(function(){
const AP_URL=(()=>{
  const base=document.querySelector('meta[name=api-base]')?.content||'';
  return base||'/api/productos';
})();
const AP_MAX_SIZE=200*1024;

function AP_ck(k){const m=document.cookie.match(new RegExp('(?:^|; )'+k+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
function AP_sck(k,v){const sec=location.protocol==="https:"?";Secure":"";document.cookie=`${k}=${encodeURIComponent(v)};path=/;max-age=31536000;SameSite=Strict${sec}`;}
function AP_dck(k){document.cookie=`${k}=;path=/;max-age=0`;}

let _AP_usr=AP_ck("ap_u"),_AP_pwd=AP_ck("ap_p"),_AP_cats={},_AP_mde=null,_AP_entries=[];
let _AP_msg=null;

function AP_toast(t,tp='ok',d=3000){
  if(_AP_msg)_AP_msg.remove();
  _AP_msg=document.createElement('div');
  _AP_msg.className='ap-msg '+tp;
  _AP_msg.textContent=t;
  document.body.appendChild(_AP_msg);
  setTimeout(()=>{if(_AP_msg){_AP_msg.remove();_AP_msg=null;}},d);
}

function AP_FP(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}

async function AP_fetch(action,opts={}){
  const isGet=!opts.method||opts.method==="GET";
  const url=isGet?`${AP_URL}?action=${action}`:AP_URL;
  if(!isGet&&opts.body){const _b=JSON.parse(opts.body);_b.action=action;opts.body=JSON.stringify(_b);}
  const res=await fetch(url,{headers:{"Content-Type":"application/json"},...opts});
  const data=await res.json().catch(()=>({}));
  return{ok:res.ok,status:res.status,data};
}

window.AP_showTab=function(t){
  document.getElementById('ap-login-box').style.display=t==='login'?'block':'none';
  document.getElementById('ap-reg-box').style.display=t==='reg'?'block':'none';
  document.getElementById('ap-tlogin').classList.toggle('act',t==='login');
  document.getElementById('ap-treg').classList.toggle('act',t==='reg');
};

window.AP_mainTab=function(t){
  document.getElementById('ap-tab-nuevo').style.display=t==='nuevo'?'block':'none';
  document.getElementById('ap-tab-mis').style.display=t==='mis'?'block':'none';
  document.getElementById('ap-tnuevo').classList.toggle('act',t==='nuevo');
  document.getElementById('ap-tmis').classList.toggle('act',t==='mis');
  if(t==='mis')AP_loadSolicitudes();
};

async function AP_loadCats(){
  const{ok,data}=await AP_fetch('cats');
  if(!ok)return;
  _AP_cats=data;
  const sel=document.getElementById('ap-cat');
  sel.innerHTML='';
  Object.keys(data).sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  AP_updSub();
}

window.AP_updSub=function(){
  const c=document.getElementById('ap-cat').value;
  const sel=document.getElementById('ap-sub');
  sel.innerHTML='<option value="">General</option>';
  (_AP_cats[c]||[]).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
};

function AP_initMDE(){
  if(_AP_mde){_AP_mde.toTextArea();_AP_mde=null;}
  _AP_mde=new EasyMDE({
    element:document.getElementById('ap-mdtxt'),
    spellChecker:false,autofocus:false,status:false,
    initialValue:'',
    toolbar:['bold','italic','heading','|','quote','unordered-list','ordered-list','|','link','|','preview','guide']
  });
}

function AP_showMain(){
  document.getElementById('ap-auth').style.display='none';
  document.getElementById('ap-main').style.display='block';
  AP_loadCats();
  AP_loadSolicitudes();
  setTimeout(AP_initMDE,100);
}

window.AP_login=async function(){
  const u=document.getElementById('ap-lu').value.trim();
  const p=document.getElementById('ap-lp').value;
  if(!u||!p)return AP_toast('Completa los campos','warn');
  const{ok,data}=await AP_fetch('login',{method:'POST',body:JSON.stringify({usuario:u,password:p})});
  if(!ok)return AP_toast(data.error||'Error','err');
  _AP_usr=u;_AP_pwd=p;
  AP_sck('ap_u',u);AP_sck('ap_p',p);
  AP_toast('Bienvenido '+u);
  AP_showMain();
};

window.AP_registro=async function(){
  const u=document.getElementById('ap-ru').value.trim();
  const p=document.getElementById('ap-rp').value;
  const p2=document.getElementById('ap-rp2').value;
  if(!u||!p)return AP_toast('Completa los campos','warn');
  if(p!==p2)return AP_toast('Las contrasenas no coinciden','warn');
  const{ok,data}=await AP_fetch('registro',{method:'POST',body:JSON.stringify({usuario:u,password:p})});
  if(!ok)return AP_toast(data.error||'Error','err');
  AP_toast('Cuenta creada! Iniciando sesion...');
  document.getElementById('ap-lu').value=u;
  document.getElementById('ap-lp').value=p;
  await AP_login();
};

async function AP_processImg(file){
  const isAnimatable=file.type==='image/avif'||file.type==='image/webp';
  if(isAnimatable&&file.size<=AP_MAX_SIZE){
    const ext=file.type==='image/avif'?'.avif':'.webp';
    return{blob:file,ext,size:file.size};
  }
  if(isAnimatable&&file.size>AP_MAX_SIZE){
    const ok=confirm(`Supera ${AP_MAX_SIZE/1024}KB, se comprimira y perdera la animacion. Continuar?`);
    if(!ok)return{error:'Cancelado'};
  }
  const url=URL.createObjectURL(file);
  const img=new Image();
  await new Promise(r=>{img.onload=r;img.src=url;});
  URL.revokeObjectURL(url);
  const cv=document.createElement('canvas');
  cv.width=256;cv.height=256;
  cv.getContext('2d').drawImage(img,0,0,256,256);
  let q=0.85,blob=null,tries=0;
  do{blob=await new Promise(r=>cv.toBlob(r,'image/webp',q));q=Math.max(0.05,q-0.1);tries++;}
  while(blob&&blob.size>AP_MAX_SIZE&&tries<12);
  return{blob,ext:'.webp',size:blob.size};
}

function AP_setThumb(blob){
  const thumb=document.getElementById('ap-imgprev');
  const icon=document.getElementById('ap-img-icon');
  thumb.src=URL.createObjectURL(blob);
  thumb.style.display='block';
  icon.style.display='none';
}

document.getElementById('ap-img').onchange=async function(e){
  const f=e.target.files[0];if(!f)return;
  const result=await AP_processImg(f);
  if(result.error)return AP_toast(result.error,'err');
  AP_setThumb(result.blob);
  document.getElementById('ap-imgnm').textContent=`${(result.size/1024).toFixed(0)} KB`;
  document.getElementById('ap-img')._blob=result.blob;
  document.getElementById('ap-img')._ext=result.ext;
};

document.addEventListener('paste',async function(e){
  const active=document.activeElement;
  const isText=active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.isContentEditable);
  if(isText)return;
  const items=[...(e.clipboardData?.items||[])];
  const imgItem=items.find(i=>i.type.startsWith('image/'));
  if(!imgItem)return;
  e.preventDefault();
  const f=imgItem.getAsFile();if(!f)return;
  const result=await AP_processImg(f);
  if(result.error)return AP_toast(result.error,'err');
  AP_setThumb(result.blob);
  document.getElementById('ap-imgnm').textContent=`${(result.size/1024).toFixed(0)} KB`;
  document.getElementById('ap-img')._blob=result.blob;
  document.getElementById('ap-img')._ext=result.ext;
  AP_toast('Imagen pegada','ok');
});

async function AP_blobToB64(blob){
  return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
}

document.getElementById('ap-pc').oninput=function(){
  let v=this.value.replace(/\D/g,'').slice(0,10);
  if(v)this.value=AP_FP(parseInt(v));
};
document.getElementById('ap-tm').oninput=function(){
  let v=this.value.replace(/\D/g,''),r='',ii=0;
  const seg=[2,2,4,2,2];
  for(let s=0;s<seg.length&&ii<v.length;s++){r+=v.slice(ii,ii+seg[s]);ii+=seg[s];if(ii<v.length)r+='.';}
  this.value=r;
};
document.getElementById('ap-nu').oninput=function(){
  this.value=this.value.replace(/\D/g,'').slice(0,20);
};
document.getElementById('ap-cd').oninput=function(){
  this.value=this.value.replace(/\D/g,'').slice(0,4);
};

window.AP_enviar=async function(){
  const cat=document.getElementById('ap-cat').value;
  const sub=document.getElementById('ap-sub').value;
  const nm=document.getElementById('ap-nm').value;
  const nu=document.getElementById('ap-nu').value.trim();
  const id=document.getElementById('ap-id').value.trim();
  const nb=document.getElementById('ap-nb').value.trim();
  const pcRaw=document.getElementById('ap-pc').value.replace(/\D/g,'');
  const cd=document.getElementById('ap-cd').value;
  const tm=document.getElementById('ap-tm').value.trim();
  const imgEl=document.getElementById('ap-img');
  const imgBlob=imgEl._blob;
  const imgExt=imgEl._ext||'.webp';
  if(!cat||!id||!nb||!pcRaw)return AP_toast('Faltan datos obligatorios','warn');
  if(nu.length<12)return AP_toast('Numero invalido (min 12 digitos)','warn');
  if(!imgBlob)return AP_toast('Imagen requerida','warn');
  const md=_AP_mde?_AP_mde.value():'';
  const idEl=document.getElementById('ap-id');
  const body={usuario:_AP_usr,password:_AP_pwd,categoria:cat,subcategoria:sub,NM:nm+(nu||''),ID:id,NB:nb,PC:parseInt(pcRaw),CD:cd!==''?parseInt(cd):null,TM:tm||null,md,imgData:await AP_blobToB64(imgBlob),imgExt};
  if(idEl._idOriginal)body.idOriginal=idEl._idOriginal;
  const btn=document.getElementById('ap-submit');
  btn.disabled=true;btn.textContent='Enviando...';
  const{ok,data}=await AP_fetch('enviar',{method:'POST',body:JSON.stringify(body)});
  btn.disabled=false;btn.textContent='📤 Enviar Solicitud';
  if(!ok)return AP_toast(data.error||'Error al enviar','err');
  const{ok:_ok2,data:_d2}=await AP_fetch('historial',{method:'POST',body:JSON.stringify({usuario:_AP_usr,password:_AP_pwd})});
  if(_ok2)_AP_entries=(_d2.entries||[]).slice().reverse();
  AP_toast('Solicitud enviada!');
  AP_resetForm();
  AP_mainTab('mis');
};

function AP_resetForm(){
  ['ap-id','ap-nb','ap-pc','ap-cd','ap-tm','ap-nu'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('ap-imgnm').textContent='';
  const prev=document.getElementById('ap-imgprev');
  prev.style.display='none';prev.src='';
  document.getElementById('ap-img-icon').style.display='';
  document.getElementById('ap-img')._blob=null;
  document.getElementById('ap-img')._ext=null;
  if(_AP_mde){_AP_mde.toTextArea();_AP_mde=null;setTimeout(AP_initMDE,50);}
  document.getElementById('ap-id').disabled=false;
  document.getElementById('ap-id')._idOriginal=null;
  document.getElementById('ap-submit').textContent='📤 Enviar Solicitud';
}

async function AP_loadImgs(container){
  const imgs=container.querySelectorAll('img[data-id]');
  await Promise.all([...imgs].map(async img=>{
    try{
      const res=await fetch(AP_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'img',usuario:_AP_usr,password:_AP_pwd,ID:img.dataset.id})});
      if(!res.ok)return;
      const blob=await res.blob();
      img.src=URL.createObjectURL(blob);
    }catch{}
  }));
}

function AP_TS(t){return new Date(t).toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'2-digit'});}

window.AP_loadSolicitudes=async function(noFetch){
  const lst=document.getElementById('ap-sol-list');
  if(!noFetch){
    lst.innerHTML='<div style="text-align:center;color:var(--txt2);padding:40px">Cargando...</div>';
    const{ok,data}=await AP_fetch('historial',{method:'POST',body:JSON.stringify({usuario:_AP_usr,password:_AP_pwd})});
    if(!ok){lst.innerHTML=`<div style="color:var(--err);padding:20px">${data.error||'Error'}</div>`;return;}
    _AP_entries=(data.entries||[]).slice().reverse();
  }
  if(!_AP_entries.length){lst.innerHTML='<div style="text-align:center;color:var(--txt2);padding:40px">Sin historial aun</div>';return;}
  lst.innerHTML='';
  const badges={
    pendiente:'<span class="ap-badge pend">Pendiente</span>',
    negado:'<span class="ap-badge neg">Rechazado</span>',
    aprobado:'<span class="ap-badge" style="background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)">Aprobado</span>',
    solicitaBorrado:'<span class="ap-badge" style="background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)">Borrado Pendiente</span>'
  };
  _AP_entries.forEach(e=>{
    const div=document.createElement('div');div.className='ap-sol-item';
    const eJson=encodeURIComponent(JSON.stringify(e));
    div.innerHTML=`<img class="ap-sol-img" alt="" onerror="this.style.display='none'" style="${e.estado!=='pendiente'?'display:none':''}" data-id="${e.ID}">
    <div class="ap-sol-info">
      <div class="nm">${e.NB} ${badges[e.estado]||''}</div>
      <div class="dt">ID: ${e.ID} &middot; ${e.categoria}${e.subcategoria?'/'+e.subcategoria:''} &middot; ${AP_TS(e.tsUpdate)}</div>
      ${e.estado==='negado'&&e.motivo?`<div class="ap-sol-neg">&#10060; ${e.motivo}</div>`:''}
      <div class="ap-sol-acts">
        ${e.estado!=='solicitaBorrado'?`<button data-e="${eJson}" onclick="AP_reenviarSol(this)">&#128260; ${e.estado==='aprobado'?'Editar':'Reenviar'}</button>`:''}
        ${e.estado==='solicitaBorrado'?`<button onclick="AP_cancelarBorrado('${e.ID}')">&#10006; Cancelar Borrado</button>`:`<button class="del" onclick="AP_borrarSol('${e.ID}')">&#128465; ${e.estado==='aprobado'?'Solicitar Borrado':'Borrar'}</button>`}
      </div>
    </div>`;
    lst.appendChild(div);
  });
  AP_loadImgs(lst);
};

window.AP_borrarSol=async function(ID){
  const e=_AP_entries.find(en=>en.ID===ID);
  const esAprobado=e&&e.estado==='aprobado';
  if(!confirm(esAprobado?'Solicitar borrado al administrador?':'Borrar esta entrada?'))return;
  const{ok,data}=await AP_fetch('borrar',{method:'POST',body:JSON.stringify({usuario:_AP_usr,password:_AP_pwd,ID})});
  if(!ok)return AP_toast(data.error||'Error','err');
  if(data.entry){
    const idx=_AP_entries.findIndex(en=>en.ID===ID);
    if(idx>=0)_AP_entries[idx]=data.entry;
    AP_toast('Solicitud de borrado enviada','warn');
  }else{
    _AP_entries=_AP_entries.filter(en=>en.ID!==ID);
    AP_toast('Entrada borrada');
  }
  AP_loadSolicitudes(true);
};

window.AP_cancelarBorrado=async function(ID){
  if(!confirm('Cancelar la solicitud de borrado?'))return;
  const{ok,data}=await AP_fetch('cancelarBorrado',{method:'POST',body:JSON.stringify({usuario:_AP_usr,password:_AP_pwd,ID})});
  if(!ok)return AP_toast(data.error||'Error','err');
  const idx=_AP_entries.findIndex(e=>e.ID===ID);
  if(idx>=0)_AP_entries[idx]=data.entry;
  AP_toast('Borrado cancelado');AP_loadSolicitudes(true);
};

window.AP_reenviarSol=function(btn){
  const e=JSON.parse(decodeURIComponent(btn.dataset.e));
  AP_mainTab('nuevo');
  const nmParts=(e.NM||'').match(/^(WATG|WA|TG)(.*)$/);
  document.getElementById('ap-nm').value=nmParts?nmParts[1]:'WATG';
  document.getElementById('ap-nu').value=nmParts?nmParts[2]:'';
  document.getElementById('ap-id').value=e.ID||'';
  document.getElementById('ap-id').disabled=!!e.aprobadoAlgezVez;
  document.getElementById('ap-id')._idOriginal=e.aprobadoAlgezVez?(e.ID||''):null;
  document.getElementById('ap-nb').value=e.NB||'';
  document.getElementById('ap-pc').value=AP_FP(e.PC||0);
  document.getElementById('ap-cd').value=e.CD!=null?e.CD:'';
  document.getElementById('ap-tm').value=e.TM||'';
  document.getElementById('ap-cat').value=e.categoria||'';
  AP_updSub();
  setTimeout(()=>{document.getElementById('ap-sub').value=e.subcategoria||'';},50);
  if(_AP_mde){
    const cm=_AP_mde.codemirror;
    cm.execCommand('selectAll');
    _AP_mde.value(e.md||'');
  }
  document.getElementById('ap-submit').textContent='&#128260; Reenviar Solicitud';
  AP_toast('Completa la imagen para reenviar','warn',5000);
};

if(_AP_usr&&_AP_pwd){
  AP_fetch('login',{method:'POST',body:JSON.stringify({usuario:_AP_usr,password:_AP_pwd})})
    .then(({ok})=>{if(ok)AP_showMain();else{AP_dck('ap_u');AP_dck('ap_p');_AP_usr=null;_AP_pwd=null;}});
}
})();
</script>
