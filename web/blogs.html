<style>
#bl-wrap *{box-sizing:border-box}
.bl-nb{position:absolute;top:0;font-size:1.8rem;text-decoration:none;z-index:10}
.bl-nb-l{left:0}
.bl-nb-r{right:0}
.bl-head{margin-bottom:clamp(16px,3vw,32px)}
.bl-head h1{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;color:rgba(255,255,255,.95);letter-spacing:-.02em;text-shadow:0 2px 20px rgba(0,0,0,.3);line-height:1.1;border-bottom:2px solid #1a73e8;padding-bottom:.5rem;display:inline-block;font-family:var(--font-h)}
.bl-head p{font-size:.8rem;color:rgba(255,255,255,.5);margin-top:5px;font-weight:300;letter-spacing:.06em;text-transform:uppercase}
.bl-grid{column-width:300px;column-gap:16px}
.bl-card{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;text-decoration:none;display:block;min-height:200px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 24px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.15);transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s ease;break-inside:avoid;margin-bottom:16px}
.bl-card::after{content:'';position:absolute;inset:0;z-index:3;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.12),transparent 60%);transform:translateX(-120%);transition:.6s;pointer-events:none}
.bl-card:hover::after{transform:translateX(120%)}
.bl-card:hover{will-change:transform;transform:translateY(-5px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);text-decoration:none}
.bl-card:active{transform:scale(.98)}
.bl-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s cubic-bezier(.2,.8,.2,1),filter .3s ease;filter:brightness(.5) saturate(1.2)}
.bl-card:hover .bl-bg{transform:scale(1.05);filter:brightness(.4) saturate(1.4)}
.bl-bg-none{background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02))}
.bl-gloss{position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;border-radius:20px 20px 0 0}
.bl-body{position:relative;z-index:2;padding:20px 18px 18px;display:flex;flex-direction:column;justify-content:flex-end;min-height:200px}
.bl-cat{font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.bl-cat::before{content:'';display:inline-block;width:14px;height:1px;background:rgba(255,255,255,.35)}
.bl-title{font-family:var(--font-h);font-size:clamp(1rem,2.5vw,1.3rem);font-weight:700;color:rgba(255,255,255,.95);line-height:1.25;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.bl-empty{text-align:center;padding:50px 20px;color:rgba(255,255,255,.4)}
.bl-empty span{display:block;font-size:2rem;margin-bottom:10px}
.bl-dots{display:flex;align-items:center;justify-content:center;gap:7px;padding:50px}
.bl-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);animation:blP .8s ease-in-out infinite}
.bl-dot:nth-child(2){animation-delay:.15s}
.bl-dot:nth-child(3){animation-delay:.3s}
@keyframes blP{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.BN_BR{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
#nt-btn,#BN_RB{padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-size:.78rem;letter-spacing:.05em;cursor:pointer;transition:background .2s,transform .15s;line-height:1.2}
#nt-btn{display:none}
#nt-btn:hover,#BN_RB:hover{background:rgba(255,255,255,.16);transform:translateY(-1px)}
#nt-btn:disabled{opacity:.5;cursor:default;transform:none}
#BN_RB{display:inline-flex;align-items:center;text-decoration:none;border-color:rgba(255,140,0,.35);background:rgba(255,140,0,.08);color:#ffaa33}
#BN_RB:hover{background:rgba(255,140,0,.18)}
.bl-pg{display:flex;justify-content:center;gap:12px;margin-top:16px}
.bl-pg button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:white;padding:6px 18px;cursor:pointer;font-size:.85em;transition:background .2s}
.bl-pg button:hover{background:rgba(255,255,255,.22)}
.bl-pg button:disabled{opacity:.3;cursor:default}
@keyframes bl-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.bl-anim{animation:bl-in .25s ease both}
.BN_BG{position:relative;height:170px;background-size:cover;background-position:center;filter:saturate(1.15);transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.bl-card:hover .BN_BG{transform:scale(1.03)}
.BN_BGN{height:auto;background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02))}
.BN_GL{position:absolute;left:0;right:0;bottom:0;height:60%;background:linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 100%);pointer-events:none}
.BN_BGN .BN_GL{display:none}
.BN_TT{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:12px 18px}
.BN_TT .bl-title{font-size:clamp(.95rem,2.3vw,1.15rem)}
.BN_BGN .BN_TT{position:static;padding:14px 18px 4px}
.BN_DS{padding:10px 18px 18px;font-size:.85rem;line-height:1.55;color:rgba(255,255,255,.75)}
@media(max-width:480px){.bl-grid{column-width:100%}}
@media(prefers-reduced-motion:reduce){.bl-card:hover{transform:none}.bl-card:hover .bl-bg,.bl-card:hover .BN_BG{transform:none}.bl-card::after{display:none}}
</style>

<div style="text-align:center">
<div id="bl-wrap">
<div class="bl-head">
<h2>BLOG</h2>
<div class="BN_BR">
<button id="nt-btn"></button>
<a id="BN_RB" href="/api/rss?url=telegram%2Fchannel%2Fparaguayley" target="_blank" rel="noopener noreferrer">📡 RSS</a>
</div>
<div class="section">
  <div class="gallery-container">
    <div id="BPinned-gallery" class="contenedor-imagenes-animado"></div>
  </div>
</div>
</div>
<div class="bl-dots" id="bl-ld"><div class="bl-dot"></div><div class="bl-dot"></div><div class="bl-dot"></div></div>
<div class="bl-grid" id="bl-gr" style="display:none"></div>
</div>
</div>

<script>
(function(){
const DJ='web/Dinamico/data.json';
const RP='telegram/channel/paraguayley';
const RU='/api/rss?url='+encodeURIComponent(RP);
const PAGE=30;
let curList=[],curPg=0,imgIO=null,fetchAC=null,rssAC=null;

function fN(p){return p.split('/').pop().replace(/\.[^.]+$/,'')}
function mL(p){return p.replace(/\.[^.]+$/,'.md')}
function nN(n){const m=n.match(/NB=([^.]+)/);return m?m[1].trim():n.replace(/-/g,' ')}

function parseBlogs(galleries){
  const bl=galleries.Blogs;
  if(!bl)return[];
  const out=[],sub=typeof bl==='object'&&!Array.isArray(bl)?bl:{_r:Array.isArray(bl)?bl:[]};
  Object.keys(sub).forEach(k=>{
    const arr=sub[k];if(!Array.isArray(arr))return;
    arr.forEach(p=>{if(typeof p==='string')out.push({t:'b',img:p,md:mL(p),name:nN(fN(p)),cat:k==='_r'?'BLOG':k});});
  });
  return out;
}

function BN_GT(el,tag){return el.getElementsByTagName(tag)[0]?.textContent||'';}
function BN_GH(el,tag){
  const n=el.getElementsByTagName(tag)[0];
  if(!n)return'';
  const c=n.firstChild;
  return(c&&c.nodeType===4)?c.data:n.textContent;
}
function BN_FI(html){return new DOMParser().parseFromString(html,'text/html').querySelector('img')?.src||null;}
function BN_FD(html){
  const d=new DOMParser().parseFromString(html,'text/html');
  d.querySelectorAll('img,video,audio').forEach(t=>t.remove());
  return(d.body.textContent||'').trim();
}

async function BN_FR(){
  if(rssAC)rssAC.abort();
  rssAC=new AbortController();
  try{
    const res=await fetch(RU,{signal:rssAC.signal});
    if(!res.ok)return[];
    const doc=new DOMParser().parseFromString(await res.text(),'text/xml');
    if(doc.querySelector('parseerror'))return[];
    return[...doc.querySelectorAll('item')].map(it=>{
      const desc=BN_GH(it,'description');
      return{t:'n',link:BN_GT(it,'link'),name:BN_GT(it,'title'),img:BN_FI(desc),desc:BN_FD(desc)};
    });
  }catch(e){return[];}
}

async function fetchData(){
  let g=window.__DJ?.[DJ]||null;
  if(!g){
    if(fetchAC)fetchAC.abort();
    fetchAC=new AbortController();
    try{
      const res=await fetch(DJ,{signal:fetchAC.signal});
      const d=await res.json();
      g=d.galleries;
      (window.__DJ=window.__DJ||{})[DJ]=g;
      fetchAC=null;
    }catch(e){
      if(e.name==='AbortError')return null;
      return null;
    }
  }
  return g;
}

function BN_MIX(bl,nw){
  const out=[];let i=0,j=0;
  while(i<bl.length||j<nw.length){
    if(i<bl.length)out.push(bl[i++]);
    if(j<nw.length)out.push(nw[j++]);
  }
  return out;
}

function mkCard(item){
  const a=document.createElement('a');
  a.className='bl-card';
  if(item.t==='n'){
    a.href=item.link;a.target='_blank';a.rel='noopener noreferrer';
    const bg=document.createElement('div');
    bg.className='BN_BG'+(item.img?'':' BN_BGN');
    if(item.img)bg.dataset.bg=item.img;
    const gl=document.createElement('div');gl.className='BN_GL';
    const tt=document.createElement('div');tt.className='BN_TT';
    tt.innerHTML='<div class="bl-cat">NOTICIA</div><div class="bl-title">'+item.name+'</div>';
    bg.append(gl,tt);
    const ds=document.createElement('div');ds.className='BN_DS';ds.textContent=item.desc;
    a.append(bg,ds);
  }else{
    a.href=item.md;
    const bg=document.createElement('div');
    bg.className='bl-bg'+(item.img?'':' bl-bg-none');
    if(item.img)bg.dataset.bg=item.img;
    const gl=document.createElement('div');gl.className='bl-gloss';
    const bd=document.createElement('div');bd.className='bl-body';
    bd.innerHTML='<div class="bl-cat">'+item.cat+'</div><div class="bl-title">'+item.name+'</div>';
    a.append(bg,gl,bd);
  }
  return a;
}

function setupImgIO(){
  if(imgIO)imgIO.disconnect();
  imgIO=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const bg=e.target,url=bg.dataset.bg;
      if(url){bg.style.backgroundImage='url('+encodeURI(url)+')';delete bg.dataset.bg;}
      imgIO.unobserve(bg);
    });
  },{rootMargin:'100px'});
}

function renderPage(gr,list,p,animate){
  gr.innerHTML='';
  if(!list.length){
    gr.innerHTML='<div class="bl-empty"><span>📭</span>Sin articulos por ahora</div>';
    return;
  }
  const maxPg=Math.ceil(list.length/PAGE)-1;
  const s=p*PAGE,slice=list.slice(s,s+PAGE);
  setupImgIO();
  slice.forEach(item=>{
    const card=mkCard(item);
    gr.appendChild(card);
    const bg=card.querySelector('[data-bg]');
    if(bg)imgIO.observe(bg);
  });
  if(list.length>PAGE){
    const nav=document.createElement('div');nav.className='bl-pg';
    const bP=document.createElement('button');bP.textContent='Anterior';bP.disabled=p===0;
    const bN=document.createElement('button');bN.textContent='Siguiente';bN.disabled=p===maxPg;
    bP.onclick=()=>{curPg--;renderPage(gr,curList,curPg,true)};
    bN.onclick=()=>{curPg++;renderPage(gr,curList,curPg,true)};
    nav.appendChild(bP);nav.appendChild(bN);gr.appendChild(nav);
  }
  if(animate){gr.classList.remove('bl-anim');void gr.offsetWidth;gr.classList.add('bl-anim')}
}

async function init(){
  const gr=document.getElementById('bl-gr');
  const ld=document.getElementById('bl-ld');
  if(!gr)return;
  gr.innerHTML='';
  const[galleries,nw]=await Promise.all([fetchData(),BN_FR()]);
  if(ld)ld.style.display='none';
  gr.style.display='';
  const bl=galleries?parseBlogs(galleries):[];
  const items=BN_MIX(bl,nw);
  curList=items;curPg=0;
  renderPage(gr,items,0,false);
}

function onCL(){
  if(!document.getElementById('bl-gr'))return;
  curList=[];curPg=0;
  document.addEventListener('contentUnload',onCU,{once:true});
  init();
}
function onCU(){
  if(fetchAC)fetchAC.abort();
  if(rssAC)rssAC.abort();
  if(imgIO){imgIO.disconnect();imgIO=null;}
  document.removeEventListener('contentLoaded',onCL);
}
document.addEventListener('contentLoaded',onCL);
document.addEventListener('contentUnload',onCU,{once:true});

init();
})();

(function(){
const W='https://yoganopy-push.marcoygor0.workers.dev';
const VP='BHhzutw-yWrRIzIXr3NS1VlY9Z0ryqQ5FRm-W-p3lBN6wj9jePY7tBqatF_OUkMWJcobIpzucuqqgkV159lC_Mk';
const SW_TO=3000;
if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
if(Notification.permission==='denied')return;
const btn=document.getElementById('nt-btn');
function u8(s){
const p=atob(s.replace(/-/g,'+').replace(/_/g,'/'));
return Uint8Array.from(p,c=>c.charCodeAt(0));
}
function swReady(){
return Promise.race([
navigator.serviceWorker.ready,
new Promise((_,rj)=>setTimeout(()=>rj(new Error('sw timeout')),SW_TO))
]);
}
async function upd(sw){
try{
const s=await sw.pushManager.getSubscription();
btn.textContent=s?'🔕 Desactivar Notificaciones':'🔔 Activar Notificaciones';
btn.style.display='block';
}catch(e){}
}
async function toggle(sw){
btn.disabled=true;
try{
const s=await sw.pushManager.getSubscription();
if(s){
await fetch(W+'/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:s.endpoint})}).catch(()=>{});
await s.unsubscribe();
}else{
const p=await Notification.requestPermission();
if(p!=='granted'){btn.disabled=false;return;}
const ns=await sw.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:u8(VP)});
await fetch(W+'/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ns.toJSON())}).catch(()=>{});
}
await upd(sw);
}catch(e){}
btn.disabled=false;
}
swReady().then(sw=>{
upd(sw);
btn.addEventListener('click',()=>toggle(sw));
}).catch(()=>{});
})();
</script>
